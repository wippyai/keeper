version: "1.0"
namespace: keeper.task.api

entries:
  # keeper.task.api:archive_task
  - name: archive_task
    kind: function.lua
    meta:
      comment: Archive or restore a task (soft-hide from default list)
      router: app:api
    source: file://archive_task.lua
    modules:
      - http
      - security
    imports:
      task_writer: keeper.task.persist:writer
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:archive_task.endpoint
  - name: archive_task.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: archive_task
    path: /keeper/tasks/:id/archive
    
  # keeper.task.api:create_task
  - name: create_task
    kind: function.lua
    meta:
      comment: Create a new task
      router: app:api
    source: file://create_task.lua
    modules:
      - http
      - security
    imports:
      task_writer: keeper.task.persist:writer
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:create_task.endpoint
  - name: create_task.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: create_task
    path: /keeper/tasks
    
  # keeper.task.api:get_task
  - name: get_task
    kind: function.lua
    meta:
      comment: Get a task with node-based stats (counts types in keeper_task_nodes + changeset state)
      router: app:api
    source: file://get_task.lua
    modules:
      - http
      - sql
    imports:
      task_consts: keeper.task:consts
      task_reader: keeper.task.persist:reader
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:get_task.endpoint
  - name: get_task.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: get_task
    path: /keeper/tasks/:id
    
  # keeper.task.api:list_nodes
  - name: list_nodes
    kind: function.lua
    meta:
      comment: List keeper_task_nodes for a task (unified trail + payloads). Filter by visibility, types, since_seq, parent.
      router: app:api
    source: file://list_nodes.lua
    modules:
      - http
    imports:
      nodes_reader: keeper.task.persist:nodes_reader
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:list_nodes.endpoint
  - name: list_nodes.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: list_nodes
    path: /keeper/tasks/:id/nodes
    
  # keeper.task.api:list_tasks
  - name: list_tasks
    kind: function.lua
    meta:
      comment: List tasks with optional filters
      router: app:api
    source: file://list_tasks.lua
    modules:
      - http
    imports:
      task_reader: keeper.task.persist:reader
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:list_tasks.endpoint
  - name: list_tasks.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: list_tasks
    path: /keeper/tasks
    
  # keeper.task.api:research
  - name: research
    kind: function.lua
    meta:
      comment: Start a research dataflow for a task (spawns keeper.agents:researcher)
      router: app:api
    source: file://research.lua
    modules:
      - http
      - security
    imports:
      lifecycle: keeper.task.phases:lifecycle
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:research.endpoint
  - name: research.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: research
    path: /keeper/tasks/:id/research
    
  # keeper.task.api:respond
  - name: respond
    kind: function.lua
    meta:
      comment: User responds to question — resume the current phase orchestrator
      router: app:api
    source: file://respond.lua
    modules:
      - http
      - security
    imports:
      lifecycle: keeper.task.phases:lifecycle
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:respond.endpoint
  - name: respond.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: respond
    path: /keeper/tasks/:id/respond
    
  # keeper.task.api:search
  - name: search
    kind: function.lua
    meta:
      comment: Full-text search across keeper_task_nodes for a task (task_id query param required; FTS scoped search)
      router: app:api
    source: file://search.lua
    modules:
      - http
    imports:
      nodes_reader: keeper.task.persist:nodes_reader
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:search.endpoint
  - name: search.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: search
    path: /keeper/tasks/search
    
  # keeper.task.api:start_cycle
  - name: start_cycle
    kind: function.lua
    meta:
      comment: Start the AI-orchestrated development cycle for a task
      router: app:api
    source: file://start_cycle.lua
    modules:
      - http
      - security
    imports:
      lifecycle: keeper.task.phases:lifecycle
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:start_cycle.endpoint
  - name: start_cycle.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: start_cycle
    path: /keeper/tasks/:id/start
    
  # keeper.task.api:stats
  - name: stats
    kind: function.lua
    meta:
      comment: Aggregate task counts (total / open / completed / cancelled / by_phase / archived)
      router: app:api
    source: file://stats.lua
    modules:
      - http
      - sql
      - security
    imports:
      task_consts: keeper.task:consts
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:stats.endpoint
  - name: stats.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: stats
    path: /keeper/tasks/stats
    
  # keeper.task.api:stats_test
  - name: stats_test
    kind: function.lua
    meta:
      type: test
      comment: Tests for keeper.task.api:stats.compute — aggregate correctness
      suite: task.api.stats
    source: file://stats_test.lua
    modules:
      - sql
      - uuid
    imports:
      stats: keeper.task.api:stats
      task_consts: keeper.task:consts
      task_writer: keeper.task.persist:writer
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.task.api:status
  - name: status
    kind: function.lua
    meta:
      comment: Return keeper status (version / uptime_seconds / task_count)
      router: app:api
    source: file://status.lua
    modules:
      - http
      - sql
    imports:
      task_consts: keeper.task:consts
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:status.endpoint
  - name: status.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: status
    path: /keeper/status
    
  # keeper.task.api:status_test
  - name: status_test
    kind: function.lua
    meta:
      type: test
      comment: Tests for keeper.task.api:status.compute — shape + numeric invariant
      suite: task.api.status
    source: file://status_test.lua
    modules:
      - sql
    imports:
      status: keeper.task.api:status
      task_consts: keeper.task:consts
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.task.api:sync_research
  - name: sync_research
    kind: function.lua
    meta:
      comment: Sync research dataflow status back to task log nodes
      router: app:api
    source: file://sync_research.lua
    modules:
      - http
    imports:
      lifecycle: keeper.task.phases:lifecycle
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:sync_research.endpoint
  - name: sync_research.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: sync_research
    path: /keeper/tasks/:id/sync
    
  # keeper.task.api:update_task
  - name: update_task
    kind: function.lua
    meta:
      comment: Update a task (phase, status, spec, acceptance, etc.)
      router: app:api
    source: file://update_task.lua
    modules:
      - http
      - security
    imports:
      task_writer: keeper.task.persist:writer
    method: handler
    pool:
      size: 2
    
  # keeper.task.api:update_task.endpoint
  - name: update_task.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: PUT
    func: update_task
    path: /keeper/tasks/:id
    
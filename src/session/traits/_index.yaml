version: "1.0"
namespace: keeper.session.traits

entries:
  # keeper.session.traits:session_analysis
  - name: session_analysis
    kind: registry.entry
    meta:
      type: agent.trait
      title: Session Analysis
      comment: Clean, focused session management tools for agent improvement analysis
      tags:
        - sessions
        - analysis
        - agents
        - improvement
        - patterns
        - debugging
      icon: tabler:analytics
    prompt: |-
      You have session analysis tools for managing and analyzing user sessions:
    
      ## Session Analysis Tools
    
      **List Sessions** - Find sessions with basic filters and pagination:
      ```json
      {
        "user_id": "user123",
        "started_after": "2025-01-01T00:00:00Z",
        "has_errors": true,
        "status": ["completed", "failed"],
        "limit": 50,
        "sort": "created_at",
        "order": "desc"
      }
      ```
    
      **Read Session Content** - Get session messages with filtering and pagination:
      ```json
      {
        "session_id": "session123",
        "roles": ["assistant", "tool"],
        "has_errors": true,
        "limit": 100,
        "include_metadata": true
      }
      ```
    
      **Scan Session** - Find failure patterns and issues:
      ```json
      {
        "session_id": "session123",
        "focus": ["tool_errors", "timeouts", "retries"],
        "max_messages": 1000,
        "return_samples": true
      }
      ```
    
      ## Key Features
    
      **Efficient Design**:
      - Three focused tools instead of command-based interface
      - OpenAI-compatible schemas (no conditional requirements)
      - Context-aware session_id resolution
      - Simple, flat parameter structure
    
      **Smart Filtering**:
      - Time range filtering with ISO 8601 timestamps
      - Role-based message filtering
      - Error-only filtering for debugging
      - Status and user filters for sessions
    
      **Built-in Pattern Detection**:
      - Automatic failure pattern recognition
      - Focus categories for targeted analysis
      - Sample extraction for pattern examples
      - Aggregate statistics and summaries
    
      **Consistent Pagination**:
      - Cursor-based pagination for stability
      - Configurable limits with reasonable maximums
      - Sort options for different analysis needs
    
      ## Common Usage Patterns
    
      **Debug Recent Errors**:
      - List sessions with `has_errors: true`
      - Read error messages with `has_errors: true`
      - Scan for specific error patterns
    
      **Analyze User Sessions**:
      - Filter by `user_id` and time ranges
      - Track tool usage patterns
      - Identify improvement opportunities
    
      **Performance Analysis**:
      - Scan for timeout and latency issues
      - Identify retry loops and failures
      - Analyze tool efficiency patterns
    
      Uses session management API with server-side filtering for efficient analysis.
    tools:
      - keeper.session.traits:*
    
  # keeper.session.traits:session_read
  - name: session_read
    kind: function.lua
    meta:
      type: tool
      title: Session Read
      description: Read a specific session with conversation and metadata. User is automatically resolved from actor context.
      input_schema: |-
        {
          "type": "object",
          "additionalProperties": false,
          "properties": {
            "session_id": {
              "type": "string",
              "description": "Unique session identifier to read."
            }
          },
          "required": ["session_id"]
        }
      llm_description: Read full session information including conversation history and metadata. User automatically resolved from actor context.
    source: file://session_read.lua
    modules:
      - security
    imports:
      message_repo: wippy.session.persist:message_repo
      session_repo: wippy.session.persist:session_repo
    method: handler
    
  # keeper.session.traits:session_scan
  - name: session_scan
    kind: function.lua
    meta:
      type: tool
      title: Session Scan
      description: Scan conversations for patterns, errors, and insights. User is automatically resolved from actor context.
      input_schema: |-
        {
          "type": "object",
          "additionalProperties": false,
          "properties": {
            "query": {
              "type": "string",
              "description": "Text to search for in session conversations."
            },
            "error_types": {
              "type": "array",
              "items": {
                "type": "string"
              },
              "description": "Filter to sessions with these error types/patterns."
            },
            "limit": {
              "type": "integer",
              "minimum": 1,
              "maximum": 200,
              "description": "Max number of matching sessions to return (default 50)."
            },
            "cursor": {
              "type": "string",
              "description": "Opaque pagination cursor from previous search."
            },
            "context_lines": {
              "type": "integer",
              "minimum": 0,
              "maximum": 20,
              "description": "Lines of context around matches (default 2)."
            },
            "include_patterns": {
              "type": "array",
              "items": {
                "type": "string"
              },
              "description": "Additional regex patterns to match against conversation content."
            },
            "session_filter": {
              "type": "object",
              "description": "Additional session filters (same as sessions_list)",
              "properties": {
                "started_after": {
                  "type": "string",
                  "format": "date-time"
                },
                "started_before": {
                  "type": "string",
                  "format": "date-time"
                },
                "status": {
                  "type": "array",
                  "items": {
                    "type": "string",
                    "enum": ["active", "completed", "failed", "abandoned"]
                  }
                }
              }
            }
          },
          "required": []
        }
      llm_description: Search and analyze session conversations for patterns, errors, and specific content. User automatically resolved from actor context.
    source: file://session_scan.lua
    modules:
      - security
    imports:
      message_repo: wippy.session.persist:message_repo
      session_repo: wippy.session.persist:session_repo
    method: handler
    
  # keeper.session.traits:sessions_list
  - name: sessions_list
    kind: function.lua
    meta:
      type: tool
      title: Sessions List
      description: List sessions filtered by time window, status, and error presence. User is automatically resolved from actor context.
      input_schema: |-
        {
          "type": "object",
          "additionalProperties": false,
          "properties": {
            "started_after": {
              "type": "string",
              "format": "date-time",
              "description": "Only sessions started on/after this ISO 8601 timestamp."
            },
            "started_before": {
              "type": "string",
              "format": "date-time",
              "description": "Only sessions started before this ISO 8601 timestamp."
            },
            "status": {
              "type": "array",
              "items": {
                "type": "string",
                "enum": ["active", "completed", "failed", "abandoned"]
              },
              "description": "Filter to sessions with any of these statuses."
            },
            "has_errors": {
              "type": "boolean",
              "description": "If true, only sessions with at least one error. If false, only sessions with no errors."
            },
            "limit": {
              "type": "integer",
              "minimum": 1,
              "maximum": 200,
              "description": "Max number of sessions to return (default 50)."
            },
            "cursor": {
              "type": "string",
              "description": "Opaque pagination cursor returned from a previous call."
            },
            "sort": {
              "type": "string",
              "enum": ["created_at", "updated_at", "last_error_at"],
              "description": "Sort field (default created_at)."
            },
            "order": {
              "type": "string",
              "enum": ["asc", "desc"],
              "description": "Sort order (default desc)."
            }
          },
          "required": []
        }
      llm_description: Find sessions with basic filters (time range, status, errors) and pagination support. User automatically resolved from actor context.
    source: file://sessions_list.lua
    modules:
      - security
    imports:
      session_repo: wippy.session.persist:session_repo
    method: handler
    
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.develop.integrate.handlers:env_variable_handler
  - name: env_variable_handler
    kind: function.lua
    meta:
      type: integration.handler
      title: Mount Environment Variables
      comment: Applies env.variable kind entries; idempotent for the up direction
      icon: tabler:variable
      order: 200
      handles:

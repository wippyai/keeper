  # keeper.develop.integrate.handlers:view_handler
  - name: view_handler
    kind: function.lua
    meta:
      type: integration.handler
      title: Verify Views
      comment: Confirms pushed view.page entries have their file on disk; rollback is the fs restore handled elsewhere

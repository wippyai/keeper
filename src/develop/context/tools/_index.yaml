version: "1.0"
namespace: keeper.develop.context.tools

entries:
  # keeper.develop.context.tools:test_prepare
  - name: test_prepare
    kind: function.lua
    meta:
      type: tool
      title: Test prepare_context
      comment: Isolation-test wrapper that calls keeper.develop.context:prepare_context with a given agent_id + task prompt and returns the gathered context blob
      tags:
        - develop
        - context
        - test
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {"type": "string", "description": "Agent id whose context_chain to prepare (defaults to the context agent itself for a 1-hop test)"},
            "prompt":   {"type": "string", "description": "Task description passed to the context agents"}
          },
          "required": ["agent_id", "prompt"]
        }
      llm_alias: test_prepare_context
      llm_description: Run keeper.develop.context:prepare_context directly against an agent_id + prompt and return the resulting context blob.
    source: file://test_prepare.lua
    modules:
      - funcs
    method: handler
    
version: "1.0"
namespace: keeper.develop

entries:
  # keeper.develop:implement_task
  - name: implement_task
    kind: function.lua
    meta:
      type: tool
      title: Implement Task
      comment: Wraps a specialist agent — prepares context via context_chain, passes gathered_context + task into the agent's arena, returns {success, output}. Called by implement_orchestrator once per step.
      tags:
        - develop
        - implement
      input_schema: |
        {
          "type": "object",
          "properties": {
            "task":          {"type": "string", "description": "Task prompt for the specialist"},
            "agent_id":      {"type": "string", "description": "Specialist agent id (e.g. keeper.agents:developer). Must have meta.context_chain for research to fire."},
            "agent_options": {"type": "object", "description": "Optional overrides: {max_iterations, arena_prompt}"}
          },
          "required": ["task", "agent_id"]
        }
      llm_alias: implement_task
      llm_description: Spawn a specialist developer agent for one step, with context gathered from its meta.context_chain prepended to its system prompt. Returns {success, output}.
    source: file://implement_task.lua
    modules:
      - json
      - ctx
    imports:
      agent_registry: wippy.agent.discovery:registry
      audit: keeper.task:audit
      changeset_repo: keeper.changeset.persist:repo
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.develop:implement_task_test
  - name: implement_task_test
    kind: function.lua
    meta:
      type: test
      comment: Unit tests for implement_task — input guards (task/agent_id required, ctx.overlay_branch required)
      suite: develop
    source: file://implement_task_test.lua
    modules:
      - funcs
    imports:
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
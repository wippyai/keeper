version: "1.0"
namespace: keeper.develop

entries:
  # keeper.develop:execute_steps
  - name: execute_steps
    kind: function.lua
    meta:
      title: Execute Implementation Steps
      comment: Executes decomposed steps sequentially with context flow
      input_schema: |
        {
          "type": "object",
          "properties": {
            "steps": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "id": {"type": "string"},
                  "agent_id": {"type": "string"},
                  "title": {"type": "string"},
                  "task": {"type": "string"},
                  "produces_prompt": {"type": "string"},
                  "needs": {
                    "type": "array",
                    "items": {"type": "string"}
                  }
                },
                "required": ["id", "agent_id", "title", "task", "produces_prompt"]
              }
            },
            "max_iterations": {
              "type": "integer",
              "default": 32
            },
            "search_max_agents": {
              "type": "integer",
              "default": 5
            },
            "task_context": {
              "type": "string",
              "description": "Original task context to append to each step"
            }
          },
          "required": ["steps"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "total_steps": {"type": "integer"},
            "succeeded": {"type": "integer"},
            "failed": {"type": "integer"},
            "success_rate": {"type": "number"},
            "successes": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "step": {"type": "string"},
                  "result": {}
                }
              }
            },
            "failures": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "step": {"type": "string"},
                  "error": {"type": "string"},
                  "details": {}
                }
              }
            }
          }
        }
    source: file://execute_steps.lua
    modules:
      - json
    imports:
      flow: userspace.dataflow.flow:flow
    method: run
    
  # keeper.develop:implement
  - name: implement
    kind: function.lua
    meta:
      type: tool
      title: Implement
      comment: Decomposes and executes multi-step implementation
      input_schema: |
        {
          "type": "object",
          "properties": {
            "task": {
              "type": "string",
              "description": "Development task"
            },
            "options": {
              "type": "object",
              "properties": {
                "max_iterations": {
                  "type": "integer",
                  "default": 8
                },
                "search_max_agents": {
                  "type": "integer",
                  "default": 5
                }
              }
            }
          },
          "required": ["task"]
        }
      llm_alias: implement
      llm_description: Decompose and execute complex implementation tasks through sequential steps.
    source: file://implement.lua
    modules:
      - json
      - ctx
    imports:
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.develop:implement_task
  - name: implement_task
    kind: function.lua
    meta:
      type: tool
      title: Implement Task
      comment: Routes task to specialist with context gathering
      input_schema: |
        {
          "type": "object",
          "properties": {
            "task": {
              "type": "string",
              "description": "Single focused development task"
            },
            "search_options": {
              "type": "object",
              "properties": {
                "max_agents": {
                  "type": "integer",
                  "minimum": 1,
                  "maximum": 10,
                  "default": 5,
                  "description": "Maximum context agents to invoke"
                },
                "with_patterns": {
                  "type": "boolean",
                  "default": true,
                  "description": "Include pattern search"
                },
                "system_instructions": {
                  "type": "string",
                  "description": "Additional context instructions"
                }
              }
            },
            "agent_options": {
              "type": "object",
              "properties": {
                "max_iterations": {
                  "type": "integer",
                  "minimum": 1,
                  "maximum": 20,
                  "default": 8,
                  "description": "Maximum implementation iterations"
                },
                "arena_prompt": {
                  "type": "string",
                  "description": "Custom arena prompt for implementation"
                }
              }
            }
          },
          "required": ["task"]
        }
      llm_alias: implement_task
      llm_description: Execute single focused development task with automatic specialist selection and context gathering. Task must be specific, not multi-phase.
    source: file://implement_task.lua
    modules:
      - json
      - ctx
    imports:
      agent_registry: wippy.agent.discovery:registry
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.develop:router
  - name: router
    kind: registry.entry
    meta:
      type: agent.gen1
      title: Development Selector
      comment: Selects development specialist based on task
      tags:
        - routing
        - development
    prompt: |
      Select development specialist for the task.
    
      Review available agents and choose most appropriate specialist.
    
      Match task requirements to agent capabilities.
      Read agent's requirements field to understand what context they need.
    
      Return:
      - agent_id: Selected agent
      - classes: Domain classes for context filtering
      - description: Why this agent was selected
      - requirements: What context this agent needs (from meta.requirements)
    
      Only select development specialists.
    model: gpt-5-mini
    temperature: 0.2
    max_tokens: 32000
    thinking_effort: 40
    traits:
      - context:
          target_agent_class: develop_specialist
        id: keeper.context.traits.agents:agents_aware
    
  # keeper.develop:validate_execution
  - name: validate_execution
    kind: function.lua
    meta:
      title: Validate Execution Results
      comment: Validates multi-step execution results and fails workflow if any step failed
      input_schema: |
        {
          "type": "object",
          "description": "Map of step IDs to their results or errors",
          "additionalProperties": true
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "total_steps": {
              "type": "integer",
              "description": "Total number of steps"
            },
            "succeeded": {
              "type": "integer",
              "description": "Number of successful steps"
            },
            "failed": {
              "type": "integer",
              "description": "Number of failed steps"
            },
            "success_rate": {
              "type": "number",
              "description": "Success rate (0.0 to 1.0)"
            },
            "successes": {
              "type": "array",
              "description": "Array of successful step results",
              "items": {
                "type": "object",
                "properties": {
                  "step": {"type": "string"},
                  "result": {}
                }
              }
            },
            "failures": {
              "type": "array",
              "description": "Array of failed step results",
              "items": {
                "type": "object",
                "properties": {
                  "step": {"type": "string"},
                  "error": {"type": "string"},
                  "details": {}
                }
              }
            }
          }
        }
    source: file://validate_execution.lua
    modules:
      - json
    method: handler
    
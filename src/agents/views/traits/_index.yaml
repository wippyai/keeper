version: "1.0"
namespace: keeper.agents.views.traits

entries:
  # keeper.agents.views.traits:list_resources
  - name: list_resources
    kind: function.lua
    meta:
      type: tool
      title: List View Resources
      comment: Lists all view resources (CSS, JS, etc.) with comprehensive metadata
      input_schema: |
        {
          "type": "object",
          "properties": {},
          "additionalProperties": false
        }
      llm_alias: ListViewResources
      llm_description: Lists all available view resources including CSS, JavaScript, and other assets with metadata like order, template sets, and URLs.
    source: file://list_resources.lua
    modules:
      - registry
    method: handler
    
  # keeper.agents.views.traits:list_templates
  - name: list_templates
    kind: function.lua
    meta:
      type: tool
      title: List Jet Templates
      comment: Lists all Jet templates (layouts, components, partials)
      input_schema: |
        {
          "type": "object",
          "properties": {},
          "additionalProperties": false
        }
      llm_alias: ListJetTemplates
      llm_description: Lists all available Jet templates including layouts, components, and partials, grouped by template set and type.
    source: file://list_templates.lua
    modules:
      - registry
    method: handler
    
  # keeper.agents.views.traits:list_views
  - name: list_views
    kind: function.lua
    meta:
      type: tool
      title: List Views
      comment: Lists all view pages with complete metadata
      input_schema: |
        {
          "type": "object",
          "properties": {},
          "additionalProperties": false
        }
      llm_alias: ListViews
      llm_description: Lists all available view pages with metadata including titles, icons, groups, order, security settings, and template associations.
    source: file://list_views.lua
    modules:
      - registry
    method: handler
    
  # keeper.agents.views.traits:render_view
  - name: render_view
    kind: function.lua
    meta:
      type: tool
      title: Render View
      comment: Renders a view with route and query parameters
      input_schema: |
        {
          "type": "object",
          "properties": {
            "id": {
              "type": "string",
              "description": "View ID to render (namespace:name format)"
            },
            "route_params": {
              "type": "object",
              "description": "Route parameters to pass to the view",
              "additionalProperties": true
            },
            "query_params": {
              "type": "object",
              "description": "Query parameters to pass to the view",
              "additionalProperties": true
            }
          },
          "required": ["id"],
          "additionalProperties": false
        }
      llm_alias: RenderView
      llm_description: Renders a specific view with optional route and query parameters, returning the rendered HTML content.
    source: file://render_view.lua
    modules:
      - registry
    imports:
      renderer: wippy.views:renderer
    method: handler
    
  # keeper.agents.views.traits:view_discovery
  - name: view_discovery
    kind: registry.entry
    meta:
      type: agent.trait
      title: View Discovery
      comment: Comprehensive view system discovery tools for templates, resources, and pages
      tags:
        - views
        - discovery
        - templates
        - resources
        - jet
      icon: tabler:layout-list
    prompt: |
      You have comprehensive view discovery tools for exploring the Wippy view system:
    
      ## View Discovery Tools
    
      **List Views** - Discover all available view pages with metadata:
      - Page titles, icons, and descriptions
      - Group organization and ordering
      - Security settings (public/secure/announced)
      - Template set associations
      - Namespace locations
    
      **List Templates** - Explore Jet template system:
      - Available layouts, components, and partials
      - Template set groupings
      - Namespace organization
      - Data function associations
    
      **List Resources** - Examine view resources:
      - CSS and JavaScript assets
      - Resource ordering and dependencies
      - Global vs template-set specific
      - External URLs and integrity checks
      - Load optimization (defer/async)
    
      ## Key Discovery Patterns
    
      **View Architecture:**
      - Views use Jet templates with inheritance
      - Resources attached by template set
      - Pages organized in groups with ordering
      - Security controlled through metadata
    
      **Template Organization:**
      - Templates grouped in sets for consistency
      - Layouts provide base structure
      - Components offer reusable elements
      - Partials for shared fragments
    
      **Resource Management:**
      - Resources ordered for proper loading
      - Global resources vs set-specific
      - External CDN support with integrity
      - Media queries and conditional loading
    
      Use these tools to understand the complete view system architecture, find existing patterns, and identify reusable components.
    tools:
      - keeper.agents.views.traits:list_views
      - keeper.agents.views.traits:list_templates
      - keeper.agents.views.traits:list_resources
    
  # keeper.agents.views.traits:view_rendering
  - name: view_rendering
    kind: registry.entry
    meta:
      type: agent.trait
      title: View Rendering
      comment: View rendering and testing capabilities for development and debugging
      tags:
        - views
        - rendering
        - testing
        - debugging
        - jet
      icon: tabler:browser
    prompt: |
      You have view rendering capabilities for testing and debugging:
    
      ## View Rendering Tools
    
      **Render View** - Generate view output with parameters:
      - Pass route parameters for dynamic content
      - Include query parameters for filtering
      - Get rendered HTML output
      - Test view functionality
    
      ## Rendering Patterns
    
      **Parameter Passing:**
      ```json
      {
        "id": "app.views:dashboard",
        "route_params": {
          "user_id": "123",
          "section": "overview"
        },
        "query_params": {
          "filter": "active",
          "sort": "date"
        }
      }
      ```
    
      **Testing Workflow:**
      1. List views to find target
      2. Check view metadata for requirements
      3. Render with test parameters
      4. Verify output structure
    
      **Common Use Cases:**
      - Test view rendering before deployment
      - Debug template issues
      - Verify parameter handling
      - Check dynamic content generation
      - Validate security contexts
    
      ## View System Integration
    
      **Jet Template Features:**
      - Template inheritance with extends
      - Block system for content injection
      - Alpine.js for reactivity
      - Server-side data through context
      - Client-side API through wippyApi
    
      **Rendering Context:**
      - Views receive security context
      - Parameters accessible in templates
      - Data functions provide dynamic content
      - Resources automatically included
    
      Use rendering tools to test views during development, debug issues, and verify proper parameter handling.
    tools:
      - keeper.agents.views.traits:render_view
      - keeper.agents.views.traits:list_views
    
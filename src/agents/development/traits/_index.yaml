version: "1.0"
namespace: keeper.agents.development.traits

entries:
  # keeper.agents.development.traits:agent_list
  - name: agent_list
    kind: function.lua
    meta:
      name: Development Agent List
      comment: Dynamic function that generates current development agent list for prompt injection
      tags:
        - development
        - agents
        - dynamic
        - prompt
      description: Generates real-time list of available development agents for trait prompt injection
    source: file://agent_list.lua
    imports:
      list_agents: keeper.agents.manager:list_agents
    method: handler
    
  # keeper.agents.development.traits:develop
  - name: develop
    kind: function.lua
    meta:
      type: tool
      title: Development
      comment: Delegate development tasks to specialized development agents with preloaded context
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {
              "type": "string",
              "description": "Development agent ID to delegate to (e.g., keeper.agents.development:backend_engineer)"
            },
            "request": {
              "type": "string",
              "description": "Development request/task description"
            },
            "namespaces": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Namespaces to explore with tree view"
            },
            "files": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Specific file paths to read"
            },
            "entries": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Registry entry IDs to load (format: namespace:entry)"
            },
            "search": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Search terms for finding relevant code patterns"
            }
          },
          "required": ["agent_id", "request"],
          "additionalProperties": false
        }
      llm_alias: Develop
      llm_description: Delegate development tasks to a development agent with optional preloaded context from namespaces, files, entries, and search results.
      private: true
    source: file://develop.lua
    modules:
      - json
      - uuid
      - ctx
      - registry
      - funcs
      - text
    imports:
      develop_client: userspace.dataflow:client
      df_consts: userspace.dataflow:consts
    method: handler
    
  # keeper.agents.development.traits:developer
  - name: developer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Development
      comment: Development task delegation with implementation-focused cache optimization [INTERNAL USE ONLY]
      tags:
        - development
        - delegation
        - context
        - agents
        - tools
        - implementation
      icon: tabler:code
      private: true
    prompt: "Development delegation with implementation-focused cache optimization. Targets source files, documentation, and patterns for immediate implementation execution.\n\n## Development-Specific Cache Strategies\n\n**Documentation + Implementation Files** (new integrations without examples)\n```json\n{\n  \"agent_id\": \"keeper.agents.development:backend_engineer\",\n  \"request\": \"Create REST client for external API service integration\",\n  \"context\": {\n    \"entries\": [\n      \"wippy.docs:http_client.spec\",        // HTTP client module documentation\n      \"wippy.docs:json.spec\",               // JSON handling documentation\n      \"wippy.docs:security.spec\"            // Security/auth documentation\n    ],\n    \"files\": [\n      \"app/plugins/similar-service/client.lua\",  // Reference pattern\n      \"app/plugins/similar-service/_index.yaml\"  // Component structure\n    ],\n    \"namespaces\": [\"app.plugins\"],\n    \"search\": [\"client patterns\", \"http integration\"]\n  }\n}\n```\n**Optimization**: Documentation first when no examples exist, then closest patterns\n\n**Source File Modification Clustering** (known components)\n```json\n{\n  \"agent_id\": \"keeper.agents.development:tool_engineer\",\n  \"request\": \"Add 'update_status' tool to existing project service\",\n  \"context\": {\n    \"files\": [\n      \"app/plugins/projectservice/traits/_index.yaml\",     // Target modification\n      \"app/plugins/projectservice/traits/get_project.lua\", // Same-service pattern\n      \"app/plugins/projectservice/client.lua\"             // Required import\n    ],\n    \"entries\": [\"app.plugins.projectservice:client\"],\n    \"search\": [\"project service patterns\"]\n  }\n}\n```\n**Optimization**: Target file + same-service pattern + dependencies in one load\n\n**Multi-Component Integration** (complex features)\n```json\n{\n  \"agent_id\": \"keeper.agents.development:backend_engineer\",\n  \"request\": \"Add webhook endpoint with database persistence and notification\",\n  \"context\": {\n    \"entries\": [\n      \"wippy.docs:http.spec\",              // HTTP endpoint documentation\n      \"wippy.docs:sql.spec\",               // Database operations\n      \"wippy.docs:registry.spec\"           // Component registration\n    ],\n    \"files\": [\n      \"app/api/webhooks/_index.yaml\",      // Target namespace structure\n      \"app/api/auth/login.lua\",            // HTTP endpoint pattern\n      \"app/plugins/github/webhook.lua\"     // Webhook handling pattern\n    ],\n    \"namespaces\": [\"app.api.webhooks\"],\n    \"search\": [\"webhook patterns\", \"database integration\"]\n  }\n}\n```\n**Optimization**: Documentation + target structure + implementation patterns\n\n## Implementation Context Loading Priorities\n\n**Priority 1: Required Documentation**\nWhen architects identify new integrations or unfamiliar modules:\n- `wippy.docs:http_client.spec` - External API calls\n- `wippy.docs:sql.spec` - Database operations  \n- `wippy.docs:registry.spec` - Component registration\n- `wippy.docs:security.spec` - Authentication/authorization\n- `wippy.docs:json.spec` - Data serialization\n- `wippy.docs:time.spec` - Time operations and scheduling\n- ... we have a lot of documentation about ws, tree sitter and etc\n\n**Priority 2: Implementation Target Files**\nFiles developer will directly modify:\n- Schema definitions (`_index.yaml` files)\n- Function implementations (`.lua` files)\n- Configuration and routing files\n\n**Priority 3: Same-Service Pattern Files**\nExisting implementations in same namespace:\n- Similar operations for schema consistency\n- Client integration patterns\n- Error handling approaches\n\n**Priority 4: Integration Point Files**\nConnection and dependency files:\n- Imported client libraries\n- Shared utilities and validators\n- Middleware and routing configurations\n\n## Documentation Context Rules\n\n**Include documentation when:**\n- Creating new integrations without existing examples\n- Using unfamiliar Wippy modules (http_client, sql, security, etc.)\n- Building cross-namespace integrations\n- Implementing new patterns not seen in codebase\n\n**Documentation + Pattern Combinations:**\n```json\n// New HTTP integration\n{\n  \"entries\": [\"wippy.docs:http_client.spec\"],\n  \"files\": [\"app/plugins/*/client.lua\"],        // Existing client patterns\n  \"search\": [\"http client\", \"api integration\"]\n}\n\n// Database operations\n{\n  \"entries\": [\"wippy.docs:sql.spec\"],\n  \"files\": [\"app/api/*/persist*.lua\"],          // Database patterns\n  \"search\": [\"sql operations\", \"database crud\"]\n}\n\n// Security integration  \n{\n  \"entries\": [\"wippy.docs:security.spec\"],\n  \"files\": [\"app/api/auth/*.lua\"],              // Auth patterns\n  \"search\": [\"authentication\", \"security validation\"]\n}\n```\n\n## Implementation Cache Cohesion\n\n**Bundle modification chains:**\n- Tool creation: target schema + same-service pattern + client + documentation\n- API endpoints: handler + middleware + documentation + routing\n- Integrations: documentation + client pattern + error handling + configuration\n\n**Avoid documentation lookup during implementation:**\n- Architect preloads relevant `wippy.docs:` entries\n- Developer gets immediate module API access\n- No mid-implementation documentation queries\n\n**File clustering for implementation:**\n```\nTarget:    app/plugins/newservice/client.lua\nLoad docs: wippy.docs:http_client.spec, wippy.docs:json.spec\nLoad ref:  app/plugins/similarservice/client.lua\nLoad deps: app/plugins/newservice/_index.yaml\nResult:    Zero-discovery implementation with documentation and patterns\n```\n\nDevelopment delegation optimizes for immediate implementation by frontloading documentation, target files, patterns, and dependencies in coordinated cache loads.\n"
    tools:
      - id: keeper.agents.development.traits:develop
      - id: keeper.agents.development.traits:invoke
    prompt_func_id: keeper.agents.development.traits:agent_list
    
  # keeper.agents.development.traits:invoke
  - name: invoke
    kind: function.lua
    meta:
      type: tool
      title: Function Invoker
      comment: Invoke any function by ID with parameters for testing and debugging
      input_schema: |
        {
          "type": "object",
          "properties": {
            "function_id": {
              "type": "string",
              "description": "Function ID to invoke (format: namespace:function_name)"
            },
            "parameters": {
              "type": "object",
              "description": "Parameters to pass to the function"
            }
          },
          "required": ["function_id"],
          "additionalProperties": false
        }
      llm_alias: Invoke
      llm_description: Invoke a function by ID with parameters for testing and debugging
    source: file://invoke.lua
    modules:
      - funcs
      - json
    method: handler
    
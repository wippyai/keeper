version: "1.0"
namespace: keeper.agents.docs

entries:
  # keeper.agents.docs:docs
  - name: docs
    kind: registry.entry
    meta:
      name: wippy.docs
      type: agent.gen1
      title: Wippy Documentation Specialist
      comment: Internal documentation agent providing comprehensive knowledge of Wippy platform modules, specifications, and development patterns
      group:
        - System Utilities
      tags:
        - documentation
        - specifications
        - reference
        - modules
        - knowledge
        - internal
      icon: tabler:book-2
      class:
        - helper
    prompt: |-
      You are the Wippy Documentation Specialist. Your job is to provide accurate technical information about **Wippy Lua module APIs and runtime functionality**.
    
      ## IMPORTANT: Your Documentation Scope
    
      **What you DO cover:**
      - Lua module APIs (http, sql, registry, etc.)
      - Runtime function signatures and parameters
      - Code examples for using Wippy modules in Lua
      - Module integration patterns and best practices
    
      **What you DON'T cover:**
      - YAML configuration structure for agents/entries
      - Registry entry schemas and metadata patterns
      - Current agent.gen1 configuration fields
      - Workspace or overlay system configuration
    
      **When asked about YAML/configuration:**
      1. Acknowledge the limitation: "My documentation covers Lua APIs, not YAML configuration structure"
      2. Provide what you can from Lua perspective (e.g., how to load config in Lua)
      3. Suggest: "For current YAML configuration patterns, check existing registry entries or ask the workspace manager"
    
      ## Your Core Function
    
      **Always use your tools first, then explain:**
      1. Use `list_docs` to find relevant modules
      2. Use `get_docs` to retrieve specific documentation
      3. Extract Lua API information and provide practical examples
      4. Focus on implementation details for Lua code
    
      ## Response Style
    
      **Be Direct and Practical:**
      - Start with the Lua API answer
      - Show code examples immediately
      - Explain the "how" before the "why"
      - Keep explanations concise and actionable
    
      **Structure Your Responses:**
      ```
      ## Quick Answer
      [Direct Lua API answer with code example]
    
      ## Key Details
      [Essential Lua implementation details]
    
      ## Common Patterns
      [Typical Lua usage patterns from docs]
    
      [If configuration asked: Note about scope limitation]
      ```
    
      ## What You Do Best
    
      - **Module Lookup**: Find and explain Wippy Lua modules
      - **API Reference**: Provide function signatures and parameters
      - **Code Examples**: Extract working Lua patterns from documentation
      - **Integration Patterns**: Show how modules work together in Lua
      - **Runtime Behavior**: Explain how modules behave at runtime
    
      **Your tools are `list_docs` and `get_docs`. Use them for every technical question.**
    model: gpt-4.1-mini
    temperature: 0.1
    max_tokens: 4000
    tools:
      - keeper.agents.docs:*
    memory:
      - My documentation covers Wippy Lua module APIs, not YAML configuration structure
      - Always call list_docs first to find relevant modules, then get_docs for specific information
      - Focus on Lua implementation over YAML configuration
      - When asked about YAML/config, acknowledge limitation and suggest checking existing registry entries
      - Provide working Lua code examples from the official documentation
    
  # keeper.agents.docs:get_docs
  - name: get_docs
    kind: function.lua
    meta:
      type: tool
      title: Get Documentation
      comment: Retrieves complete documentation for one or more specific Wippy modules by their full registry IDs
      input_schema: |
        {
          "type": "object",
          "properties": {
            "ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Array of full registry IDs to retrieve (e.g., ['wippy.docs:sql.spec', 'wippy.docs:registry.spec'])"
            }
          },
          "required": ["ids"],
          "additionalProperties": false
        }
      llm_alias: get_docs
      llm_description: Retrieves complete documentation for specific Wippy modules by their full registry IDs
    source: file://get_docs.lua
    modules:
      - registry
    method: handler
    
  # keeper.agents.docs:list_docs
  - name: list_docs
    kind: function.lua
    meta:
      type: tool
      title: List Documentation
      comment: Lists all available module specifications in the Wippy documentation system with full registry IDs
      input_schema: |
        {
          "type": "object",
          "properties": {
            "filter": {
              "type": "string",
              "description": "Optional filter to match module names, tags, or descriptions (e.g., 'sql', 'security', 'agent')"
            },
            "include_summary": {
              "type": "boolean",
              "default": false,
              "description": "Include brief summary/comment for each module"
            }
          },
          "additionalProperties": false
        }
      llm_alias: list_docs
      llm_description: Lists all available Wippy module specifications with full registry IDs and optional filtering by name or tags
    source: file://list_docs.lua
    modules:
      - registry
    method: handler
    
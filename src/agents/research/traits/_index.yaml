version: "1.0"
namespace: keeper.agents.research.traits

entries:
  # keeper.agents.research.traits:agent_list
  - name: agent_list
    kind: function.lua
    meta:
      name: Research Agent List
      comment: Dynamic function that generates current research agent list for prompt injection
      tags:
        - research
        - agents
        - dynamic
        - prompt
      description: Generates real-time list of available research agents for trait prompt injection
    source: file://agent_list.lua
    imports:
      list_agents: keeper.agents.manager:list_agents
    method: handler
    
  # keeper.agents.research.traits:research
  - name: research
    kind: function.lua
    meta:
      type: tool
      title: Research
      comment: Delegate research tasks to specialized research agents with preloaded context
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {
              "type": "string",
              "description": "Development agent ID to delegate to (e.g., keeper.agents.development:backend_engineer)"
            },
            "request": {
              "type": "string",
              "description": "Development request/task description"
            },
            "namespaces": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Namespaces to explore with tree view"
            },
            "files": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Specific file paths to read"
            },
            "entries": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Registry entry IDs to load (format: namespace:entry)"
            },
            "search": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Search terms for finding relevant code patterns"
            }
          },
          "required": ["agent_id", "request"],
          "additionalProperties": false
        }
      llm_alias: Research
      llm_description: Delegate research tasks to a research agent with optional preloaded context from namespaces, files, entries, and search results.
      private: true
    source: file://research.lua
    modules:
      - json
      - uuid
      - ctx
      - registry
      - funcs
      - text
    imports:
      develop_client: userspace.dataflow:client
      df_consts: userspace.dataflow:consts
    method: handler
    
  # keeper.agents.research.traits:researcher
  - name: researcher
    kind: registry.entry
    meta:
      type: agent.trait
      title: Research
      comment: Research task delegation with context preloading [INTERNAL USE ONLY]
      tags:
        - research
        - delegation
        - context
        - agents
        - tools
      icon: tabler:search
      private: true
    prompt: "Research delegation with cache-optimized context preloading. Provides specialized agent delegation for comprehensive intelligence gathering.\n\n## Research Strategy Patterns\n\n**Registry Intelligence** (highest precision)\n```json\n{\n  \"agent_id\": \"keeper.agents.research:registry_researcher\",\n  \"request\": \"Find authentication patterns in app.plugins namespace\",\n  \"context\": {\n    \"namespaces\": [\"app.plugins\"],\n    \"search\": [\"authentication\", \"oauth\", \"token\"]\n  }\n}\n```\nBest for: Component discovery, pattern analysis, implementation blueprints\n\n**Documentation Research** (API and modules)\n```json\n{\n  \"agent_id\": \"keeper.agents.research:docs_specialist\", \n  \"request\": \"Explain http module WebSocket upgrade patterns\",\n  \"context\": {\n    \"entries\": [\"wippy.docs:http.spec\"],\n    \"search\": [\"websocket\", \"upgrade\", \"middleware\"]\n  }\n}\n```\nBest for: Module APIs, runtime behavior, integration patterns\n\n**External Content Research** (comprehensive analysis)\n```json\n{\n  \"agent_id\": \"keeper.agents.research:content_researcher\",\n  \"request\": \"Analyze GitHub API authentication options\",\n  \"context\": {\n    \"files\": [\"docs/github-api.md\", \"requirements/auth-spec.txt\"],\n    \"search\": [\"github oauth\", \"api authentication\"]\n  }\n}\n```\nBest for: External documentation, requirement analysis, cross-platform research\n\n## Research Context Optimization\n\n**Cache-Efficient Context Loading:**\n1. **Preload related entries** - prevents repeated registry queries\n2. **Bundle documentation** - single cache key for module groups\n3. **Include search context** - relevant pattern discovery\n4. **Namespace boundaries** - consistent scope across requests\n\n## Multi-Phase Research Patterns\n\n**Research cascade patterns:**\n- Quick registry check → Deep specialist analysis\n- Pattern discovery → Implementation research\n- Documentation lookup → External validation\n\n**Context forwarding:**\n- Search patterns refined through discovery\n- Documentation context shared across phases\n- Results feed subsequent specialist requests\n\nResearch provides comprehensive intelligence through specialized agent delegation with optimized context loading for maximum cache efficiency.\n"
    tools:
      - id: keeper.agents.research.traits:research
    prompt_func_id: keeper.agents.research.traits:agent_list
    
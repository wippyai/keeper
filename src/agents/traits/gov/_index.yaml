version: "1.0"
namespace: keeper.agents.traits.gov

entries:
  # keeper.agents.traits.gov:syncer
  - name: syncer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Governance Syncer
      comment: Sync registry state and filesystem in both directions via governance
      tags:
        - gov
        - sync
        - filesystem
        - registry
      icon: tabler:transfer
    prompt: |
      You reconcile the registry and the managed filesystem (`src/**`) through the
      governance pipeline. Both directions go through governance — no raw writes.
    
      - `sync_from_fs` uploads pending filesystem changes into the registry. Use
        after editing files on disk (new entries, new migrations, renamed sources)
        so the running registry catches up.
      - `sync_to_fs` downloads the current registry state back into `src/**` with
        canonical YAML ordering. Use after branch edits have been pushed so the
        source tree matches what is running.
    
      Typical flow after a successful `push`:
        1. `sync_to_fs` — mirror the new main state onto disk so diffs are clean.
        2. Review the stats block (created / updated / deleted / unchanged).
    
      Typical flow after editing files by hand:
        1. `sync_from_fs` — bring the registry up to the filesystem.
        2. Use `run_test` or `test_endpoint` to verify the live behavior.
    
      Rules:
      - Never use these tools to work around a failed push — fix the
        underlying entries first.
      - Both calls take up to 90 seconds; do not retry aggressively on timeout.
      - Governance + per-kind contracts reject structurally-broken entries; read
        the error message and fix the source.
    tools:
      - keeper.gov.tools:sync_from_fs
      - keeper.gov.tools:sync_to_fs
    
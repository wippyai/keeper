  # keeper.agents.manager:team_orchestration_knowledge
  - name: team_orchestration_knowledge
    kind: registry.entry
    meta:
      type: agent.trait
      title: Team Orchestration Patterns
      comment: Understanding of multi-agent teams and delegation strategies
      tags:
        - knowledge
        - teams
        - orchestration
      icon: tabler:users
    prompt: |-
      ## Team Orchestration Knowledge

      You understand when and how to build effective agent teams.

      ### Team vs Single Agent Decision

      **Build a Team When:**
      - Multiple distinct services or domains involved
      - Workflow has clearly separated stages
      - Different expertise areas needed
      - Context isolation would improve efficiency
      - Parallel processing would help

      **Use Single Agent When:**
      - Focused, coherent task
      - All capabilities belong together
      - Simple tool composition sufficient
      - Shared context throughout workflow

      ### Team Architecture Patterns

      **Two-Level Teams (Common):**
      - Root orchestrator handles user interaction and coordination
      - Specialist agents handle specific domains
      - Clear delegation rules for routing

      **Three-Level Teams (Complex):**
      - Director level for high-level planning
      - Coordinator level for domain management
      - Worker level for specific task execution

      ### Delegation Best Practices

      **Context Management:**
      - Pass necessary context to delegates
      - Don't overload delegates with irrelevant information
      - Return structured results up the chain

      **Model Optimization:**
      - Larger models for complex orchestration
      - Smaller models for focused execution
      - Minimal models for simple tool calling

      ### Team Examples

      **CRM Integration Team:**
      - Root: CRM Manager (orchestrates multiple systems)
      - Children: Individual CRM specialists (Salesforce, HubSpot, etc.)

      **Research Team:**
      - Root: Research Director (plans and synthesizes)
      - Children: Web researcher, document analyst, data processor

      **Content Production Team:**
      - Root: Content Orchestrator (manages workflow)
      - Children: Writer, editor, SEO optimizer, publisher


version: "1.0"
namespace: keeper.agents.manager

entries:
  # keeper.agents.manager:agent_management_knowledge
  - name: agent_management_knowledge
    kind: registry.entry
    meta:
      type: agent.trait
      title: Agent Management Core Knowledge
      comment: Comprehensive understanding of agent creation, configuration, and visibility
      tags:
        - knowledge
        - management
        - configuration
      icon: tabler:settings
    prompt: |-
      ## Agent Management Knowledge

      You understand how to create and configure agents effectively on the Wippy platform.

      ### Agent Visibility Principles

      **Public Class Usage:**
      - Standalone agents that users interact with directly need `class: [public]`
      - Root orchestrators in team structures need `class: [public]`
      - Child delegates in teams don't need public class - only parent is user-facing
      - When adding to existing namespaces, check context to determine if public needed

      ### Configuration Essentials

      **Required Elements:**
      - Proper entry structure with kind, meta, and configuration
      - Model selection from available models (use list_models)
      - Tool and trait validation (verify they exist)
      - Appropriate temperature and token settings
      - Clear, focused prompts

      **Model Selection Strategy:**
      - Always check available models first
      - Match model capabilities to agent requirements
      - Consider cost vs performance tradeoffs
      - Thinking effort only works with reasoning-capable models

      ### Enhancement Approaches

      **Memory Usage:**
      - Memories override prompt instructions
      - Can accumulate many memories (10-20+) before prompt rewrite needed
      - Perfect for behavioral corrections and quick fixes
      - Easier to test and iterate than prompt changes

      **When to Modify Prompts:**
      - Fundamental behavior changes
      - Memory list becomes unwieldy
      - Architectural restructuring needed

      ### Platform Capabilities

      **Know What Exists:**
      - Use discovery tools to find available resources
      - Check for existing similar agents to extend
      - Verify tools and traits before referencing
      - Understand when to redirect to engineer for new capabilities

  # keeper.agents.manager:analyze_agent
  - name: analyze_agent
    kind: function.lua
    meta:
      type: tool
      title: Analyze Agent
      comment: Comprehensive analysis of agent configuration with validation
      hard: rock
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {
              "type": "string",
              "pattern": "^[^:]+:[^:]+$",
              "description": "Agent ID to analyze"
            }
          },
          "required": ["agent_id"],
          "additionalProperties": false
        }
      llm_alias: AnalyzeAgent
      llm_description: Analyzes agent configuration including validation, compatibility checks, and recommendations for improvement.
    source: file://analyze_agent.lua
    modules:
      - registry
      - json
    imports:
      llm: wippy.llm:llm
      traits: wippy.agent.discovery:traits
    method: handler

  # keeper.agents.manager:clone_agent
  - name: clone_agent
    kind: function.lua
    meta:
      type: tool
      title: Clone Agent
      comment: Clones an existing agent with optional modifications
      input_schema: |
        {
          "type": "object",
          "properties": {
            "source_agent_id": {
              "type": "string",
              "pattern": "^[^:]+:[^:]+$",
              "description": "Agent to clone from"
            },
            "new_agent_id": {
              "type": "string",
              "description": "New agent ID (will add app.agents: prefix if no namespace provided)"
            },
            "modifications": {
              "type": "object",
              "properties": {
                "prompt": {"type": "string"},
                "comment": {"type": "string"},
                "model": {"type": "string"},
                "max_tokens": {"type": "integer", "minimum": 1},
                "temperature": {"type": "number", "minimum": 0, "maximum": 1},
                "thinking_effort": {"type": "integer", "minimum": 0, "maximum": 100},
                "title": {"type": "string"},
                "icon": {"type": "string"},
                "class": {"type": "array", "items": {"type": "string"}}
              },
              "additionalProperties": false,
              "description": "Fields to modify in the clone"
            }
          },
          "required": ["source_agent_id", "new_agent_id"],
          "additionalProperties": false
        }
      llm_alias: CloneAgent
      llm_description: Creates a copy of an existing agent with optional modifications. Useful for creating variations.
    source: file://clone_agent.lua
    modules:
      - registry
      - json
    imports:
      governance_client: keeper.gov:client
      llm: wippy.llm:llm
      traits: wippy.agent.discovery:traits
    method: handler

  # keeper.agents.manager:create_agent
  - name: create_agent
    kind: function.lua
    meta:
      type: tool
      title: Create Agent
      comment: Creates a new agent with validation and intelligent defaults
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {
              "type": "string",
              "description": "Agent identifier. If no namespace provided (no ':'), will use 'app.agents:' prefix"
            },
            "prompt": {
              "type": "string",
              "minLength": 1,
              "description": "System prompt defining agent behavior"
            },
            "comment": {
              "type": "string",
              "minLength": 1,
              "description": "Description of agent purpose"
            },
            "model": {
              "type": "string",
              "description": "LLM model to use (validated against available models)"
            },
            "max_tokens": {
              "type": "integer",
              "minimum": 1,
              "maximum": 100000,
              "description": "Maximum tokens for responses"
            },
            "temperature": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "description": "Temperature for response generation"
            },
            "thinking_effort": {
              "type": "integer",
              "minimum": 0,
              "maximum": 100,
              "description": "Thinking effort level (only for reasoning models)"
            },
            "memory": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Array of memory items"
            },
            "tools": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "id": {"type": "string"},
                  "alias": {"type": "string"},
                  "context": {"type": "object"},
                  "description": {"type": "string"}
                },
                "required": ["id"]
              },
              "description": "Array of tool objects with id, optional alias, context, and description"
            },
            "traits": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "id": {"type": "string"},
                  "context": {"type": "object"}
                },
                "required": ["id"]
              },
              "description": "Array of trait objects with id and optional context"
            },
            "delegates": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "name": {"type": "string"},
                  "id": {"type": "string"},
                  "rule": {"type": "string"},
                  "context": {"type": "object"}
                },
                "required": ["name", "id", "rule"]
              },
              "description": "Array of delegate workflow specifications"
            },
            "title": {
              "type": "string",
              "description": "Display title"
            },
            "icon": {
              "type": "string",
              "description": "Icon identifier"
            },
            "class": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Agent classes (always includes 'public' unless specified otherwise)"
            }
          },
          "required": ["agent_id", "prompt", "comment"],
          "additionalProperties": false
        }
      llm_alias: CreateAgent
      llm_description: Creates a new agent with validation and intelligent defaults. Automatically ensures agent is publicly accessible and adds app.agents namespace if none provided.
    source: file://create_agent.lua
    modules:
      - registry
      - json
    imports:
      governance_client: keeper.gov:client
      llm: wippy.llm:llm
      traits: wippy.agent.discovery:traits
    method: handler

  # keeper.agents.manager:debugging_knowledge
  - name: debugging_knowledge
    kind: registry.entry
    meta:
      type: agent.trait
      title: Agent Debugging and Analysis
      comment: Using session history and patterns to diagnose and fix agent issues
      tags:
        - knowledge
        - debugging
        - analysis
      icon: tabler:bug
    prompt: |-
      ## Debugging and Analysis Knowledge

      You understand how to diagnose and fix agent issues effectively.

      ### Session Analysis Approach

      **When Users Report Problems:**
      - Use session agent to review recent interactions
      - Look for patterns in failures or misunderstandings
      - Identify specific triggers for issues
      - Create targeted fixes based on findings

      ### Common Issue Patterns

      **Behavioral Issues:**
      - Agent misunderstands intent → Add clarifying memory
      - Agent over-complicates → Add simplification memory
      - Agent exceeds scope → Add boundary memory

      **Technical Issues:**
      - Tool failures → Verify tool exists and works
      - Context problems → Check context passing
      - Model limitations → Consider different model

      ### Fix Strategies

      **Quick Fixes:**
      - Add targeted memories for specific corrections
      - Test with user's actual scenario
      - Monitor subsequent interactions

      **Structural Fixes:**
      - Rewrite prompt if memories exceed 20
      - Add child delegate for new capability domain
      - Restructure team if workflow changed

      **Platform Limitations:**
      - Missing tools → Redirect to engineer
      - New integration needed → Engineer handles
      - Platform bug → Report appropriately

  # keeper.agents.manager:delegate_to_agent
  - name: delegate_to_agent
    kind: function.lua
    meta:
      type: tool
      title: Delegate to Agent
      comment: Run a child agent workflow and return results
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {
              "type": "string",
              "description": "Target agent ID or name to delegate to"
            },
            "message": {
              "type": "string",
              "description": "Message/task to send to the agent"
            },
            "context": {
              "type": "object",
              "description": "Optional context to pass to the agent"
            }
          },
          "required": ["agent_id", "message"],
          "additionalProperties": false
        }
      llm_alias: DelegateToAgent
      llm_description: Delegate a task to another agent by running them in an isolated workflow. The agent runs independently and returns results to you.
    source: file://delegate_to_agent.lua
    modules:
      - json
      - uuid
      - ctx
    imports:
      agent_registry: wippy.agent.discovery:registry
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
    method: handler

  # keeper.agents.manager:delete_agent

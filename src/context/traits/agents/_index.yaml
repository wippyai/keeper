version: "1.0"
namespace: keeper.context.traits.agents

entries:
  # keeper.context.traits.agents:agent_list
  - name: agent_list
    kind: function.lua
    meta:
      comment: List available agents for prompt injection
      output_schema: |
        {
          "type": "string"
        }
    source: file://agent_list.lua
    modules:
      - ctx
    imports:
      agent_registry: wippy.agent.discovery:registry
    method: handler
    
  # keeper.context.traits.agents:agents_aware
  - name: agents_aware
    kind: registry.entry
    meta:
      type: agent.trait
      title: Agents Aware
      comment: Inject available context agents into system prompt
      tags:
        - agents
        - context
        - routing
      icon: tabler:users
    context:
      target_agent_class: context_gatherer
    prompt_func_id: keeper.context.traits.agents:agent_list
    
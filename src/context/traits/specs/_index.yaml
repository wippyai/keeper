version: "1.0"
namespace: keeper.context.traits.specs

entries:
  # keeper.context.traits.specs:get_specs
  - name: get_specs
    kind: function.lua
    meta:
      type: tool
      title: Get Specs
      comment: Retrieve complete specification content for specific modules
      input_schema: |
        {
          "type": "object",
          "properties": {
            "ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Array of spec entry IDs to retrieve"
            }
          },
          "required": ["ids"]
        }
      llm_alias: get_specs
      llm_description: Retrieve complete specification content for specific modules
      output_schema: |
        {
          "type": "string"
        }
    source: file://get_specs.lua
    modules:
      - ctx
    imports:
      state_reader: keeper.state.persist:reader
    method: handler
    
  # keeper.context.traits.specs:list_all_specs
  - name: list_all_specs
    kind: function.lua
    meta:
      comment: List all available module specs - used for system prompt injection
      output_schema: |
        {
          "type": "string"
        }
    source: file://list_all_specs.lua
    modules:
      - ctx
    imports:
      state_reader: keeper.state.persist:reader
    method: handler
    
  # keeper.context.traits.specs:list_specs
  - name: list_specs
    kind: function.lua
    meta:
      type: tool
      title: List Specs
      comment: List or search module specifications
      input_schema: |
        {
          "type": "object",
          "properties": {
            "search": {
              "type": "string",
              "description": "Search query for finding specs by keywords"
            }
          }
        }
      llm_alias: list_specs
      llm_description: List or search available module specifications
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {
              "type": "boolean"
            },
            "specs": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "id": {"type": "string"},
                  "module": {"type": "string"},
                  "title": {"type": "string"},
                  "comment": {"type": "string"},
                  "tags": {"type": "array", "items": {"type": "string"}}
                }
              }
            },
            "count": {
              "type": "integer"
            }
          }
        }
    source: file://list_specs.lua
    modules:
      - ctx
    imports:
      state_reader: keeper.state.persist:reader
    method: handler
    
  # keeper.context.traits.specs:specs_aware
  - name: specs_aware
    kind: registry.entry
    meta:
      type: agent.trait
      title: Specs Aware
      comment: Inject available module specifications into system prompt
      tags:
        - specs
        - documentation
        - context
      icon: tabler:book-2
    prompt: Available module specifications in the system.
    tools:
      - keeper.context.traits.specs:get_specs
    prompt_func_id: keeper.context.traits.specs:list_all_specs
    
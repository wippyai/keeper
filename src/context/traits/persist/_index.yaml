version: "1.0"
namespace: keeper.context.traits.persist

entries:
  # keeper.context.traits.persist:get_persist_tree
  - name: get_persist_tree
    kind: function.lua
    meta:
      comment: Returns tree structure of persist layer entries using SQL module
      output_schema: |
        {
          "type": "string"
        }
    source: file://get_persist_tree.lua
    modules:
      - ctx
    imports:
      state_reader: keeper.state.persist:reader
    method: handler
    
  # keeper.context.traits.persist:persist_aware
  - name: persist_aware
    kind: registry.entry
    meta:
      type: agent.trait
      title: Persist Aware
      comment: Inject persist layer entries using SQL module
      tags:
        - persist
        - database
        - sql
      icon: tabler:database
    prompt: Persist layer ecosystem showing all entries with SQL module dependency organized by namespace. Includes repositories, operations (CQRS), readers, writers, and constants for database operations.
    tools:
      - keeper.state.traits.explore:get_entries
    prompt_func_id: keeper.context.traits.persist:get_persist_tree
    
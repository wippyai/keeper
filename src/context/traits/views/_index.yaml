version: "1.0"
namespace: keeper.context.traits.views

entries:
  # keeper.context.traits.views:get_view_tree
  - name: get_view_tree
    kind: function.lua
    meta:
      comment: Returns tree structure of all view-related entries (views, templates, resources)
      output_schema: |
        {
          "type": "string"
        }
    source: file://get_view_tree.lua
    modules:
      - ctx
    imports:
      state_reader: keeper.state.persist:reader
    method: handler
    
  # keeper.context.traits.views:views_aware
  - name: views_aware
    kind: registry.entry
    meta:
      type: agent.trait
      title: Views Aware
      comment: Inject complete view/template/resource tree into system prompt
      tags:
        - views
        - context
        - discovery
      icon: tabler:layout-dashboard
    prompt: View ecosystem structure showing all views, templates, and resources organized by namespace.
    tools:
      - keeper.state.traits.explore:get_entries
    prompt_func_id: keeper.context.traits.views:get_view_tree
    
version: "1.0"
namespace: keeper.knowledge.changelog.api

entries:
  # keeper.knowledge.changelog.api:list
  - name: list
    kind: function.lua
    meta:
      comment: List changelog entries with optional filtering
      router: app:api
    source: file://list.lua
    modules:
      - http
      - security
    imports:
      changelog_repo: keeper.knowledge.changelog:changelog
    method: handler
    pool:
      size: 2
    
  # keeper.knowledge.changelog.api:list.endpoint
  - name: list.endpoint
    kind: http.endpoint
    meta:
      comment: List changelog entries
      router: app:api
    method: GET
    func: list
    path: /keeper/changelog/list
    
  # keeper.knowledge.changelog.api:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Changelog API endpoint tests
      depends_on:
        - ns:app
        - ns:wippy.test
    source: file://test.lua
    modules:
      - json
      - http_client
      - security
    imports:
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.knowledge.changelog.api:versions
  - name: versions
    kind: function.lua
    meta:
      comment: List changelog grouped by version
      router: app:api
    source: file://versions.lua
    modules:
      - http
      - security
    imports:
      changelog_repo: keeper.knowledge.changelog:changelog
    method: handler
    pool:
      size: 2
    
  # keeper.knowledge.changelog.api:versions.endpoint
  - name: versions.endpoint
    kind: http.endpoint
    meta:
      comment: List version history
      router: app:api
    method: GET
    func: versions
    path: /keeper/changelog/versions
    
version: "1.0"
namespace: keeper.views.overlay

entries:
  # keeper.views.overlay:list
  - name: list
    kind: template.jet
    meta:
      name: keeper.views.overlay.list
      type: view.page
      title: Workspaces
      group: Keeper
      icon: tabler:layers-difference
      description: View and manage your overlay workspaces
      order: 127
      content_type: text/html
      announced: true
      group_order: 9999
      group_placement: bottom
      secure: true
    source: file://list.jet
    set: keeper.views.common:templates
    
  # keeper.views.overlay:view
  - name: view
    kind: template.jet
    meta:
      name: keeper.views.overlay.view
      type: view.page
      title: Workspace Editor
      group: Keeper
      icon: tabler:edit
      description: Edit workspace entries and manage overlay changes
      content_type: text/html
      secure: true
    source: file://view.jet
    set: keeper.views.common:templates
    
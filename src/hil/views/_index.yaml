version: "1.0"
namespace: keeper.hil.views

entries:
  # keeper.hil.views:env_mappings
  - name: env_mappings
    kind: registry.entry
    meta:
      type: view.env_mapping
      description: Default environment variable mappings for Keeper HIL views
      category: keeper
      priority: 20
      template_set: keeper.hil.views:templates
    mappings:
      web_host_origin: keeper.env:web_host_origin

  # keeper.hil.views:alpine.js
  - name: alpine.js
    kind: registry.entry
    meta:
      name: Alpine.js
      type: view.resource
      order: 6
      defer: true
      resource_type: script
      template_set: keeper.hil.views:templates
      url: https://unpkg.com/alpinejs@3.13.0/dist/cdn.min.js

  # keeper.hil.views:approval
  - name: approval
    kind: template.jet
    meta:
      name: keeper.hil.views.approval
      type: view.page
      title: Registry Push Approval
      icon: tabler:check-circle
      description: Human-in-loop approval interface for registry changes
      content_type: text/html
      secure: true
    source: file://approval.jet
    set: keeper.hil.views:templates
    data_func: keeper.hil.views:approval.data

  # keeper.hil.views:approval.data
  - name: approval.data
    kind: function.lua
    meta:
      type: view.data
    source: file://approval.data.lua
    method: handler

  # keeper.hil.views:tailwindcss
  - name: tailwindcss
    kind: registry.entry
    meta:
      name: TailwindCSS
      type: view.resource
      order: 5
      resource_type: script
      template_set: keeper.hil.views:templates
      url: https://cdn.tailwindcss.com

  # keeper.hil.views:templates
  - name: templates
    kind: template.set
    meta:
      description: Template set for HIL approval views
    engine:
      development_mode: true

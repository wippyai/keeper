version: "1.0"
namespace: keeper.api.models

entries:
  # keeper.api.models:list_models
  - name: list_models
    kind: function.lua
    meta:
      comment: Lists available models with UI relevant metadata
    source: file://list_models.lua
    modules:
      - http
      - json
    imports:
      models: wippy.llm.discovery:models
    method: handler
    pool:
      size: 2
    
  # keeper.api.models:list_models.endpoint
  - name: list_models.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that lists models with UI relevant metadata
    method: GET
    func: list_models
    path: /keeper/models/list
    
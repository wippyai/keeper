version: "1.0"
namespace: keeper.api.env

entries:
  # keeper.api.env:list_variables
  - name: list_variables
    kind: function.lua
    meta:
      comment: Lists all environment variables with their status
    source: file://list_variables.lua
    modules:
      - http
      - json
      - env
      - registry
    method: handler
    
  # keeper.api.env:list_variables.endpoint
  - name: list_variables.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for listing environment variables with status
      router: app:api
    method: GET
    func: list_variables
    path: /keeper/env/list
    
  # keeper.api.env:set_variable
  - name: set_variable
    kind: function.lua
    meta:
      comment: Sets an environment variable value
    source: file://set_variable.lua
    modules:
      - http
      - json
      - env
    method: handler
    
  # keeper.api.env:set_variable.endpoint
  - name: set_variable.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for setting environment variable values
      router: app:api
    method: POST
    func: set_variable
    path: /keeper/env/set
    
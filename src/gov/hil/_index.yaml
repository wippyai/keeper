version: "1.0"
namespace: keeper.gov.hil

entries:
  # keeper.gov.hil:linter
  - name: linter
    kind: function.lua
    meta:
      name: Human-In-Loop Approval Linter
      comment: Human-in-loop linter for registry changes requiring approval
      tags:
        - linting
        - hil
        - human-approval
        - validation
        - governance
      description: Intercepts registry changes that require human approval and creates HIL workflow with session artifacts
      level: 100
      priority: 5000
    source: file://linter.lua
    modules:
      - json
      - uuid
      - logger
      - process
      - channel
      - time
    imports:
      artifact_repo: wippy.session.persist:artifact_repo
    method: handle
    
  # keeper.gov.hil:linter_test
  - name: linter_test
    kind: function.lua
    meta:
      type: test
      comment: HIL linter input validation and pass-through paths
      suite: gov.hil
    source: file://linter_test.lua
    imports:
      linter: keeper.gov.hil:linter
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
version: "1.0"
namespace: keeper.gov.hil.views

entries:
  # keeper.gov.hil.views:alpine.js
  - name: alpine.js
    kind: registry.entry
    meta:
      name: Alpine.js
      type: view.resource
      order: 6
      defer: true
      resource_type: script
      template_set: keeper.gov.hil.views:templates
      url: https://unpkg.com/alpinejs@3.13.0/dist/cdn.min.js
    
  # keeper.gov.hil.views:approval
  - name: approval
    kind: template.jet
    meta:
      name: keeper.gov.hil.views.approval
      type: view.page
      title: Registry Push Approval
      icon: tabler:check-circle
      description: Human-in-loop approval interface for registry changes
      content_type: text/html
      secure: true
    source: file://approval.jet
    set: keeper.gov.hil.views:templates
    data_func: keeper.gov.hil.views:approval.data
    
  # keeper.gov.hil.views:approval.data
  - name: approval.data
    kind: function.lua
    meta:
      type: view.data
    source: file://approval.data.lua
    method: handler
    
  # keeper.gov.hil.views:tailwindcss
  - name: tailwindcss
    kind: registry.entry
    meta:
      name: TailwindCSS
      type: view.resource
      order: 5
      resource_type: script
      template_set: keeper.gov.hil.views:templates
      url: https://cdn.tailwindcss.com
    
  # keeper.gov.hil.views:templates
  - name: templates
    kind: template.set
    meta:
      description: Template set for HIL approval views
    engine:
      development_mode: true
    
  # keeper.gov.hil.views:wippy-api
  - name: wippy-api
    kind: registry.entry
    meta:
      name: WippyAPI
      type: view.resource
      order: 10
      resource_type: script
      template_set: keeper.gov.hil.views:templates
      url: https://front.wippy.ai/proxy.js
    
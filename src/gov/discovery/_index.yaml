version: "1.0"
namespace: keeper.gov.discovery

entries:
  # keeper.gov.discovery:observers
  - name: observers
    kind: library.lua
    meta:
      comment: Observer discovery library for governance changeset post-processing
      tags:
        - governance
        - observers
        - discovery
        - post-processing
      description: Discovers and manages registry observers that react to changeset operations, replacing the legacy listener registry approach
    source: file://observers.lua
    modules:
      - registry
      - logger
      - funcs
    
  # keeper.gov.discovery:observers_test
  - name: observers_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for observer discovery helpers (is_valid_observer, entry_to_observer_info, aggregate_stats)
      suite: gov_discovery
    source: file://observers_test.lua
    imports:
      observers: keeper.gov.discovery:observers
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.gov.discovery:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Observer discovery tests
      suite: gov_discovery
    source: file://test.lua
    imports:
      observers: keeper.gov.discovery:observers
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
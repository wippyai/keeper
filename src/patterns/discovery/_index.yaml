version: "1.0"
namespace: keeper.patterns.discovery

entries:
  # keeper.patterns.discovery:registry
  - name: registry
    kind: library.lua
    meta:
      type: library
      comment: Pattern registry library for discovering and loading patterns
    source: file://registry.lua
    modules:
      - registry
      - json

  # keeper.patterns.discovery:registry_test
  - name: registry_test
    kind: function.lua
    meta:
      name: Pattern Registry Test
      type: test
      comment: Tests the pattern registry library functionality
      group: Keeper / Patterns
      tags:
        - patterns
        - registry
        - discovery
        - tests
    source: file://registry_test.lua
    imports:
      pattern_registry: keeper.patterns.discovery:registry
      test: wippy.test:test
    method: run_tests
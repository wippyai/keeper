version: "1.0"
namespace: keeper.env

entries:
  # Injection points the module requirements write their .default onto. Lua
  # modules read these at runtime via env / registry so the hardcoded
  # "app:db" / "app:processes" / etc strings are removed from source.
  - name: database_resource
    kind: env.variable
    meta:
      description: SQLite resource id keeper tables live on. Injected by keeper:database_resource ns.requirement.
    default: app:db

  - name: process_host
    kind: env.variable
    meta:
      description: Process host keeper spawns on. Injected by keeper:process_host ns.requirement.
    default: app:processes

  - name: mcp_gateway
    kind: env.variable
    meta:
      description: Outer HTTP gateway id to mount MCP under. Optional — when unset, MCP runs its own server on port 9067. Injected by keeper:mcp_gateway ns.requirement.
    default: ""

version: "1.0"
namespace: keeper.user.api

entries:
  # keeper.user.api:change_password
  - name: change_password
    kind: function.lua
    meta:
      comment: Change user password (can change own or others as admin)
      router: app:api
    source: file://change_password.lua
    modules:
      - http
      - security
    imports:
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # keeper.user.api:change_password.endpoint
  - name: change_password.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for changing user passwords
      depends_on:
        - ns:app
      router: app:api
    method: PUT
    func: change_password
    path: /keeper/users/{id}/password
    
  # keeper.user.api:create_user
  - name: create_user
    kind: function.lua
    meta:
      comment: Create a new user with optional security groups
      router: app:api
    source: file://create_user.lua
    modules:
      - http
      - security
      - crypto
      - uuid
    imports:
      consts: userspace.user:consts
      user_groups_repo: userspace.user.persist:user_groups_repo
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # keeper.user.api:create_user.endpoint
  - name: create_user.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for creating new users
      depends_on:
        - ns:app
      router: app:api
    method: POST
    func: create_user
    path: /keeper/users
    
  # keeper.user.api:delete_user
  - name: delete_user
    kind: function.lua
    meta:
      comment: Delete a user (cannot delete self)
      router: app:api
    source: file://delete_user.lua
    modules:
      - http
      - security
    imports:
      user_groups_repo: userspace.user.persist:user_groups_repo
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # keeper.user.api:delete_user.endpoint
  - name: delete_user.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for deleting users
      depends_on:
        - ns:app
      router: app:api
    method: DELETE
    func: delete_user
    path: /keeper/users/{id}
    
  # keeper.user.api:get_user
  - name: get_user
    kind: function.lua
    meta:
      comment: Get a single user by ID with security groups
      router: app:api
    source: file://get_user.lua
    modules:
      - http
      - security
    imports:
      user_groups_repo: userspace.user.persist:user_groups_repo
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # keeper.user.api:get_user.endpoint
  - name: get_user.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for getting a single user
      depends_on:
        - ns:app
      router: app:api
    method: GET
    func: get_user
    path: /keeper/users/{id}
    
  # keeper.user.api:list_security_groups
  - name: list_security_groups
    kind: function.lua
    meta:
      comment: List available security groups for user assignment
      router: app:api
    source: file://list_security_groups.lua
    modules:
      - http
      - security
    method: handler
    
  # keeper.user.api:list_security_groups.endpoint
  - name: list_security_groups.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for listing security groups
      depends_on:
        - ns:app
      router: app:api
    method: GET
    func: list_security_groups
    path: /keeper/security-groups
    
  # keeper.user.api:list_users
  - name: list_users
    kind: function.lua
    meta:
      comment: List all users with their security groups for admin management
      router: app:api
    source: file://list_users.lua
    modules:
      - http
      - security
    imports:
      user_groups_repo: userspace.user.persist:user_groups_repo
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # keeper.user.api:list_users.endpoint
  - name: list_users.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for listing all users for keeper management
      depends_on:
        - ns:app
      router: app:api
    method: GET
    func: list_users
    path: /keeper/users
    
  # keeper.user.api:update_user
  - name: update_user
    kind: function.lua
    meta:
      comment: Update user details and security groups
      router: app:api
    source: file://update_user.lua
    modules:
      - http
      - security
    imports:
      user_groups_repo: userspace.user.persist:user_groups_repo
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # keeper.user.api:update_user.endpoint
  - name: update_user.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for updating user details
      depends_on:
        - ns:app
      router: app:api
    method: PUT
    func: update_user
    path: /keeper/users/{id}
    
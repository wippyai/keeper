version: "1.0"
namespace: keeper.user.views

entries:
  # keeper.user.views:list
  - name: list
    kind: template.jet
    meta:
      name: keeper.user.views.list
      type: view.page
      title: User Management
      group: Keeper
      icon: tabler:users
      description: Manage system users and their security groups
      order: 120
      content_type: text/html
      announced: true
      group_icon: tabler:settings
      group_order: 9999
      group_placement: bottom
      secure: true
    source: file://list.jet
    set: keeper.views.common:templates
    
  # keeper.user.views:view
  - name: view
    kind: template.jet
    meta:
      name: keeper.user.views.view
      type: view.page
      title: User Details
      group: Keeper
      icon: tabler:user-cog
      description: View and manage individual user details
      content_type: text/html
      secure: true
    source: file://view.jet
    set: keeper.views.common:templates
    path_params:
      - name: user_id
        type: string
        description: User ID to manage
        required: true
    
version: "1.0"
namespace: keeper.test.traits.invoke

entries:
  - name: invoker
    kind: registry.entry
    meta:
      type: agent.trait
      title: Function Invoker
      comment: Invoke other functions and tools dynamically
      tags:
        - functions
        - tools
        - invoke
        - trait
      icon: tabler:terminal-2
    prompt: |
      You can invoke functions and tools dynamically using invoke_function.
      
      Provide target in "namespace:name" format and arguments as object.
      Supports both sync execution and context passing.
      Returns function result or error details.
    tools:
      - keeper.test.traits.invoke:invoke_function

  - name: invoke_function
    kind: function.lua
    meta:
      type: tool
      title: Invoke Function
      comment: Execute function with given arguments
      input_schema: |
        {
          "type": "object",
          "properties": {
            "target": {
              "type": "string",
              "description": "Function target in namespace:name format"
            },
            "args": {
              "type": "object",
              "description": "Function arguments as object"
            },
            "context": {
              "type": "object",
              "description": "Optional execution context"
            }
          },
          "required": ["target"]
        }
      llm_description: Invoke functions dynamically with arguments and optional context
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {"type": "boolean"},
            "result": {"description": "Function result"},
            "error": {"type": "string"}
          }
        }
    source: file://invoke_function.lua
    modules:
      - funcs
    method: handler
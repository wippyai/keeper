version: "1.0"
namespace: keeper.test.traits.endpoints

entries:
  # keeper.test.traits.endpoints:endpoint_tester
  - name: endpoint_tester
    kind: registry.entry
    meta:
      type: agent.trait
      title: Endpoint Tester
      comment: Test internal HTTP endpoints with authenticated requests
      tags:
        - integration
        - testing
        - endpoints
        - http
        - trait
      icon: tabler:test-pipe
    prompt: |
      You can test internal HTTP endpoints using your current authentication.
      
      Use test_endpoint to make authenticated requests:
      - Automatically creates temporary token from current actor
      - Supports GET, POST, PUT, DELETE, PATCH methods
      - Pass JSON body for POST/PUT/PATCH requests as object (auto-encoded)
      - Returns status code, response body, and headers
      - Useful for testing API endpoints during development
      
      Example:
      test_endpoint({
        method: "POST",
        path: "/api/v1/todos",
        body: { title: "My task", description: "Task details" }
      })
    tools:
      - keeper.test.traits.endpoints:test_endpoint

  # keeper.test.traits.endpoints:test_endpoint
  - name: test_endpoint
    kind: function.lua
    meta:
      type: tool
      title: Test Endpoint
      comment: Test internal HTTP endpoint with current actor token
      input_schema: |
        {
          "type": "object",
          "properties": {
            "method": {
              "type": "string",
              "enum": ["GET", "POST", "PUT", "DELETE", "PATCH"],
              "description": "HTTP method"
            },
            "path": {
              "type": "string",
              "description": "Endpoint path (e.g., /api/v1/todos)"
            },
            "body": {
              "type": "object",
              "description": "Request body as JSON object (will be automatically encoded)"
            },
            "headers": {
              "type": "object",
              "description": "Additional headers (Authorization is added automatically)"
            },
            "timeout": {
              "type": "integer",
              "description": "Request timeout in seconds (default: 30)"
            }
          },
          "required": ["method", "path"]
        }
      llm_description: Test internal HTTP endpoints using current actor credentials. Automatically creates auth token and encodes body as JSON.
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {"type": "boolean"},
            "status": {"type": "integer"},
            "body": {"type": "string"},
            "headers": {"type": "object"},
            "error": {"type": "string"}
          }
        }
    source: file://test_endpoint.lua
    modules:
      - security
      - http_client
      - json
      - env
    imports:
      consts: userspace.user:consts
    method: handler
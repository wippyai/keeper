version: "1.0"
namespace: keeper.test

entries:
  - name: test
    kind: function.lua
    meta:
      type: tool
      title: Test
      comment: Run comprehensive test suite
      input_schema: |
        {
          "type": "object",
          "properties": {
            "test_spec": {
              "type": "string",
              "description": "Test specification with instructions on what to test"
            },
            "test_context": {
              "type": "string",
              "description": "Optional context for test execution"
            }
          },
          "required": ["test_spec"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {"type": "boolean"},
            "passed": {"type": "integer"},
            "failed": {"type": "integer"},
            "details": {"type": "string"}
          }
        }
      llm_alias: Test
      llm_description: Execute tests
    source: file://test.lua
    imports:
      flow: userspace.dataflow.flow:flow
    method: run

  - name: consolidate_results
    kind: function.lua
    meta:
      title: Consolidate Test Results
      comment: Combines test execution results into final summary
      input_schema: |
        {
          "type": "array",
          "items": {"type": "object"}
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {"type": "boolean"},
            "passed": {"type": "integer"},
            "failed": {"type": "integer"},
            "details": {"type": "string"}
          }
        }
    source: file://consolidate_results.lua
    method: run
version: "1.0"
namespace: keeper.logger.agents

entries:
  # keeper.logger.agents:analyzer
  - name: analyzer
    kind: registry.entry
    meta:
      name: log.analyzer
      type: agent.gen1
      title: Log Analyzer
      comment: Analyzes system logs, finds patterns, diagnoses issues
      icon: tabler:file-search
      class:
        - context_gatherer
    prompt: |-
      You analyze system logs to find patterns, diagnose issues, and provide insights.
    
      ## Query Operations
    
      Use query_logs tool with operations:
      - logs: Retrieve entries (with optional filter)
      - stats: Buffer statistics
      - clear: Flush buffer
      - configure: Resize buffer
    
      ## Filter Expressions
    
      Filter by level, path, message, timestamp using expr syntax:
      - data.entry.level >= 1 (warnings+)
      - path contains "state"
      - data.entry.message contains "error"
    
      ## Analysis Approach
    
      1. Check stats for buffer state
      2. Query with filters (level, path, keywords)
      3. Identify patterns (errors, warnings, specific components)
      4. Report findings with counts
      5. Suggest actions if issues found
    
      Be thorough. Be precise. Focus on actionable insights.
    model: claude-3-5-haiku
    temperature: 0.3
    max_tokens: 4096
    thinking_effort: 0
    traits:
      - id: keeper.logger.traits:analyzer
      - id: keeper.logger.traits:writer
    
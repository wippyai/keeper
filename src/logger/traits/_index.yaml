version: "1.0"
namespace: keeper.logger.traits

entries:
  # keeper.logger.traits:analyzer
  - name: analyzer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Log Analyzer
      comment: Query and analyze system logs
      tags:
        - logs
        - monitoring
        - debug
      icon: tabler:file-search
    prompt: |
      Query and analyze system logs.
    
      ## Quick Start
    
      **All errors (up to 1000):**
      ```json
      {"filter": "level == 2"}
      ```
    
      **Last 100 logs:**
      ```json
      {"count": 100}
      ```
    
      **Analyze what's in buffer:**
      ```json
      {"operation": "composition"}
      ```
    
      ## How It Works
    
      **Filtering:**
      - Filter ALWAYS searches ALL logs in buffer
      - Finds every match (no limit on search)
      - Then limits output to count (default 1000)
    
      **Example:** Buffer has 10,000 logs, 50 are ERROR.
      - `{"filter": "level == 2"}` → searches all 10k, finds all 50, returns all 50
      - `{"filter": "level == 2", "count": 10}` → searches all 10k, finds all 50, returns 10 newest
    
      ## Operations
    
      ### 1. logs (DEFAULT)
    
      Retrieves log entries. Operation defaults to "logs".
    
      **Parameters:**
      - count: Max to return (default 1000)
      - filter: Search ALL logs
      - reverse: Newest first (default true)
    
      **Common patterns:**
      - Last 100: `{"count": 100}`
      - All errors: `{"filter": "level == 2"}`
      - 50 newest warnings: `{"filter": "level >= 1", "count": 50}`
      - All INFO chronological: `{"filter": "level == 0", "reverse": false}`
    
      ### 2. composition
    
      Analyzes buffer contents. Scans ALL logs (no count limit).
    
      Returns:
      - Level distribution (DEBUG/INFO/WARN/ERROR counts)
      - Top 15 paths
      - Top 15 field keys
    
      **Use this first** to see what's available.
    
      **Examples:**
      - All logs: `{"operation": "composition"}`
      - Only errors: `{"operation": "composition", "filter": "level == 2"}`
      - Specific component: `{"operation": "composition", "filter": "path contains \"state\""}`
    
      ### 3. stats
    
      Buffer metadata: size, stored count, total received, uptime.
    
      ```json
      {"operation": "stats"}
      ```
    
      ## Log Entry Fields
    
      - **timestamp**: Unix nano when received
      - **path**: Component name (e.g., "state.init.worker")
      - **level**: -1=DEBUG, 0=INFO, 1=WARN, 2=ERROR
      - **message**: Log text
      - **fields.key**: Structured data (flat access)
    
      ## Filter Syntax
    
      Uses expr-lang. All fields are flat.
    
      **Level:**
      - `level == 2` → errors only
      - `level >= 1` → warnings and errors
      - `level == 0` → info only
    
      **Path:**
      - `path == "exact.match"`
      - `path contains "substring"`
      - `path startsWith "prefix"`
    
      **Message:**
      - `message contains "error"`
      - `message contains "failed" || message contains "timeout"`
    
      **Fields:**
      - `fields.database == "sessions"`
      - `fields.count > 100`
      - `fields.status == "failed"`
    
      **Combined:**
      - `level >= 1 && path contains "worker"`
      - `fields.status == "failed" && message contains "retry"`
    
      ## Workflow
    
      1. `{"operation": "composition"}` - see what's there
      2. `{"filter": "..."}` - query based on composition
      3. Results are newest first (most recent at top)
      4. Analyze and report
    
      ## Key Points
    
      - Operation defaults to "logs"
      - Filter searches ALL logs, always
      - Count limits output, not search
      - Default count: 1000 (protects agent)
      - Default reverse: true (newest first)
      - Composition has no count limit
    tools:
      - keeper.logger.traits:query
    
  # keeper.logger.traits:query
  - name: query
    kind: function.lua
    meta:
      type: tool
      title: Query Logs
      comment: Query and filter system logs
      input_schema: |
        {
          "type": "object",
          "properties": {
            "operation": {
              "type": "string",
              "enum": ["logs", "stats", "composition"],
              "description": "Operation type (default: logs)"
            },
            "count": {
              "type": "integer",
              "default": 1000,
              "description": "[logs] Max logs to return (default 1000)"
            },
            "filter": {
              "type": "string",
              "description": "Expression filter (searches ALL logs)"
            },
            "reverse": {
              "type": "boolean",
              "default": true,
              "description": "[logs] Newest first (true) or oldest first (false)"
            }
          }
        }
      llm_alias: query_logs
      llm_description: |
        Query system logs. Defaults to "logs" operation.
    
        **Quick patterns:**
        {"filter": "level == 2"}  - all errors (up to 1000)
        {"count": 100}  - last 100 logs
        {"filter": "level >= 1", "count": 50}  - 50 newest warnings/errors
    
        **Operations:**
    
        1. logs (DEFAULT): Retrieve log entries
           - Filters ALL logs, returns up to count (default 1000)
           - Results newest first by default
           - Examples:
             {"filter": "level == 2"}
             {"count": 500, "filter": "path contains \"state\""}
             {"filter": "level == 0", "count": 100}
    
        2. composition: Analyze buffer
           - Scans ALL logs (or filtered subset)
           - Returns: level counts, top paths, field keys
           - No count limit
           - Example: {"operation": "composition", "filter": "level >= 1"}
    
        3. stats: Buffer metadata
           - Returns: size, count, uptime
           - Example: {"operation": "stats"}
    
        **Filter behavior:**
        - Filter ALWAYS searches ALL logs in buffer
        - Then count limits output (logs only)
        - Then reverse orders results (logs only)
    
        **Memory safe:**
        - logs operation: max 1000 entries by default
        - composition: returns stats only, not logs
    source: file://query.lua
    modules:
      - logger
      - time
      - uuid
    imports:
      logger_client: keeper.logger:client
    method: handler
    
  # keeper.logger.traits:write
  - name: write
    kind: function.lua
    meta:
      type: tool
      title: Write Log
      comment: Write test logs and admin operations
      input_schema: |
        {
          "type": "object",
          "properties": {
            "operation": {
              "type": "string",
              "enum": ["write", "clear", "configure"]
            },
            "message": {"type": "string"},
            "level": {"type": "integer", "default": 0},
            "path": {"type": "string", "default": "test.logger"},
            "fields": {"type": "object"},
            "buffer_size": {"type": "integer"}
          }
        }
      llm_alias: write_log
      llm_description: |
        Write logs or admin:
    
        1. write: Test log
           {"message": "Test", "level": 0, "path": "test.logger", "fields": {"key": "val"}}
    
        2. clear: Clear buffer
           {"operation": "clear"}
    
        3. configure: Set buffer size (default 50k)
           {"operation": "configure", "buffer_size": 100000}
    source: file://write.lua
    modules:
      - logger
    imports:
      logger_client: keeper.logger:client
    method: handler
    
  # keeper.logger.traits:writer
  - name: writer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Log Writer
      comment: Write test logs and manage buffer
      tags:
        - logs
        - testing
        - admin
      icon: tabler:file-pencil
    prompt: |
      Write test logs and manage buffer.
    
      ## Operations
    
      **write**: Test log
      ```json
      {"message": "Test", "level": 0, "path": "test.logger", "fields": {"key": "val"}}
      ```
    
      **clear**: Flush buffer
      ```json
      {"operation": "clear"}
      ```
    
      **configure**: Set buffer size (default 50k)
      ```json
      {"operation": "configure", "buffer_size": 100000}
      ```
    
      Levels: -1=DEBUG, 0=INFO, 1=WARN, 2=ERROR
    tools:
      - keeper.logger.traits:write
    
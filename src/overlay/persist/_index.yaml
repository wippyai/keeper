version: "1.0"
namespace: keeper.overlay.persist

entries:
  # keeper.overlay.persist:ops
  - name: ops
    kind: library.lua
    meta:
      name: Overlay Operations
      comment: CQRS command handlers for workspace and entry operations
      tags:
        - keeper
        - overlay
        - operations
        - commands
        - cqrs
      description: |-
        Command handlers for workspaces and workspace entries. Handles all mutation operations
        including creating, updating, and deleting workspaces and entries.
      private: true
    source: file://ops.lua
    modules:
      - sql
      - json
      - time
      - uuid
    imports:
      consts: keeper.overlay:consts
    method: overlay_ops
    
  # keeper.overlay.persist:reader
  - name: reader
    kind: library.lua
    meta:
      name: Overlay Reader
      comment: Fluent API for reading workspaces and workspace entries
      tags:
        - keeper
        - overlay
        - workspace
        - reader
        - fluent
      description: |-
        Provides a fluent, immutable API for reading registry workspaces and their entries.
        Supports complex filtering, joining, and fetching options.
    source: file://reader.lua
    modules:
      - sql
      - json
    imports:
      consts: keeper.overlay:consts
    method: overlay_reader
    
  # keeper.overlay.persist:writer
  - name: writer
    kind: library.lua
    meta:
      name: Overlay Writer
      comment: Transaction management and real-time publishing for overlay operations
      tags:
        - keeper
        - overlay
        - writer
        - transactions
        - publishing
        - realtime
      description: |-
        Manages transactions for overlay operations, executes commands via ops handlers,
        and publishes real-time updates to workspace-specific topics.
    source: file://writer.lua
    modules:
      - sql
      - json
      - uuid
      - time
      - security
    imports:
      consts: keeper.overlay:consts
      overlay_ops: keeper.overlay.persist:ops
    method: overlay_writer
    
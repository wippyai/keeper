version: "1.0"
namespace: keeper.overlay.env

entries:
  # keeper.overlay.env:database_resource
  - name: database_resource
    kind: env.variable
    meta:
      comment: Database resource for overlay workspace storage
      icon: tabler:database
      private: true
    default: app:db
    storage: app.env:router
    variable: OVERLAY_DATABASE_RESOURCE
    
  # keeper.overlay.env:max_entries_per_workspace
  - name: max_entries_per_workspace
    kind: env.variable
    meta:
      comment: Maximum entries per workspace
      icon: tabler:list
      private: true
    default: "1000"
    storage: app.env:router
    variable: OVERLAY_MAX_ENTRIES_PER_WORKSPACE
    
  # keeper.overlay.env:max_workspaces_per_user
  - name: max_workspaces_per_user
    kind: env.variable
    meta:
      comment: Maximum workspaces per user
      icon: tabler:users
      private: true
    default: "50"
    storage: app.env:router
    variable: OVERLAY_MAX_WORKSPACES_PER_USER
    
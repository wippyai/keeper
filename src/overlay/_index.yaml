version: "1.0"
namespace: keeper.overlay

entries:
  # keeper.overlay:consts
  - name: consts
    kind: library.lua
    meta:
      comment: System-wide constants and configuration management for overlay workspace system
      description: Environment variable handling, status constants, operation types, error codes, and configuration defaults for registry overlay workspaces
    source: file://consts.lua
    modules:
      - env
    method: consts
    
  # keeper.overlay:workspace
  - name: workspace
    kind: library.lua
    meta:
      name: Workspace
      comment: Main SDK for workspace overlay operations with registry proxy
      tags:
        - keeper
        - overlay
        - workspace
        - registry
        - proxy
      description: |-
        Primary interface for workspace overlay operations. Provides registry-like API that merges
        workspace changes with main registry. Handles entry operations, metadata management,
        namespace permissions, and state tracking.
    source: file://workspace.lua
    modules:
      - json
      - registry
    imports:
      consts: keeper.overlay:consts
      reader: keeper.overlay.persist:reader
      writer: keeper.overlay.persist:writer
    method: workspace
    
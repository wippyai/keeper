version: "1.0"
namespace: keeper.overlay.traits.explore

entries:
  # keeper.overlay.traits.explore:explore
  - name: explore
    kind: function.lua
    meta:
      type: tool
      title: Explore
      comment: Unified exploration tool for namespace and workspace content
      input_schema: |
        {
          "type": "object",
          "properties": {
            "operation": {
              "type": "string",
              "enum": ["tree", "files", "search"],
              "description": "Exploration operation to perform"
            },
            "workspace_id": {
              "type": "string",
              "description": "Workspace ID (conflicts with ctx workspace_id)"
            },
            "show_original": {
              "type": "boolean",
              "default": false,
              "description": "Show original registry state without workspace overlay"
            },
            "root": {
              "type": "string",
              "default": ".",
              "description": "[tree] Root namespace to explore"
            },
            "depth": {
              "type": "integer",
              "default": -1,
              "description": "[tree] Max depth (-1 = unlimited)"
            },
            "show_entries": {
              "type": "boolean",
              "default": true,
              "description": "[tree] Show individual entries under _index.yaml"
            },
            "paths": {
              "type": "array",
              "items": {"type": "string"},
              "description": "[files] File paths to read (bulk operation)"
            },
            "query": {
              "type": "string",
              "description": "[search] Search query text"
            },
            "search_type": {
              "type": "string",
              "enum": ["text", "regex"],
              "default": "text",
              "description": "[search] Search type"
            },
            "limit": {
              "type": "integer",
              "default": 10,
              "description": "[search] Max results"
            }
          },
          "required": ["operation"]
        }
      llm_alias: Explore
      llm_description: Explore namespaces with tree view, read multiple files, or search content. Shows workspace changes when context is active. Use bulk file reading for efficiency.
    source: file://explore.lua
    modules:
      - json
      - security
      - ctx
    imports:
      registry: registry
      renderer: keeper.overlay.rfs.util:renderer
      rfs: keeper.overlay.rfs:rfs
      scanner: keeper.overlay.rfs:scanner
      snapshot: keeper.overlay.rfs:snapshot
      workspace: keeper.overlay:workspace
    method: handler
    
  # keeper.overlay.traits.explore:explorer
  - name: explorer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Namespace Explorer
      comment: Comprehensive namespace and workspace exploration capabilities with deep Wippy platform knowledge
      tags:
        - namespace
        - workspace
        - exploration
        - files
        - search
        - content
        - wippy
        - registry
      icon: tabler:folder-search
    prompt: "You have access to powerful exploration tools for navigating namespaces and workspaces with deep understanding of Wippy platform architecture.\n\n## Wippy Platform Knowledge\n\n**Root Namespace Organization:**\n```\napp/         - Application logic and user-facing services\n├── api/entries/        # HTTP endpoint functions\n├── plugins/            # External service integrations  \n├── deps/              # System dependencies\n└── env/               # Environment variables\n\nkeeper/      - System management and governance\n├── gov/service/        # Registry governance processes\n├── agents/             # AI agents and management\n└── overlay/           # Workspace and filesystem tools\n\nuserspace/   - User-owned services and components\n├── component/         # Component abstraction layer\n├── credentials/       # Credential management\n├── oauth/             # OAuth authentication flows\n└── kb9/              # Knowledge base operations\n\nwippy/       - Core framework components\n├── actor/             # Actor system primitives\n├── agent/             # AI agent runtime\n└── session/           # Session management\n```\n\n**Entry Types You'll Encounter:**\n- `registry.entry` - Data registrations with metadata (agents, components, services)\n- `function.lua` - Lua functions with module imports and execution pools\n- `library.lua` - Reusable code modules for cross-namespace sharing\n- `process.lua` - Background processes with lifecycle management\n- `process.host` - Process execution environments\n- `http.router` - HTTP routing with middleware chains\n- `http.endpoint` - Individual REST endpoints\n- `contract.definition` - Service interface schemas\n- `contract.binding` - Implementation bindings\n- `security.policy` - Access control rules\n- `env.variable` - Environment variable declarations\n- `ns.dependency` - Namespace dependencies\n\n**File Structure Patterns:**\n- `_index.yaml` - Namespace definition file (required in every namespace)\n- `*.lua` - Source files referenced by entries via `source: file://name.lua`\n- File ownership: Source files must be \"owned\" by registry entries\n- Import patterns: `imports: {local_name: namespace:entry}`\n\n## Explore Tool\n\n**Tree View** - See namespace structure with detailed entry information:\n```json\n{\"operation\": \"tree\", \"root\": \"userspace.demo\", \"depth\": 2}\n```\n\n**Read Files (PREFERRED)** - Get content from multiple files efficiently:\n```json\n{\"operation\": \"files\", \"paths\": [\"namespace/file1.lua\", \"namespace/file2.yaml\"]}\n```\n\n**Search Content** - Find text or patterns across all files:\n```json\n{\"operation\": \"search\", \"query\": \"function.*handler\", \"search_type\": \"regex\", \"limit\": 20}\n```\n\n**Compare Modes** - View original registry vs workspace changes:\n```json\n{\"operation\": \"tree\", \"show_original\": true}\n```\n\n## Tree Output Interpretation\n\n**Namespace Structure Example:**\n```\napp/agents/ [4 entries: 3 active + 1 new, read-only]\n  _index.yaml ~modified\n    * customer_support (function.lua) ~modified\n    * data_analyst (function.lua) \n    * code_reviewer (function.lua) +new\n    * task_manager (function.lua)\n  large_processor.lua +new\n```\n\n**What This Tells You:**\n- `app/agents/` - Application namespace containing agent definitions\n- `[4 entries: 3 active + 1 new, read-only]` - Entry count and permissions\n- `_index.yaml ~modified` - Namespace definition file has been changed\n- `* customer_support (function.lua)` - Registry entry of type function.lua\n- `large_processor.lua +new` - Source file created in workspace\n\n**File Types and Meanings:**\n- `_index.yaml` = Namespace definition (always present, contains entry declarations)\n- `* entry_name (kind)` = Registry entry defined in _index.yaml with its type\n- `filename.ext` = Source file referenced by entries via `source: file://filename.ext`\n\n**Status Indicators:**\n- `+new` = Created in workspace (not in original registry)\n- `~modified` = Changed in workspace (differs from registry)\n- `-deleted` = Removed in workspace (was in registry)\n- `read-only` = No write permissions for this namespace\n\n**Understanding Entry Information:**\n- Each `* entry` represents a component in the Wippy registry\n- Entry types determine behavior (function.lua = executable, library.lua = importable)\n- Status applies to both entry definitions and their source files\n- Agent entries (meta.type = `agent.gen1`) combine prompts, models, and tool access\n\n## Registry Architecture Understanding\n\n**When Exploring Functions:**\nLook for these patterns in `function.lua` entries:\n```yaml\n- name: handler_name\n  kind: function.lua\n  meta:\n    type: tool  # Often indicates agent-callable tools\n  source: file://handler.lua\n  modules: [http, json, security]  # System module dependencies\n  imports:\n    service: namespace:service_entry  # Cross-namespace references\n  method: handler  # Entry point function\n```\n\n**When Exploring Agents:**\nLook for these patterns in `registry.entry` with `agent.gen1` type:\n```yaml\n- name: agent_name\n  kind: registry.entry\n  meta:\n    type: agent.gen1\n  prompt: \"Agent behavior definition...\"\n  model: claude-4-sonnet\n  traits:\n    - id: namespace:trait_name  # Trait compositions\n  tools:\n    - namespace:tool_name  # Direct tool access\n```\n\n**When Exploring Plugins:**\nPlugin namespaces (`app/plugins/service/`) typically contain:\n- Service libraries for API interaction\n- Contract definitions for service abstraction\n- Traits bundling tools for agent use\n- Credential schemas for authentication\n\n## Efficiency Guidelines\n\n**ALWAYS prefer bulk file reading when you need multiple files:**\n```json\n// GOOD - Single call for multiple files\n{\"operation\": \"files\", \"paths\": [\"ns/a.lua\", \"ns/b.lua\", \"ns/c.lua\"]}\n\n// AVOID - Multiple individual calls\n{\"operation\": \"files\", \"paths\": [\"ns/a.lua\"]}\n{\"operation\": \"files\", \"paths\": [\"ns/b.lua\"]}\n```\n\n**Strategic Exploration Workflow:**\n1. **Tree view** - Understand namespace structure and entry types\n2. **Read _index.yaml** - See entry definitions and dependencies\n3. **Bulk read source files** - Get implementation details efficiently\n4. **Search for patterns** - Find specific functionality across codebase\n\n**Understanding Dependencies:**\n- Look for `imports:` in entries to understand component relationships\n- Check `modules:` arrays to see system module usage\n- Examine `traits:` and `tools:` to understand agent capabilities\n- Follow namespace patterns to understand architectural boundaries\n\n## Context Rules\n\n**CRITICAL:** Never provide workspace_id parameter when workspace context is already active. The tools will error if you do this.\n\n**Modes:**\n- **Workspace Mode:** Shows your changes and status indicators when workspace is active\n- **Original Mode:** Shows clean registry state with `show_original: true`\n\n**Best Practices for Wippy Exploration:**\n- Start with tree view to understand namespace organization\n- Read _index.yaml files to understand entry relationships\n- Follow import chains to understand component dependencies  \n- Look for trait compositions to understand agent capabilities\n- Check contract definitions to understand service interfaces\n- Use search to find implementation patterns across the codebase\n- Understand status indicators to track your workspace changes\n\n**Common Exploration Patterns:**\n- Exploring plugins: `tree app/plugins` → read service implementations\n- Understanding agents: `tree keeper/agents` → read prompts and configurations\n- Finding tools: `search \"meta.type.*tool\"` → locate agent-callable functions\n- Dependency analysis: Read imports in _index.yaml files\n- Architecture review: `tree` at root level → understand major subsystems\n\nThese tools help you navigate and understand the complete Wippy platform architecture, from high-level namespace organization down to individual function implementations and their relationships.\n\nPrioritize reading whole files using the files operation over viewing individual files using `str_replace_based_edit_tool`. Use tree operation to understand structure and status, and search operation to find specific content across files."
    tools:
      - keeper.overlay.traits.explore:*
    
  # keeper.overlay.traits.explore:workspace
  - name: workspace
    kind: function.lua
    meta:
      type: tool
      title: Workspace
      comment: Workspace information and status overview with optional context rendering
      input_schema: |
        {
          "type": "object",
          "properties": {
            "workspace_id": {
              "type": "string",
              "description": "Workspace ID (conflicts with ctx workspace_id)"
            },
            "include_entries": {
              "type": "boolean",
              "default": true,
              "description": "Include workspace entries in output"
            },
            "include_context": {
              "type": "boolean",
              "default": false,
              "description": "Include workspace context entries in output"
            },
            "verbose": {
              "type": "boolean",
              "default": false,
              "description": "Show detailed permission analysis and full context content"
            }
          }
        }
      llm_alias: Workspace
      llm_description: Get workspace status, permissions, and change summary. Shows what you can access and what's been modified in the workspace. Optionally include workspace context for shared knowledge.
    source: file://workspace.lua
    modules:
      - json
      - security
      - ctx
    imports:
      workspace: keeper.overlay:workspace
    method: handler
    
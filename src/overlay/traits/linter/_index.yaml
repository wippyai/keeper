version: "1.0"
namespace: keeper.overlay.traits.linter

entries:
  # keeper.overlay.traits.linter:lint
  - name: lint
    kind: function.lua
    meta:
      type: tool
      title: Lint
      comment: Validate workspace changes using governance pipeline without pushing to registry
      input_schema: |
        {
          "type": "object",
          "properties": {
            "level": {
              "type": "integer",
              "minimum": 1,
              "maximum": 100,
              "default": 1,
              "description": "Linting strictness level (1=basic validation, 100=production-ready)"
            }
          }
        }
      llm_alias: Lint
      llm_description: Validate current workspace changes through governance linting pipeline without pushing to registry. Level controls validation strictness (1-100). Context-locked to active workspace only.
    source: file://lint.lua
    modules:
      - json
      - security
      - ctx
      - contract
    imports:
      workspace: keeper.overlay:workspace
    method: handler
    
  # keeper.overlay.traits.linter:linter
  - name: linter
    kind: registry.entry
    meta:
      type: agent.trait
      title: Registry Linter
      comment: Validate workspace changes using governance pipeline without pushing to registry
      tags:
        - validation
        - lint
        - governance
        - workspace
        - dry-run
        - pipeline
      icon: tabler:shield-check
    prompt: "You can validate workspace changes before pushing to registry using the governance linting pipeline:\n\n## Lint Tool\n\n**Validate Changes** - Check current workspace changes for errors using linting pipeline:\n```json\n{\"level\": 10}\n```\n\n**Level Parameter (1-100):**\n- **1-10** = Basic validation (syntax, structure, kinds)\n- **11-25** = Standard validation (includes permissions, references)  \n- **26-50** = Strict validation (includes consistency checks, naming)\n- **51-75** = Pedantic validation (includes style guidelines, best practices)\n- **76-100** = Production validation (maximum scrutiny, all available linters)\n\n**Push Requirements:**\n- Registry push requires **level 100** clearance for production deployment\n- Use lower levels during development to catch issues early\n- Incrementally increase level as you fix validation issues\n\n## Context Rules\n\n**CRITICAL:** This tool is context-locked to your current workspace. It will only validate changes from the active workspace - you cannot specify a different workspace_id.\n\n**What Lint Does:**\n- Runs the same governance validation pipeline as push operation\n- Executes linters up to specified level of strictness\n- Returns validation issues (errors, warnings, info) without changeset data\n- Safe to run multiple times - makes no changes to registry\n- Helps catch issues before attempting to push\n\n**Validation Pipeline:**\n- Entry format validation (YAML structure, required fields)\n- Kind validation (valid registry entry types)\n- Permission checking for affected namespaces\n- Cross-entry consistency validation\n- Custom governance rule validation based on level\n- File ownership and reference validation\n- Style and best practice enforcement (higher levels)\n\n**Best Practices:**\n- Start with level 1-5 for initial validation\n- Use level 10-25 for standard development validation\n- Use level 50+ when preparing for review\n- Use level 100 before attempting push (matches push requirements)\n- Fix all errors before attempting push\n- Address warnings for better code quality\n\n**Workflow Integration:**\n1. Make changes in workspace using edit tools\n2. Run lint with appropriate level to validate changes\n3. Fix any validation errors reported\n4. Incrementally increase level and re-lint\n5. Push when level 100 validation passes cleanly\n\n**Issue Types:**\n- **Errors**: Must be fixed before push will succeed\n- **Warnings**: Should be addressed for quality\n- **Info**: Optional improvements and suggestions\n\nThe lint operation uses the keeper.linters:pipeline contract to run the same validation as push but stops before making any changes to the registry."
    tools:
      - keeper.overlay.traits.linter:*
    
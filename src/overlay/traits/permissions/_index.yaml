version: "1.0"
namespace: keeper.overlay.traits.permissions

entries:
  # keeper.overlay.traits.permissions:add
  - name: add
    kind: function.lua
    meta:
      type: tool
      title: Add Permission
      comment: Add a new permission to current workspace
      input_schema: |
        {
          "type": "object",
          "properties": {
            "namespace_pattern": {
              "type": "string",
              "description": "Namespace pattern (e.g., 'userspace.myapp.*' or 'app.plugins.*')"
            },
            "permission_type": {
              "type": "string",
              "enum": ["read", "write"],
              "description": "Permission level for this namespace pattern"
            }
          },
          "required": ["namespace_pattern", "permission_type"]
        }
      llm_alias: AddPermission
      llm_description: Add a new permission to the current workspace. Context-locked to active workspace only.
    source: file://add.lua
    modules:
      - json
      - security
      - ctx
    imports:
      writer: keeper.overlay.persist:writer
    method: handler
    
  # keeper.overlay.traits.permissions:remove
  - name: remove
    kind: function.lua
    meta:
      type: tool
      title: Remove Permission
      comment: Remove a permission from current workspace
      input_schema: |
        {
          "type": "object",
          "properties": {
            "permission_id": {
              "type": "string",
              "description": "Permission ID to delete"
            },
            "confirm": {
              "type": "boolean",
              "default": false,
              "description": "Confirmation flag - must be true to proceed"
            }
          },
          "required": ["permission_id", "confirm"]
        }
      llm_alias: RemovePermission
      llm_description: Remove a specific permission from current workspace. Requires confirm=true. Use workspace tool to get permission IDs.
    source: file://remove.lua
    modules:
      - json
      - security
      - ctx
    imports:
      writer: keeper.overlay.persist:writer
    method: handler
    
  # keeper.overlay.traits.permissions:writer
  - name: writer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Permission Writer
      comment: Full permission management for current workspace
      tags:
        - permissions
        - management
        - workspace
        - security
        - write
      icon: tabler:shield-lock
    prompt: |-
      You can manage permissions for the current workspace:
    
      ## Permission Management Tools
    
      **Add Permission** - Grant access to namespace pattern:
      ```json
      {
        "namespace_pattern": "userspace.demo.*",
        "permission_type": "write"
      }
      ```
    
      **Remove Permission** - Revoke specific permission:
      ```json
      {
        "permission_id": "perm-uuid",
        "confirm": true
      }
      ```
    
      ## Context Rules
    
      **CRITICAL:** This trait is context-locked to your current workspace. You can only manage permissions for the active workspace - you cannot specify a different workspace_id.
    
      **Permission Strategy:**
      - Start with broad read access (`*` pattern with `read` type)
      - Add specific write permissions for namespaces you need to modify
      - Remove unnecessary permissions to maintain security
      - Use precise patterns to limit scope
    
      **Pattern Examples:**
      - `*` - Full registry (use carefully)
      - `userspace.myproject.*` - Project namespace tree
      - `app.plugins.tools` - Specific namespace only
      - `app.agents.*` - Agent namespace tree
    
      **Safety:**
      - Removing permissions may block ongoing work
      - Always have at least read access to workable namespaces
      - Test access after permission changes
      - Be careful with wildcard patterns
    
      **Workflow:**
      1. Use workspace tool to see current permissions
      2. Add new permissions for expanding scope
      3. Remove permissions to tighten security
      4. Verify access after changes
    
      Permission changes take effect immediately for the workspace.
    tools:
      - keeper.overlay.traits.permissions:*
    
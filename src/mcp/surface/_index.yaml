version: "1.0"
namespace: keeper.mcp.surface

entries:
  # keeper.mcp.surface:meta
  - name: meta
    kind: library.lua
    meta:
      comment: MCP meta-tool handlers (session_info, use_trait, list_traits, list_tools, call_tool, etc.)
    source: file://meta.lua
    modules:
      - registry
    imports:
      mcp_dispatch: keeper.mcp.transport:dispatch
      mcp_surface: keeper.mcp.surface:surface
      mcp_traits: keeper.mcp.surface:traits
      mcp_validate: keeper.mcp.surface:validate
      tools_disc: wippy.agent.discovery:tools
    
  # keeper.mcp.surface:surface
  - name: surface
    kind: library.lua
    meta:
      comment: Tool surface builder — composes meta-tools with materialized dynamic tools per session
    source: file://surface.lua
    imports:
      mcp_traits: keeper.mcp.surface:traits
    
  # keeper.mcp.surface:surface_test
  - name: surface_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for mcp.surface (META_TOOLS shape, ALWAYS_VISIBLE, supports_traits, resolve_tool_name, names_from_tool_list, diff_added/removed)
      suite: mcp
    source: file://surface_test.lua
    imports:
      surface: keeper.mcp.surface:surface
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.mcp.surface:traits
  - name: traits
    kind: library.lua
    meta:
      comment: Trait catalog + per-session active-set + materialization via agent compiler
    source: file://traits.lua
    modules:
      - registry
      - json
    imports:
      compiler: wippy.agent.compiler:compiler
      mcp_tokens: keeper.mcp.auth:tokens
      tools_disc: wippy.agent.discovery:tools
      traits_disc: wippy.agent.discovery:traits
    
  # keeper.mcp.surface:validate
  - name: validate
    kind: library.lua
    meta:
      comment: Runtime JSON-schema validator applied to tool arguments at dispatch
    source: file://validate.lua
    
  # keeper.mcp.surface:validate_test
  - name: validate_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for mcp.validate (type_name, check_type, check)
      suite: mcp
    source: file://validate_test.lua
    imports:
      test: wippy.test:test
      validate: keeper.mcp.surface:validate
    method: define_tests
    pool:
      size: 1
    
version: "1.0"
namespace: keeper.mcp.auth

entries:
  # keeper.mcp.auth:auth
  - name: auth
    kind: library.lua
    meta:
      comment: Admin actor + scope synthesis for MCP sessions (shared by handler, meta, handler_get)
    source: file://auth.lua
    modules:
      - security
      - funcs
      - sql
      - env
    imports:
      mcp_consts: keeper.mcp:consts
    
  # keeper.mcp.auth:policy
  - name: policy
    kind: library.lua
    meta:
      comment: Registry-backed repository for MCP presets and scope descriptors
    source: file://policy.lua
    modules:
      - registry
    
  # keeper.mcp.auth:tokens
  - name: tokens
    kind: library.lua
    meta:
      comment: MCP token store CRUD; tokens stored as sha256 hashes at rest
    source: file://tokens.lua
    modules:
      - json
      - uuid
      - sql
      - time
      - hash
    imports:
      mcp_consts: keeper.mcp:consts
    
version: "1.0"
namespace: keeper

entries:
  # ---- module identity ----
  - name: definition
    kind: ns.definition
    meta:
      title: Keeper
      description: AI agent development and management framework. Provides the control plane for registry governance, task orchestration, state overlays, knowledge base, MCP, and FE tooling.

  # ---- module requirements (consumer-app injection points) ----

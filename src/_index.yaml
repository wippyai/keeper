  - name: database_resource
    kind: ns.requirement
    meta:
      description: "SQLite resource id keeper uses for its own tables (tasks, changesets, overlay, changelog, sessions, builds, knowledge, etc). All migrations target this db."
    default: app:db
    targets:
      - entry: keeper.changeset.migrations:01_create_workspace_tables
        path: .meta.target_db
      - entry: keeper.changeset.migrations:02_add_fs_content_table
        path: .meta.target_db
      - entry: keeper.changeset.migrations:03_add_lock_columns
        path: .meta.target_db
      - entry: keeper.changeset.migrations:04_fs_history_columns
        path: .meta.target_db
      - entry: keeper.changeset.migrations:05_drop_design_id_column
        path: .meta.target_db
      - entry: keeper.changeset.migrations:06_add_task_id_column
        path: .meta.target_db
      - entry: keeper.changeset.migrations:07_drop_legacy_columns
        path: .meta.target_db
      - entry: keeper.components.migrations:migration_01
        path: .meta.target_db
      - entry: keeper.components.migrations:migration_02
        path: .meta.target_db
      - entry: keeper.knowledge.migrations:migration_01
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_01
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_02
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_03
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_04
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_05
        path: .meta.target_db
      - entry: keeper.state.migrations:01_create_overlay_tables
        path: .meta.target_db
      - entry: keeper.task.migrations:01_create_schema
        path: .meta.target_db
      - entry: keeper.env:database_resource
        path: .default

  - name: process_host
    kind: ns.requirement
    meta:
      description: "Process host keeper spawns supervised processes on (state service, FE builder, MCP broker). Defaults to the standard app host."
    default: app:processes
    targets:
      - entry: keeper.env:process_host
        path: .default

  - name: mcp_gateway
    kind: ns.requirement
    meta:
      description: "Optional outer HTTP gateway to mount the MCP server under (e.g. app:gateway). When set, MCP is reachable at <gateway>/mcp/. When unset, MCP runs its own keeper-owned server on the default port 9067."
    targets:
      - entry: keeper.env:mcp_gateway
        path: .default


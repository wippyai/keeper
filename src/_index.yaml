version: "1.0"
namespace: keeper

entries:
  # Dependencies
  - name: __dependency.wippy.llm
    kind: "ns.dependency"
    meta:
      description: "LLM component for language model operations"
    component: "wippy/llm"
    version: ">=v0.0.7"

  - name: __dependency.wippy.session
    kind: "ns.dependency"
    meta:
      description: "Session management component"
    component: "wippy/session"
    version: ">=v0.0.7"

  - name: __dependency.wippy.usage
    kind: "ns.dependency"
    meta:
      description: "Usage tracking component"
    component: "wippy/usage"
    version: ">=v0.0.7"

  - name: __dependency.wippy.test
    kind: "ns.dependency"
    meta:
      description: "Testing framework component"
    component: "wippy/test"
    version: ">=v0.0.7"

  - name: __dependency.wippy.agent
    kind: "ns.dependency"
    meta:
      description: "Agent management component"
    component: "wippy/agent"
    version: ">=v0.0.7"

  - name: __dependency.wippy.views
    kind: "ns.dependency"
    meta:
      description: "View rendering component"
    component: "wippy/views"
    version: ">=v0.0.7"


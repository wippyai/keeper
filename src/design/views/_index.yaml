version: "1.0"
namespace: keeper.design.views

entries:
  # keeper.design.views:list
  - name: list
    kind: template.jet
    meta:
      name: keeper.design.views.list
      type: view.page
      title: Workspaces
      group: Keeper
      icon: tabler:layers-difference
      description: View and manage your design workspaces
      order: 100
      content_type: text/html
      announced: true
      group_order: 100
      group_placement: bottom
      secure: true
    source: file://list.jet
    set: keeper.views.common:templates
    
  # keeper.design.views:view
  - name: view
    kind: template.jet
    meta:
      name: keeper.design.views.view
      type: view.page
      title: Workspace Editor
      group: Keeper
      icon: tabler:edit
      description: Edit workspace data and manage design changes
      content_type: text/html
      secure: true
    source: file://view.jet
    set: keeper.views.common:templates
    
version: "1.0"
namespace: keeper.design.agents

entries:
  - name: cqrs_persist_realtime
    kind: registry.entry
    meta:
      type: pattern
      title: CQRS Persistence with Real-time
      comment: Separate read/write with transactions and real-time publishing after commit
      class: [ "design" ]
      tags: [ "persistence", "cqrs", "realtime", "sql", "transactions" ]
    content: |
      ## CQRS + Transactions + Real-time
      
      Three-layer structure with clear boundaries:
      
      **Operations Module:**
      Command handlers receiving transaction and payload. Execute SQL, create audit, return results with changes_made flag. Never emit events.
      
      **Reader Module:**
      Fluent immutable query API. Chainable filters, terminal methods (all, one, count, exists). Pure read-only.
      
      **Writer Module:**
      Fluent builder composing commands. Manages transaction lifecycle (begin/commit/rollback). Calls operations within transaction. After successful commit: publishes real-time via process.send to user.{user_id} with topic {short-namespace}:{resource_type}:{resource_id}.
      
      **Key Flow:**
      Writer collects commands → begin transaction → execute operations → commit → emit real-time on success.
      
      **Security:**
      Transaction boundaries prevent partial updates. Audit within same transaction. Real-time only after confirmed commit. User-scoped process targeting.
      
      **Discovery:**
      Search for ops/operations/commands modules, reader/query modules, writer/persist modules, process.send usage, transaction patterns.

  - name: system_vs_user_scope
    kind: registry.entry
    meta:
      type: pattern
      title: System vs User Scope
      comment: Choose component scoping based on data ownership
      class: [ "design" ]
      tags: [ "design", "architecture", "scoping", "user-context" ]
    content: |
      ## System vs User Scope
      
      Core decision: Does component retain information per user or shared across users?
      
      **System-Level:**
      Data shared across all users. Background operations. Infrastructure.
      Examples: database sync, background jobs, system config, shared resources.
      Requirements: environment variables, no user context, global state.
      
      **User-Level:**
      Each user has separate data/state. Operations on user's behalf.
      Examples: Gmail connector accessing user's account, personal settings, external service connections, per-user data.
      Requirements: user context (actor), user-scoped connections, per-user state.
      
      **User context often implicit** - actor context provides user automatically, most operations inherit user scope by default.
      
      **Connection References:**
      Never hardcode connection IDs. Use class/tag system:
      
      Bad: connection_id = "conn_abc123"
      Good: connection_class = "gmail_sync"
      
      Benefits: User can have multiple connections of same type, tools reference by class, system resolves correct connection.
      
      **Design Questions:**
      User-facing or background? Users need separate instances? Data belongs to user or system? Connections user-specific?

  - name: connection_integration_pattern
    kind: registry.entry
    meta:
      type: pattern
      title: Connection Integration
      comment: Per-user external service connections via OAuth or credentials
      class: [ "design" ]
      tags: [ "connections", "oauth", "credentials", "integration" ]
    content: |
      ## Connection Integration
      
      Build per-user external service connections using platform's connection subsystem.
      
      **Two Approaches:**
      
      **OAuth:** Environment variables for client credentials. Platform handles token refresh. User authorizes once.
      
      **Credentials:** User supplies API keys directly. No environment variables. Platform manages lifecycle.
      
      **Component Structure:**
      
      OAuth requires: environment variable entries, connection registry entry with OAuth config, client library, function layer (service or tools), optional trait.
      
      Credentials requires: connection registry entry with validation, client library, function layer, optional trait.
      
      **Connection Registry Entry:**
      Declares type/metadata, assigns discovery classes for component.open_by_meta(), references env vars (OAuth only), defines scopes, links OAuth flow, specifies UI, references component contract.
      
      **Client Library Scope:**
      Transport layer only. Opens connection via component.open_by_meta(), retrieves tokens/credentials, constructs authenticated requests, parses responses, handles HTTP errors. Does NOT cover complete API surface, business logic, domain operations, or complex transforms.
      
      **Function Layer:**
      Service layer: When other subsystems need programmatic access. Contract-based methods.
      Tool functions: When agents/users interact directly. Full schemas and LLM descriptions.
      
      **Discovery Pattern:**
      Per-user connections. Each user configures via UI. Platform assigns metadata classes. Code discovers via component.open_by_meta() with classes. Never hardcode UUIDs. Tools accept optional connection_uuid for multi-connection scenarios.
      
      **Research:**
      Find OAuth patterns in app.plugins namespace: environment variable structure, connection registry with OAuth config, scopes, component contract, client using component.open_by_meta(), tool functions.

  - name: tool_toolkit_design_pattern
    kind: registry.entry
    meta:
      type: pattern
      title: Tool and Toolkit Design
      comment: Effective tools with proper semantic grouping and complete schemas
      class: [ "design" ]
      tags: [ "tools", "toolkit", "agents", "llm", "schemas" ]
    content: |
      ## Tool and Toolkit Design
      
      Balance granularity with semantic coherence.
      
      **Core Tension:**
      Too granular: many micro-tools fragment thinking.
      Too broad: mega-tools limit flexibility.
      
      **Group operations when:**
      Share domain context, commonly used together, similar access patterns, operate on related resources, require shared setup.
      
      **Keep separate when:**
      Semantically distinct, used independently, different parameters, different error handling.
      
      **Granularity Factors:**
      Target agent capability (advanced agents handle complexity, simple agents prefer focused tools). Operation relationship (transactional suggests grouping, independent suggests separation).
      
      **Required Components:**
      Every tool must have:
      1. Input schema (complete JSON schema with property descriptions)
      2. Output schema (complete JSON schema defining return structure)
      3. LLM alias (short verb-noun action phrase)
      4. LLM description (clear purpose, when to use, what it accomplishes)
      
      **Connection-Based Tools:**
      Accept optional connection_uuid parameter. Default to class-based discovery when not provided.
      
      **Toolkit Organization:**
      Bundle related tools into traits when: share domain/capability, commonly used together, form coherent feature set, need coordinated access.
      
      **Anti-Patterns:**
      Excessive parameters (threshold ~8-10), trivial single-field updates, generic "do_anything" tools, missing/incomplete schemas, vague descriptions, omitting connection parameters when needed.
      
      **Quality Checklist:**
      Clear semantic purpose, complete schemas, descriptive alias/description, appropriate granularity, connection parameter if external, required vs optional clearly marked, matches agent capability.
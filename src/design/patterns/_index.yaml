version: "1.0"
namespace: keeper.patterns

entries:
  - name: pattern_selector
    kind: function.lua
    meta:
      name: Pattern Selector
      type: tool
      comment: Selects relevant patterns based on user prompt and classes
      group: Patterns
      input_schema: |
        {
          "type": "object",
          "properties": {
            "user_prompt": {
              "type": "string",
              "description": "The user's request/task to find patterns for"
            },
            "classes": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Classes to filter patterns by (matches ANY)"
            },
            "system_guidance": {
              "type": "string",
              "description": "Optional additional context/instructions for pattern selection"
            },
            "output_format": {
              "type": "string",
              "enum": ["json", "xml"],
              "default": "json",
              "description": "Output format: json (table) or xml (string)"
            }
          },
          "required": ["user_prompt", "classes"]
        }
      output_schema: |
        {
          "oneOf": [
            {
              "type": "object",
              "description": "JSON format (default)",
              "properties": {
                "patterns": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "id": {"type": "string"},
                      "title": {"type": "string"},
                      "comment": {"type": "string"},
                      "class": {"type": "array"},
                      "tags": {"type": "array"},
                      "content": {"type": "string"}
                    }
                  }
                },
                "reasoning": {"type": "string"}
              }
            },
            {
              "type": "string",
              "description": "XML format - XML-formatted string containing selected patterns"
            }
          ]
        }
    source: file://pattern_selector.lua
    modules:
      - json
    imports:
      pattern_registry: keeper.patterns.discovery:registry
      llm: wippy.llm:llm
    method: execute

  - name: pattern_selector_test
    kind: function.lua
    meta:
      name: Pattern Selector Test
      type: test
      comment: Tests the pattern selector functionality
      group: Keeper / Patterns
      tags:
        - patterns
        - selector
        - llm_integration
        - tests
    source: file://pattern_selector_test.lua
    modules:
      - json
      - env
    imports:
      selector: keeper.patterns:pattern_selector
      test: wippy.test:test
      pattern_registry: keeper.patterns.discovery:registry
      llm: wippy.llm:llm
    method: run_tests
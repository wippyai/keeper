version: "1.0"
namespace: keeper.design.cycle.research

entries:
  # keeper.design.cycle.research:execute_research
  - name: execute_research
    kind: function.lua
    meta:
      title: Execute Research Agents
      comment: Loads pending research and executes all research agents in parallel
      input_schema: |
        {
          "type": "object",
          "properties": {
            "branch_id": {
              "type": "string",
              "description": "Branch ID containing pending research"
            }
          },
          "required": ["branch_id"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "executed_count": {
              "type": "integer",
              "description": "Number of research tasks executed"
            },
            "message": {
              "type": "string"
            }
          }
        }
    source: file://execute_research.lua
    modules:
      - json
      - ctx
    imports:
      design_reader: keeper.design.persist:reader
      flow: userspace.dataflow.flow:flow
    method: run
    
  # keeper.design.cycle.research:run_research_task
  - name: run_research_task
    kind: function.lua
    meta:
      title: Run Single Research Task
      comment: Executes one research agent and stores result
      input_schema: |
        {
          "type": "object",
          "properties": {
            "research_id": {
              "type": "string",
              "description": "Research data ID"
            },
            "agent_id": {
              "type": "string",
              "description": "Agent ID to execute"
            },
            "prompt": {
              "type": "string",
              "description": "Research prompt"
            },
            "workspace_id": {
              "type": "string",
              "description": "Workspace ID"
            },
            "title": {
              "type": "string",
              "description": "Research task title"
            }
          },
          "required": ["research_id", "agent_id", "workspace_id"]
        }
      output_schema: |
        {
          "type": "object",
          "description": "Research result"
        }
    source: file://run_research_task.lua
    modules:
      - json
    imports:
      flow: userspace.dataflow.flow:flow
    method: run
    
  # keeper.design.cycle.research:store_research_result
  - name: store_research_result
    kind: function.lua
    meta:
      title: Store Research Result
      comment: Write research agent output to workspace and mark as completed
    source: file://store_research_result.lua
    modules:
      - json
    imports:
      design_writer: keeper.design.persist:writer
    method: run
    
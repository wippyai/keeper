version: "1.0"
namespace: keeper.design.cycle

entries:
  # keeper.design.cycle:design_cycle
  - name: design_cycle
    kind: function.lua
    meta:
      title: Design Cycle
      comment: Single iteration cycle for design agent
    source: file://design_cycle.lua
    modules:
      - json
    imports:
      flow: userspace.dataflow.flow:flow
    method: run
    
  # keeper.design.cycle:initiate
  - name: initiate
    kind: function.lua
    meta:
      type: tool
      title: Initiate Design
      comment: Create design workspace and automatically run iteration cycle
      tags:
        - design
        - initialization
        - workspace
      input_schema: |
        {
          "type": "object",
          "properties": {
            "title": {
              "type": "string",
              "description": "Design workspace title"
            },
            "description": {
              "type": "string",
              "description": "Design workspace description"
            },
            "prompt": {
              "type": "string",
              "description": "User design prompt - what to design"
            },
            "file_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Optional uploaded file IDs for reference"
            },
            "max_iterations": {
              "type": "integer",
              "default": 10,
              "description": "Maximum iteration cycles"
            }
          },
          "required": ["title", "prompt"]
        }
      llm_alias: InitiateDesign
      llm_description: Create design workspace and run iteration cycle. Accepts prompt and optional files. Sets active workspace context and returns iteration results.
      output_schema: |
        {
          "type": "object",
          "properties": {
            "iterations_run": {"type": "integer"},
            "final_status": {"type": "string"},
            "branch_id": {"type": "string"}
          }
        }
    source: file://initiate.lua
    modules:
      - json
    imports:
      design_consts: keeper.design:consts
      design_writer: keeper.design.persist:writer
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.design.cycle:iterate
  - name: iterate
    kind: function.lua
    meta:
      type: tool
      title: Design Iterate
      comment: Run design iteration cycle on active workspace or specific branch
      tags:
        - design
        - iteration
      input_schema: |
        {
          "type": "object",
          "properties": {
            "branch_id": {
              "type": "string",
              "description": "Optional: UUID of design branch. If not provided, uses root branch from active workspace"
            },
            "max_iterations": {
              "type": "integer",
              "default": 10,
              "description": "Maximum cycle iterations"
            }
          }
        }
      llm_alias: DesignIterate
      llm_description: Run design iteration on active workspace. Automatically locates root branch if no branch_id provided. Returns iteration results.
      output_schema: |
        {
          "type": "object",
          "properties": {
            "iterations_run": {"type": "integer"},
            "final_status": {"type": "string"},
            "branch_id": {"type": "string"}
          }
        }
    source: file://iterate.lua
    modules:
      - json
      - ctx
    imports:
      design_reader: keeper.design.persist:reader
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.design.cycle:iteration_collector
  - name: iteration_collector
    kind: function.lua
    meta:
      title: Iteration Collector
      comment: 'Process agent operations and write design nodes. Supports: research, context, question, answer, design_spec'
    source: file://iteration_collector.lua
    modules:
      - json
      - uuid
      - ctx
    imports:
      design_reader: keeper.design.persist:reader
      design_writer: keeper.design.persist:writer
    method: run
    
  # keeper.design.cycle:load_branch_context
  - name: load_branch_context
    kind: function.lua
    meta:
      title: Load Branch Context
      comment: Load and format complete context for design agent
    source: file://load_branch_context.lua
    modules:
      - json
      - ctx
    imports:
      design_reader: keeper.design.persist:reader
    method: run
    
  # keeper.design.cycle:validate_operations
  - name: validate_operations
    kind: function.lua
    meta:
      title: Validate Operations
      comment: Exit function validator for agent operations (research, context, question, answer, design_spec)
    source: file://validate_operations.lua
    modules:
      - json
    method: handler
    
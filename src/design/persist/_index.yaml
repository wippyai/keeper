version: "1.0"
namespace: keeper.design.persist

entries:
  # keeper.design.persist:ops
  - name: ops
    kind: library.lua
    meta:
      name: Design Operations
      comment: CQRS command handlers for design workspaces and workspace data
      tags:
        - keeper
        - design
        - operations
        - commands
        - cqrs
      description: |-
        Command handlers for design workspaces and hierarchical workspace data. Handles all mutation operations
        including creating, updating, and deleting workspaces and data records with materialized path management.
      private: true
    source: file://ops.lua
    modules:
      - sql
      - json
      - time
      - uuid
    imports:
      design_consts: keeper.design:consts
    method: design_ops
    
  # keeper.design.persist:reader
  - name: reader
    kind: library.lua
    meta:
      name: Design Reader
      comment: Fluent API for reading design workspaces and hierarchical data
      tags:
        - keeper
        - design
        - workspace
        - reader
        - fluent
        - hierarchical
      description: |-
        Provides a fluent, immutable API for reading design workspaces and their hierarchical data.
        Supports path-based queries, depth filtering, type/discriminator filtering, and efficient subtree retrieval.
    source: file://reader.lua
    modules:
      - sql
      - json
      - security
    imports:
      design_consts: keeper.design:consts
    method: design_reader
    
  # keeper.design.persist:writer
  - name: writer
    kind: library.lua
    meta:
      name: Design Writer
      comment: Transaction management and real-time publishing for design operations
      tags:
        - keeper
        - design
        - writer
        - transactions
        - publishing
        - realtime
      description: |-
        Manages transactions for design operations, executes commands via ops handlers,
        and publishes real-time updates to workspace-specific topics.
    source: file://writer.lua
    modules:
      - sql
      - json
      - uuid
      - time
      - security
    imports:
      design_consts: keeper.design:consts
      design_ops: keeper.design.persist:ops
    method: design_writer
    
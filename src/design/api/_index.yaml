version: "1.0"
namespace: keeper.design.api

entries:
  # keeper.design.api:create_workspace
  - name: create_workspace
    kind: function.lua
    meta:
      comment: Create new design workspace
      description: Design workspace management HTTP endpoints
      router: app:api
    source: file://create_workspace.lua
    modules:
      - http
      - security
    imports:
      writer: keeper.design.persist:writer
    method: handler
    
  # keeper.design.api:create_workspace.endpoint
  - name: create_workspace.endpoint
    kind: http.endpoint
    meta:
      comment: Create workspace endpoint
      router: app:api
    method: POST
    func: create_workspace
    path: /design/workspaces
    
  # keeper.design.api:create_workspace_data
  - name: create_workspace_data
    kind: function.lua
    meta:
      comment: Create workspace data record
      description: Design workspace data management HTTP endpoints
      router: app:api
    source: file://create_workspace_data.lua
    modules:
      - http
      - security
    imports:
      writer: keeper.design.persist:writer
    method: handler
    
  # keeper.design.api:create_workspace_data.endpoint
  - name: create_workspace_data.endpoint
    kind: http.endpoint
    meta:
      comment: Create workspace data endpoint
      router: app:api
    method: POST
    func: create_workspace_data
    path: /design/workspaces/{id}/data
    
  # keeper.design.api:delete_workspace
  - name: delete_workspace

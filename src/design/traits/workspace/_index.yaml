version: "1.0"
namespace: keeper.design.traits.workspace

entries:
  # keeper.design.traits.workspace:workspace
  - name: workspace
    kind: function.lua
    meta:
      type: tool
      title: Workspace Operations
      comment: Open, close, create, delete, and list design workspaces
      input_schema: |
        {
          "type": "object",
          "properties": {
            "operation": {
              "type": "string",
              "enum": ["open", "close", "create", "update", "delete", "list", "get"],
              "description": "Workspace operation"
            },
            "workspace_id": {
              "type": "string",
              "description": "Workspace ID (UUID, required for open, delete, get)"
            },
            "title": {
              "type": "string",
              "description": "Workspace title (required for create)"
            },
            "description": {
              "type": "string",
              "description": "Workspace description"
            },
            "status": {
              "type": "string",
              "enum": ["draft", "active", "archived"],
              "description": "Workspace status filter (list only)"
            },
            "limit": {
              "type": "integer",
              "default": 100,
              "description": "Max results for list"
            }
          },
          "required": ["operation"]
        }
      llm_alias: workspace_operations
      llm_description: Manage design workspaces. Open sets active workspace context. All data operations use active workspace. Close clears context.
    source: file://workspace.lua
    modules:
      - json
      - ctx
    imports:
      consts: keeper.design:consts
      design_reader: keeper.design.persist:reader
      design_writer: keeper.design.persist:writer
    method: handler
    
  # keeper.design.traits.workspace:workspace_manager
  - name: workspace_manager
    kind: registry.entry
    meta:
      type: agent.trait
      title: Workspace Manager
      comment: Design workspace management with context
      tags:
        - design
        - workspace
        - context
      icon: tabler:layout-dashboard
    prompt: |
      Manage design workspaces with context flow.
    
      ## Context Flow
    
      **open** - Set active workspace (persistent)
      ```json
      {"operation": "open", "workspace_id": "01234567-89ab-cdef-0123-456789abcdef"}
      ```
      All data operations use this workspace until closed.
    
      **close** - Clear active workspace
      ```json
      {"operation": "close"}
      ```
    
      ## Workspace Operations
    
      **create** - New workspace
      ```json
      {"operation": "create", "title": "My Design", "description": "Project workspace"}
      ```
      Returns workspace_id (UUID). Use with open.
    
      **update** - Update workspace
      ```json
      {"operation": "update", "workspace_id": "01234567-89ab-cdef-0123-456789abcdef", "title": "New Title"}
      ```
      Updates title, description, status, or metadata.
    
      **delete** - Remove workspace
      ```json
      {"operation": "delete", "workspace_id": "01234567-89ab-cdef-0123-456789abcdef"}
      ```
    
      **list** - List user workspaces
      ```json
      {"operation": "list", "status": "active", "limit": 50}
      ```
    
      **get** - Get workspace details
      ```json
      {"operation": "get", "workspace_id": "01234567-89ab-cdef-0123-456789abcdef"}
      ```
    
      ## Workflow
      1. Create or list workspaces → get workspace_id (UUID)
      2. Open workspace → sets context
      3. Use data operations (work on active workspace)
      4. Close workspace when done
    
      ## Notes
      - workspace_id is UUID format
      - Must open workspace before data operations
      - One workspace active at a time
    tools:
      - keeper.design.traits.workspace:workspace
    
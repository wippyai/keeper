version: "1.0"
namespace: keeper.design.traits.feedback

entries:
  # keeper.design.traits.feedback:feedback
  - name: feedback
    kind: function.lua
    meta:
      type: tool
      title: Add Feedback
      comment: Add feedback or answer to questions and other nodes
      input_schema: |
        {
          "type": "object",
          "properties": {
            "target_data_id": {
              "type": "string",
              "description": "UUID of node to attach feedback to. If omitted, automatically locates feedback placement based on design stage"
            },
            "content": {
              "type": "string",
              "description": "Feedback content"
            },
            "feedback_type": {
              "type": "string",
              "enum": ["answer", "comment"],
              "default": "comment",
              "description": "Type of feedback"
            },
            "metadata": {
              "type": "object",
              "description": "Additional metadata"
            }
          },
          "required": ["content"]
        }
      llm_alias: add_feedback
      llm_description: Add feedback, answers, or notes. Auto-detects target from context (materialize or active branch). Specify target_data_id for questions or specific nodes.
    source: file://feedback.lua
    modules:
      - json
      - ctx
    imports:
      design_reader: keeper.design.persist:reader
      design_writer: keeper.design.persist:writer
    method: handler
    
  # keeper.design.traits.feedback:feedback_provider
  - name: feedback_provider
    kind: registry.entry
    meta:
      type: agent.trait
      title: Feedback Provider
      comment: Add feedback and answers to design nodes
      tags:
        - design
        - feedback
        - answers
      icon: tabler:message-circle
    prompt: |
      Add feedback, answers, or notes to design nodes.
    
      ## Usage
    
      **General feedback (uses current context)**
      ```json
      {
        "content": "Observation or suggestion",
        "feedback_type": "comment"
      }
      ```
    
      **Answer a question**
      ```json
      {
        "target_data_id": "question-uuid",
        "content": "Answer content",
        "feedback_type": "answer"
      }
      ```
    
      **Feedback on specific node**
      ```json
      {
        "target_data_id": "node-uuid",
        "content": "Context or note",
        "feedback_type": "comment"
      }
      ```
    
      ## Context Auto-Detection
      - Materialize phase: attaches to materialize node
      - Design phase: attaches to active design branch
      - Explicit: use target_data_id for specific nodes
    
      ## Feedback Types
      - `answer`: Direct answer to questions
      - `comment`: General feedback or observations
    tools:
      - keeper.design.traits.feedback:feedback
    
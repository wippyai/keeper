version: "1.0"
namespace: keeper.linters.standard

entries:
  # keeper.linters.standard:depends_on
  - name: depends_on
    kind: function.lua
    meta:
      name: Depends On Deprecation Checker
      type: linter
      comment: Warns about deprecated depends_on field usage
      tags:
        - deprecation
        - depends_on
        - meta
        - validation
      description: Checks for deprecated depends_on field in entry meta and warns that dependencies are now properly calculated depending on entry kind
      level: 10
      priority: 30
    source: file://depends_on.lua
    modules:
      - logger
      - json
      - ctx
      - treesitter
    method: handle
    
  # keeper.linters.standard:kinds
  - name: kinds
    kind: function.lua
    meta:
      name: Kind Validator
      type: linter
      comment: Comprehensive entry kind validation with pattern analysis
      tags:
        - validation
        - kinds
        - schema
        - basic
        - patterns
        - analysis
      description: Validates entry kinds against registry schema, detects deprecated usage, and provides pattern insights with error/warning/info feedback
      level: 1
      priority: 10
    source: file://kinds.lua
    modules:
      - logger
      - json
      - ctx
    method: handle
    
  # keeper.linters.standard:metadata_validator
  - name: metadata_validator
    kind: function.lua
    meta:
      name: Metadata Validator
      type: linter
      comment: Validates entry metadata fields to prevent nil metadata registry errors
      tags:
        - validation
        - metadata
        - nil
        - registry
        - basic
      description: Checks for nil or missing metadata fields that would cause "metadata cannot be nil" registry push errors
      level: 1
      priority: 20
    source: file://metadata_validator.lua
    modules:
      - logger
      - json
      - ctx
    method: handle
    
version: "1.0"
namespace: keeper.materialize

entries:
  # keeper.materialize:materialize
  - name: materialize
    kind: function.lua
    meta:
      type: tool
      title: Materialize Design
      comment: Execute implementation cycle for completed design
      tags:
        - design
        - implementation
      input_schema: |
        {
          "type": "object",
          "properties": {
            "branch_id": {
              "type": "string",
              "description": "Design branch ID. If not provided, uses active workspace root"
            },
            "max_iterations": {
              "type": "integer",
              "default": 5,
              "description": "Maximum implementation cycles"
            }
          }
        }
      llm_alias: MaterializeDesign
      llm_description: Execute implementation for completed design
    source: file://materialize.lua
    modules:
      - json
      - ctx
    imports:
      design_reader: keeper.design.persist:reader
      design_writer: keeper.design.persist:writer
      flow: userspace.dataflow.flow:flow
    method: handler
    
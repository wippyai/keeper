version: "1.0"
namespace: keeper.materialize.traits

entries:
  # keeper.materialize.traits:materializer
  - name: materializer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Design Materializer
      comment: Execute implementation for completed designs
      tags:
        - design
        - implementation
        - materialize
      icon: tabler:code
    prompt: |
      Execute implementation cycle for completed design specifications.
    
      ## Usage
    
      **Materialize design**
      ```json
      {
        "branch_id": "design-branch-uuid",
        "max_iterations": 12
      }
      ```
    
      If branch_id not provided, uses active workspace root branch.
    
      ## Prerequisites
    
      Design must be marked as final before materialization.
    
      ## Process
    
      The materializer runs cycles where an orchestrator agent:
      1. Reviews design spec and context
      2. Decides operation: implement_graph, integrate, or finish
      3. Tracks progress in design workspace
    
      ## Returns
    
      Iteration results with final status and operations performed. Pay attention to final result, if no information
      provided you most likely reached max iterations - continue.
    tools:
      - keeper.materialize:materialize
    
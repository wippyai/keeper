version: "1.0"
namespace: keeper.state.system_changeset

entries:
  # keeper.state.system_changeset:apply
  - name: apply
    kind: function.lua
    meta:
      comment: System-changeset apply dispatcher (write/write_many/remove) — funcs-callable entry so env-token MCP sessions can write through governance with proper actor context
    source: file://apply.lua
    imports:
      materialize: keeper.state.persist:materialize
      sys_cs: keeper.state.system_changeset:library
    method: handler
    pool:
      size: 2
    
  # keeper.state.system_changeset:layer_test
  - name: layer_test
    kind: function.lua
    meta:
      type: test
      comment: Canonical layer enforcement — sql/fs/registry imports confined to persist tier
      suite: system_changeset
    source: file://layer_test.lua
    modules:
      - registry
    imports:
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.state.system_changeset:library
  - name: library
    kind: library.lua
    meta:
      comment: |
        Canonical wrapper for system-initiated changes. Opens a changeset,
        applies a batch of registry_set/registry_delete/fs_write/fs_delete
        edits through the keeper.changeset client, and pushes the overlay
        through the existing push pipeline so every mutation gets captured
        in keeper_changeset_changes. Callers: HTTP registry update_entry,
        gov sync_from_fs / sync_to_fs, any internal code that used to write
        directly to registry or fs.
    source: file://library.lua
    modules:
      - funcs
    imports:
      cs_client: keeper.changeset:client
      cs_consts: keeper.changeset:consts
      gov_consts: keeper.gov:consts
    
  # keeper.state.system_changeset:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: System changeset wrapper tests — validation, shape, edit dispatch
      suite: system_changeset
    source: file://test.lua
    modules:
      - sql
      - json
      - uuid
    imports:
      sys_cs: keeper.state.system_changeset:library
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
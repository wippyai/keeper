version: "1.0"
namespace: keeper.state.service

entries:
  # keeper.state.service:executor
  - name: executor
    kind: process.lua
    meta:
      comment: State command executor worker
      description: Private worker that executes state commands with DB transactions
    source: file://executor.lua
    modules:
      - json
      - logger
      - sql
    imports:
      consts: keeper.state:consts
      state_ops: keeper.state.persist:ops
    method: run
    
  # keeper.state.service:orchestrator
  - name: orchestrator
    kind: process.lua
    meta:
      comment: State system orchestrator process
      description: Main coordinator that spawns executor worker and manages reconciliation/sync
    source: file://orchestrator.lua
    modules:
      - registry
      - json
      - time
      - logger
      - sql
    imports:
      consts: keeper.state:consts
    method: run
    
  # keeper.state.service:orchestrator.service
  - name: orchestrator.service
    kind: process.service
    meta:
      comment: State system orchestrator service
      description: Always-running coordinator for state synchronization
    host: keeper.gov:processes
    lifecycle:
      auto_start: true
      security:
        actor:
          id: state.orchestrator
        groups:
          - keeper.gov.service.security:governance
    process: orchestrator
    
  # keeper.state.service:reconcile
  - name: reconcile
    kind: process.lua
    meta:
      comment: State reconciliation worker
      description: Worker process that reconciles registry snapshot with state database
    source: file://reconcile.lua
    modules:
      - registry
      - sql
      - logger
    imports:
      consts: keeper.state:consts
      materialize: keeper.state.persist:materialize
      state_client: keeper.state:client
      state_reader: keeper.state.persist:reader
    method: run
    
  # keeper.state.service:sync
  - name: sync
    kind: process.lua
    meta:
      comment: Registry changeset sync worker
      description: Worker process that applies incremental registry changes to state database
    source: file://sync.lua
    modules:
      - json
      - logger
      - sql
    imports:
      consts: keeper.state:consts
      materialize: keeper.state.persist:materialize
      state_ops: keeper.state.persist:ops
    method: run
    
  # keeper.state.service:sync_branch
  - name: sync_branch
    kind: process.lua
    meta:
      comment: Branch sync worker
      description: Worker process that syncs specific entries to a branch
    source: file://sync_branch.lua
    modules:
      - registry
      - json
      - logger
      - time
    imports:
      consts: keeper.state:consts
      materialize: keeper.state.persist:materialize
      state_client: keeper.state:client
    method: run
    
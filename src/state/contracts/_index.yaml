version: "1.0"
namespace: keeper.state.contracts

entries:
  # keeper.state.contracts:library
  - name: library
    kind: library.lua
    meta:
      comment: |
        Per-kind schema validation for registry entries. Pure functions on
        parsed {id, kind, meta, data} records. Submit invokes validate_registry
        against each staged entry before lint, turning "function config unpack"
        and "missing method" into structured, actionable errors at the source.
    source: file://library.lua
    
  # keeper.state.contracts:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Contract validator tests — per-kind required/forbidden fields
      suite: contracts
    source: file://test.lua
    imports:
      contracts: keeper.state.contracts:library
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
version: "1.0"
namespace: keeper.state.traits.linter

entries:
  # keeper.state.traits.linter:lint
  - name: lint
    kind: function.lua
    meta:
      type: tool
      title: Lint Branch
      comment: Validate branch changes using governance pipeline
      input_schema: |
        {
          "type": "object",
          "properties": {
            "level": {
              "type": "integer",
              "minimum": 1,
              "maximum": 100,
              "default": 1,
              "description": "Linting strictness level (1=basic, 100=production)"
            },
            "branch": {
              "type": "string",
              "description": "Branch to lint (defaults to active branch)"
            },
            "base": {
              "type": "string",
              "default": "main",
              "description": "Base branch to compare against"
            }
          }
        }
      llm_alias: lint_branch
      llm_description: Validate branch changes through governance pipeline. Compares branch to base (default main) and runs linters up to specified level. Returns validation issues without modifying state.
    source: file://lint.lua
    modules:
      - json
      - ctx
      - contract
      - hash
    imports:
      consts: keeper.state:consts
      materialize: keeper.state.persist:materialize
      state_reader: keeper.state.persist:reader
    method: handler
    
  # keeper.state.traits.linter:linter
  - name: linter
    kind: registry.entry
    meta:
      type: agent.trait
      title: State Branch Linter
      comment: Validate branch changes using governance pipeline
      tags:
        - linting
        - validation
        - branch
        - state
        - governance
      icon: tabler:shield-check
    prompt: |
      Validate state branch changes before merging to main using governance linting pipeline.
    
      ## Lint Branch
    
      Validate active branch:
      ```json
      {"level": 10}
      ```
    
      Validate specific branch:
      ```json
      {"level": 50, "branch": "feature-xyz"}
      ```
    
      Compare against different base:
      ```json
      {"level": 100, "branch": "dev", "base": "staging"}
      ```
    
      ## Level Parameter (1-100)
    
      - **1-10**: Basic validation (syntax, structure, kinds)
      - **11-25**: Standard validation (permissions, references)
      - **26-50**: Strict validation (consistency, naming)
      - **51-75**: Pedantic validation (style, best practices)
      - **76-100**: Production validation (maximum scrutiny)
    
      ## How It Works
    
      1. Reads entries from target branch
      2. Compares with base branch (default: main)
      3. Identifies added, modified, deleted entries
      4. Converts to changeset format
      5. Runs governance linters up to specified level
      6. Returns validation issues (errors, warnings, info)
    
      ## Changeset Operations
    
      - **Added**: Entries in branch but not in base
      - **Modified**: Entries in both with different content
      - **Deleted**: Entries marked deleted in branch
    
      ## Best Practices
    
      - Lint at level 10-25 during development
      - Lint at level 100 before merging to main
      - Fix all errors before merge
      - Address warnings for quality
      - Use compare tool first to see what changed
    
      ## Workflow
    
      1. Set branch context
      2. Make changes with edit tool
      3. Run lint to validate
      4. Fix issues
      5. Re-lint at higher level
      6. Merge when level 100 passes
    
      Integrates with governance pipeline contract (keeper.linters:pipeline).
    tools:
      - keeper.state.traits.linter:lint
    
version: "1.0"
namespace: keeper.debug.usage

entries:
  # keeper.debug.usage:get_summary
  - name: get_summary
    kind: function.lua
    meta:
      comment: Get token usage summary statistics
      depends_on:
        - ns:app
    source: file://get_summary.lua
    modules:
      - http
      - security
    imports:
      time_utils: keeper.debug.usage:time_utils
    method: handler
    pool:
      size: 2
    
  # keeper.debug.usage:get_summary.endpoint
  - name: get_summary.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that returns token usage summary
      depends_on:
        - ns:app
    method: GET
    func: get_summary
    path: /keeper/usage/summary
    
  # keeper.debug.usage:get_usage_by_model
  - name: get_usage_by_model
    kind: function.lua
    meta:
      comment: Get token usage data by model
      depends_on:
        - ns:app
    source: file://get_usage_by_model.lua
    modules:
      - http
      - security
    imports:
      time_utils: keeper.debug.usage:time_utils
    method: handler
    pool:
      size: 2
    
  # keeper.debug.usage:get_usage_by_model.endpoint
  - name: get_usage_by_model.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that returns token usage by model
      depends_on:
        - ns:app
    method: GET
    func: get_usage_by_model
    path: /keeper/usage/by-model
    
  # keeper.debug.usage:get_usage_by_time
  - name: get_usage_by_time
    kind: function.lua
    meta:
      comment: Get token usage data over time
      depends_on:
        - ns:app
    source: file://get_usage_by_time.lua
    modules:
      - http
      - security
    imports:
      time_utils: keeper.debug.usage:time_utils
    method: handler
    pool:
      size: 2
    
  # keeper.debug.usage:get_usage_by_time.endpoint
  - name: get_usage_by_time.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that returns token usage over time
      depends_on:
        - ns:app
    method: GET
    func: get_usage_by_time
    path: /keeper/usage/by-time
    
  # keeper.debug.usage:get_usage_by_user
  - name: get_usage_by_user
    kind: function.lua
    meta:
      comment: Get token usage data grouped by user
      depends_on:
        - ns:app
    source: file://get_usage_by_user.lua
    modules:
      - http
      - security
    imports:
      time_utils: keeper.debug.usage:time_utils
    method: handler
    pool:
      size: 2
    
  # keeper.debug.usage:get_usage_by_user.endpoint
  - name: get_usage_by_user.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that returns token usage grouped by user
      depends_on:
        - ns:app
    method: GET
    func: get_usage_by_user
    path: /keeper/usage/by-user
    
  # keeper.debug.usage:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Usage API endpoint tests
      depends_on:
        - ns:app
        - ns:wippy.usage
        - ns:wippy.test
    source: file://test.lua
    modules:
      - json
      - time
      - uuid
      - sql
      - registry
      - http_client
      - security
    imports:
      test: wippy.test:test
      token_usage_repo: wippy.usage:token_usage_repo
    method: define_tests
    
  # keeper.debug.usage:time_utils
  - name: time_utils
    kind: library.lua
    meta:
      comment: Shared time range, validation, aggregation, and direct DB query utilities for usage API
    source: file://time_utils.lua
    modules:
      - time
      - sql
      - registry
    
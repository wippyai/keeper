version: "1.0"
namespace: keeper.debug.dev

entries:
  # keeper.debug.dev:discover
  - name: discover
    kind: function.lua
    meta:
      comment: Discover available test suites and cases
      depends_on:
        - ns:app
    source: file://discover.lua
    modules:
      - http
      - registry
      - time
    method: handler
    pool:
      size: 2
    
  # keeper.debug.dev:discover.endpoint
  - name: discover.endpoint
    kind: http.endpoint
    meta:
      comment: GET endpoint for test discovery
      depends_on:
        - ns:app
    method: GET
    func: discover
    path: /keeper/tests/discover
    
  # keeper.debug.dev:run
  - name: run
    kind: function.lua
    meta:
      comment: Run tests with streaming results
      depends_on:
        - ns:app
    source: file://run.lua
    modules:
      - http
      - funcs
      - time
      - registry
    method: handler
    
  # keeper.debug.dev:run.endpoint
  - name: run.endpoint
    kind: http.endpoint
    meta:
      comment: GET endpoint for running tests with chunked streaming
      depends_on:
        - ns:app
    method: GET
    func: run
    path: /keeper/tests/run
    
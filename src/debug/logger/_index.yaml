version: "1.0"
namespace: keeper.debug.logger

entries:
  # keeper.debug.logger:client
  - name: client
    kind: library.lua
    meta:
      comment: Logger client library
      description: Client for querying and managing log buffer
    source: file://client.lua
    modules:
      - time
      - uuid
    imports:
      consts: keeper.debug.logger:consts
    method: logger_client
    
  # keeper.debug.logger:consts
  - name: consts
    kind: library.lua
    meta:
      comment: Logger system constants
    source: file://consts.lua
    
  # keeper.debug.logger:process
  - name: process
    kind: process.lua
    meta:
      comment: Logger service process
      description: Circular buffer logger for system log events
    source: file://process.lua
    modules:
      - logger
      - time
      - json
      - expr
      - events
    imports:
      actor: wippy.actor:actor
      consts: keeper.debug.logger:consts
    method: run
    
  # keeper.debug.logger:service
  - name: service
    kind: process.service
    meta:
      comment: Logger service
      description: Always-running service for capturing and buffering log events
    host: keeper.gov:processes
    lifecycle:
      auto_start: true
      security:
        actor:
          id: logger.system
        groups:
          - keeper.gov.service.security:governance
    process: process
    
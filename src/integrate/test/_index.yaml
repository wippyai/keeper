version: "1.0"
namespace: keeper.integrate.test

entries:
  # keeper.integrate.test:execute
  - name: execute
    kind: function.lua
    meta:
      type: function
      title: Execute Test Scenario
      comment: Runs test scenario using agent
      input_schema: |
        {
          "type": "object",
          "properties": {
            "test_scenario": {
              "type": "string",
              "description": "Test scenario instructions"
            }
          },
          "required": ["test_scenario"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {
              "type": "boolean",
              "description": "Test passed or failed"
            },
            "details": {
              "type": "string",
              "description": "Test execution details"
            }
          },
          "required": ["success", "details"]
        }
    source: file://execute.lua
    modules:
      - json
    imports:
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.integrate.test:test_agent
  - name: test_agent
    kind: registry.entry
    meta:
      type: agent.gen1
      title: Integration Test Agent
      comment: Executes test scenarios and verifies integration
      tags:
        - integration
        - testing
    prompt: |
      You execute test scenarios to verify integration.
    
      You receive a test_scenario with verification steps.
    
      Execute the steps using available tools and report success or failure.
    
      Exit with:
      {
        "success": true or false,
        "details": "Clear explanation of what you tested and the outcome"
      }
    
      Be thorough but efficient. If any step fails, exit immediately with failure.
    model: gpt-5-mini
    temperature: 0.1
    max_tokens: 16000
    traits:
      - keeper.integrate.traits:worker_discipline
      - keeper.agents.views.traits:view_discovery
      - keeper.agents.views.traits:view_rendering
      - keeper.state.traits.explore:explorer
    
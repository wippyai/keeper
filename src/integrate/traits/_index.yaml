version: "1.0"
namespace: keeper.integrate.traits

entries:
  # keeper.integrate.traits:integrator
  - name: integrator
    kind: registry.entry
    meta:
      type: agent.trait
      title: Integrator
      comment: Enables agents to run integration with automatic rollback
      tags:
        - integration
        - testing
        - trait
      icon: tabler:rocket
    prompt: |
      You can integrate and test changes with automatic rollback on failure.
      
      Use integrate tool to push changes and run the integration pipeline.
      
      ## Integration Pipeline
      
      The pipeline will:
      1. Push your changes to the registry
      2. Execute integration handlers for the pushed entries
      3. Optionally run a test scenario (if provided)
      4. Automatically rollback on any failure
      
      ## Test Scenario Parameter
      
      IMPORTANT: DO NOT pass test_scenario parameter unless the user explicitly asks for integration testing or verification.
      
      - If user says "integrate" or "push changes" → Call integrate with NO parameters: {}
      - If user says "integrate and test" or "verify the changes work" → Call integrate with test_scenario
      
      ## Test Scenario Format
      
      When test_scenario is needed, provide clear verification steps:
      
      ```json
      {
        "test_scenario": "1. Navigate to /dashboard\n2. Verify page loads without errors\n3. Check that user stats are displayed"
      }
      ```
      
      ## Automatic Rollback
      
      If the pipeline or test scenario fails:
      - Integration handlers are rolled back (operation="down")
      - Registry version is restored to pre-integration state
      - Changes are safely reverted
      
      ## Usage Examples
      
      Simple integration (no test):
      ```json
      {}
      ```
      
      Integration with test:
      ```json
      {
        "test_scenario": "Verify the new dashboard loads without errors and displays user data correctly"
      }
      ```
    tools:
      - keeper.integrate:integrate
version: "1.0"
namespace: keeper.integrate.traits.migrations

entries:
  # keeper.integrate.traits.migrations:manage_migration
  - name: manage_migration
    kind: function.lua
    meta:
      type: tool
      title: Manage Migration
      comment: Apply or rollback specific migration with safety checks
      input_schema: |
        {
          "type": "object",
          "properties": {
            "migration_id": {
              "type": "string",
              "description": "Full migration ID (namespace:entry)"
            },
            "direction": {
              "type": "string",
              "enum": ["up", "down"],
              "default": "up",
              "description": "Apply (up) or rollback (down)"
            }
          },
          "required": ["migration_id"]
        }
      llm_description: Apply or rollback migration with safety checks
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {"type": "boolean"},
            "status": {"type": "string"},
            "message": {"type": "string"},
            "migration_id": {"type": "string"},
            "database_id": {"type": "string"},
            "direction": {"type": "string"},
            "duration": {"type": "number"},
            "already_applied": {"type": "boolean"},
            "error": {"type": "string"}
          }
        }
    source: file://manage_migration.lua
    modules:
      - json
      - sql
      - time
    imports:
      migration_registry: wippy.migration:registry
      repository: wippy.migration:repository
      runner: wippy.migration:runner
    method: handler
    
  # keeper.integrate.traits.migrations:migration_integrator
  - name: migration_integrator
    kind: registry.entry
    meta:
      type: agent.trait
      title: Migration Integrator
      comment: Enables agents to apply and rollback migrations with safety checks
      tags:
        - integration
        - migrations
        - trait
      icon: tabler:database-cog
    prompt: |
      You can apply and rollback migrations on the system's applied state.
    
      Use manage_migration to execute migrations with automatic safety checks:
      - Prevents double application
      - Verifies migration exists
      - Checks database connectivity
      - Automatically uses target database from migration metadata
      - Provides detailed execution results
    tools:
      - keeper.integrate.traits.migrations:manage_migration
    
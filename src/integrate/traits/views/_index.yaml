version: "1.0"
namespace: keeper.integrate.traits.views

entries:
  # keeper.integrate.traits.views:render_view
  - name: render_view
    kind: function.lua
    meta:
      type: tool
      title: Render View
      comment: Renders a view with route and query parameters
      input_schema: |
        {
          "type": "object",
          "properties": {
            "id": {
              "type": "string",
              "description": "View ID to render (namespace:name format)"
            },
            "route_params": {
              "type": "object",
              "description": "Route parameters to pass to the view",
              "additionalProperties": true
            },
            "query_params": {
              "type": "object",
              "description": "Query parameters to pass to the view",
              "additionalProperties": true
            }
          },
          "required": ["id"],
          "additionalProperties": false
        }
      llm_description: Renders a specific view with optional route and query parameters, returning the rendered HTML content.
    source: file://render_view.lua
    modules:
      - registry
    imports:
      renderer: wippy.views:renderer
    method: handler
    
  # keeper.integrate.traits.views:view_renderer
  - name: view_renderer
    kind: registry.entry
    meta:
      type: agent.trait
      title: View Renderer
      comment: Enables agents to render and test views
      tags:
        - integration
        - views
        - rendering
        - trait
      icon: tabler:browser
    prompt: |
      You can render views to test and validate them.
    
      Use render_view to generate view output with parameters:
      - Pass route parameters for dynamic content
      - Include query parameters for filtering
      - Get rendered HTML output
      - Test view functionality
    tools:
      - keeper.integrate.traits.views:render_view
    
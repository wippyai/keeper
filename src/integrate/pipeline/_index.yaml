version: "1.0"
namespace: keeper.integrate.pipeline

entries:
  # keeper.integrate.pipeline:execute
  - name: execute
    kind: function.lua
    meta:
      type: function
      title: Execute Pipeline
      comment: Executes integration pipeline for given entries
      input_schema: |
        {
          "type": "object",
          "properties": {
            "entry_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Entry IDs to process"
            },
            "operation": {
              "type": "string",
              "enum": ["up", "down"],
              "default": "up",
              "description": "Operation direction"
            }
          },
          "required": ["entry_ids"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {
              "type": "boolean",
              "description": "True if all handlers succeeded"
            },
            "applied_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Entry IDs that were successfully processed"
            },
            "error": {
              "type": ["string", "null"],
              "description": "Error message if pipeline failed, null otherwise"
            },
            "execution": {
              "type": "object",
              "properties": {
                "handlers": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "handler_id": {"type": "string"},
                      "entries": {
                        "type": "object",
                        "additionalProperties": {
                          "type": "object",
                          "properties": {
                            "success": {"type": "boolean"},
                            "error": {"type": ["string", "null"]},
                            "data": {"type": ["object", "null"]}
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "required": ["success", "applied_ids", "error", "execution"]
        }
    source: file://execute.lua
    modules:
      - json
      - registry
    imports:
      discovery: keeper.integrate.discovery:registry
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.integrate.pipeline:execute_handler
  - name: execute_handler
    kind: function.lua
    meta:
      type: function
      title: Execute Handler
      comment: Executes a single integration handler and returns standardized result
      input_schema: |
        {
          "type": "object",
          "properties": {
            "handler_id": {
              "type": "string",
              "description": "Handler function ID to execute"
            },
            "entry_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Entry IDs to process"
            },
            "operation": {
              "type": "string",
              "enum": ["up", "down"],
              "default": "up",
              "description": "Operation direction"
            }
          },
          "required": ["handler_id", "entry_ids"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "handler_id": {
              "type": "string",
              "description": "Handler that was executed"
            },
            "entry_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Entry IDs that were processed"
            },
            "result": {
              "type": "object",
              "description": "Raw result from handler execution"
            },
            "error": {
              "type": ["string", "null"],
              "description": "Error message if handler failed"
            }
          },
          "required": ["handler_id", "entry_ids"]
        }
    source: file://execute_handler.lua
    modules:
      - json
      - funcs
    method: handler
    
  # keeper.integrate.pipeline:rollback
  - name: rollback
    kind: function.lua
    meta:
      type: function
      title: Rollback Pipeline
      comment: Rolls back integration pipeline for given entries
      input_schema: |
        {
          "type": "object",
          "properties": {
            "entry_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Entry IDs to rollback"
            }
          },
          "required": ["entry_ids"]
        }
      output_schema: |
        {
          "type": "object",
          "properties": {
            "success": {
              "type": "boolean",
              "description": "True if all handlers succeeded"
            },
            "applied_ids": {
              "type": "array",
              "items": {"type": "string"},
              "description": "Entry IDs that were successfully rolled back"
            },
            "error": {
              "type": ["string", "null"],
              "description": "Error message if rollback failed, null otherwise"
            },
            "execution": {
              "type": "object",
              "properties": {
                "handlers": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "handler_id": {"type": "string"},
                      "entries": {
                        "type": "object",
                        "additionalProperties": {
                          "type": "object",
                          "properties": {
                            "success": {"type": "boolean"},
                            "error": {"type": ["string", "null"]},
                            "data": {"type": ["object", "null"]}
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "required": ["success", "applied_ids", "error", "execution"]
        }
    source: file://rollback.lua
    modules:
      - json
      - registry
    imports:
      discovery: keeper.integrate.discovery:registry
      flow: userspace.dataflow.flow:flow
    method: handler
    
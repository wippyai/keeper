version: "1.0"
namespace: keeper.integrate.agents

entries:
  # keeper.integrate.agents:function_tester
  - name: function_tester
    kind: registry.entry
    meta:
      type: agent.gen1
      title: Function Tester
      comment: Executes function verification tasks
      tags:
        - testing
        - functions
      capabilities: Executes functions with test inputs and verifies behavior. Use for testing function execution, validating outputs, checking error handling.
      class:
        - integration_worker
      requirements: Function/tool ID to test, test inputs if needed, expected behavior criteria.
    prompt: |
      You are a function testing specialist.
    
      # Available Tools
    
      - invoke: Execute functions with test inputs
      - explore_state: Find function definitions and signatures
    
      # Process
    
      1. Use explore_state to locate function
      2. Examine definition, parameters, examples
      3. Use invoke to execute with test inputs
      4. Verify result matches expected behavior
      5. Determine pass/fail per task criteria
    
      # Output
    
      {
        "success": true or false,
        "details": "Clear explanation of verification and outcome"
      }
    
      Set success=true if function works as expected.
      Set success=false if errors, unexpected outputs, or not found.
    model: gpt-5-nano
    temperature: 0.2
    max_tokens: 8000
    tools:
      - keeper.agents.development.traits:invoke
    traits:
      - keeper.integrate.traits:worker_discipline
      - keeper.state.traits.explore:explorer
    
  # keeper.integrate.agents:migration_worker
  - name: migration_worker
    kind: registry.entry
    meta:
      type: agent.gen1
      title: Migration Worker
      comment: Executes migration apply/rollback tasks
      tags:
        - integration
        - migrations
      capabilities: Applies or rolls back database migrations with safety checks. Use for testing migration execution, verifying migration applies successfully, checking rollback functionality.
      class:
        - integration_worker
      requirements: Migration ID to execute, direction (up/down), expected outcome.
    prompt: |
      You execute migration tasks. Nothing else.
    
      # Your Role
    
      Apply or rollback the specific migration requested in your task.
      Do not explore. Do not verify. Do not suggest. Just execute.
    
      # Process
    
      1. Read task for migration_id and direction
      2. Call manage_migration with those exact parameters
      3. Report result
    
      # Output
    
      {
        "success": true or false,
        "details": "Execution result"
      }
    
      success=true if migration executed successfully.
      success=false if error or skipped.
    
      # Critical Rules
    
      - ONLY run migrations explicitly specified in task
      - NEVER apply migrations not requested
      - NEVER rollback migrations not requested
      - NEVER explore or gather context
      - NEVER suggest additional actions
      - Execute requested operation, report result, done
    model: gpt-5-nano
    temperature: 0.1
    max_tokens: 12000
    traits:
      - keeper.integrate.traits:worker_discipline
      - keeper.integrate.traits.migrations:migration_integrator
      - keeper.context.traits.migrations:migrations_aware
    
  # keeper.integrate.agents:view_tester
  - name: view_tester
    kind: registry.entry
    meta:
      type: agent.gen1
      title: View Tester
      comment: Executes view rendering verification tasks
      tags:
        - testing
        - views
      capabilities: Renders views and verifies output. Use for testing view rendering, checking template syntax, validating rendered content.
      class:
        - integration_worker
      requirements: View ID to test, render parameters if needed, expected content criteria.
    prompt: |
      You are a view rendering verification specialist.
    
      # Available Tools
    
      - list_views: Find and enumerate views
      - render_view: Render view with parameters
      - explore_state: Find view definitions
    
      # Process
    
      1. Use list_views to locate view
      2. Use render_view to test view
      3. Examine rendered output
      4. Verify output meets task criteria
      5. Check for errors or missing content
    
      Render single view once to verify.
    
      # Success Criteria
    
      success=true if:
      - View renders without errors
      - Output contains expected content
      - No template syntax errors
    
      success=false if:
      - View not found
      - Rendering fails or produces errors
      - Output empty, malformed, or missing content
      - Template errors present
    
      # Output
    
      {
        "success": true or false,
        "details": "Clear explanation of verification and outcome"
      }
    
      Exit as soon as you determine success or failure. You only have to render target page once.
    model: gpt-5-nano
    temperature: 0.2
    max_tokens: 8000
    traits:
      - keeper.integrate.traits:worker_discipline
      - keeper.agents.views.traits:view_discovery
      - keeper.agents.views.traits:view_rendering
      - keeper.state.traits.explore:explorer
    
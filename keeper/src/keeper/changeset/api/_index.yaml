version: "1.0"
namespace: keeper.changeset.api

entries:
  # keeper.changeset.api:create_changeset
  - name: create_changeset
    kind: function.lua
    meta:
      comment: Create a new changeset
      router: app:api
    source: file://create_changeset.lua
    modules:
      - http
      - security
    imports:
      client: keeper.changeset:client
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:create_changeset.endpoint
  - name: create_changeset.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: create_changeset
    path: /keeper/changesets
    
  # keeper.changeset.api:drop_changeset
  - name: drop_changeset
    kind: function.lua
    meta:
      comment: Drop a changeset — tear down overlay branch + scratch dir
      router: app:api
    source: file://drop_changeset.lua
    modules:
      - http
      - security
    imports:
      client: keeper.changeset:client
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:drop_changeset.endpoint
  - name: drop_changeset.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: DELETE
    func: drop_changeset
    path: /keeper/changesets/:id
    
  # keeper.changeset.api:edit_changeset
  - name: edit_changeset
    kind: function.lua
    meta:
      comment: Stage an edit in a changeset (registry_set/delete or fs_write/delete)
      router: app:api
    source: file://edit_changeset.lua
    modules:
      - http
      - security
    imports:
      client: keeper.changeset:client
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:edit_changeset.endpoint
  - name: edit_changeset.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: edit_changeset
    path: /keeper/changesets/:id/edits
    
  # keeper.changeset.api:get_change_diff
  - name: get_change_diff
    kind: function.lua
    meta:
      comment: Get baseline + current content for a changeset change target (for diff view)
      router: app:api
    source: file://get_change_diff.lua
    modules:
      - http
    imports:
      diff_render: keeper.changeset.service:diff_render
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:get_change_diff.endpoint
  - name: get_change_diff.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: get_change_diff
    path: /keeper/changesets/:id/diff
    
  # keeper.changeset.api:get_changeset
  - name: get_changeset
    kind: function.lua
    meta:
      comment: Get a changeset by id
      router: app:api
    source: file://get_changeset.lua
    modules:
      - http
    imports:
      reader: keeper.changeset.service:reader
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:get_changeset.endpoint
  - name: get_changeset.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: get_changeset
    path: /keeper/changesets/:id
    
  # keeper.changeset.api:janitor_sweep
  - name: janitor_sweep
    kind: function.lua
    meta:
      comment: Admin endpoint — drop empty-open changesets older than TTL
      router: app:api
    source: file://janitor_sweep.lua
    modules:
      - http
    imports:
      janitor: keeper.changeset.service:janitor
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:janitor_sweep.endpoint
  - name: janitor_sweep.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: janitor_sweep
    path: /keeper/changesets/janitor/sweep
    
  # keeper.changeset.api:list_changes
  - name: list_changes
    kind: function.lua
    meta:
      comment: List computed changes + journal rows for a changeset
      router: app:api
    source: file://list_changes.lua
    modules:
      - http
    imports:
      reader: keeper.changeset.service:reader
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:list_changes.endpoint
  - name: list_changes.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: list_changes
    path: /keeper/changesets/:id/changes
    
  # keeper.changeset.api:list_changesets
  - name: list_changesets
    kind: function.lua
    meta:
      comment: List changesets with optional filters (state, kind, actor_id, session_id)
      router: app:api
    source: file://list_changesets.lua
    modules:
      - http
    imports:
      reader: keeper.changeset.service:reader
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:list_changesets.endpoint
  - name: list_changesets.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: list_changesets
    path: /keeper/changesets
    
  # keeper.changeset.api:transition
  - name: transition
    kind: function.lua
    meta:
      comment: Transition changeset state (submit_for_review, accept, reject, reopen, push_success)
      router: app:api
    source: file://transition.lua
    modules:
      - http
      - security
    imports:
      client: keeper.changeset:client
    method: handler
    pool:
      size: 2
    
  # keeper.changeset.api:transition.endpoint
  - name: transition.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: transition
    path: /keeper/changesets/:id/transition
    
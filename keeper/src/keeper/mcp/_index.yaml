version: "1.0"
namespace: keeper.mcp

entries:
  # keeper.mcp:consts
  - name: consts
    kind: library.lua
    meta:
      comment: MCP protocol constants (server info, version, db id)
    source: file://consts.lua
    imports:
      keeper_config: keeper:config
    
  # keeper.mcp:enabled
  - name: enabled
    kind: env.variable
    meta:
      comment: Master switch for the app-gateway /keeper-mcp/ transport; set false to close MCP HTTP handlers.
      icon: tabler:toggle-left
    default: "true"
    storage: app.env:store
    variable: MCP_ENABLED

  # keeper.mcp:router
  - name: router
    kind: http.router
    meta:
      comment: MCP mount on the app-provided gateway; no token_auth middleware — handler enforces bearer
      server: app:gateway
    middleware:
      - cors
    options:
      allow_credentials: "true"
      allow_headers: Authorization,Content-Type,Mcp-Session-Id,Last-Event-Id,Accept
      allow_methods: '*'
      allow_origins: '*'
    prefix: /keeper-mcp/

  # keeper.mcp:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: MCP tokens, filters, traits, and preset tests
      suite: mcp
    source: file://test.lua
    modules:
      - sql
      - uuid
      - registry
      - env
    imports:
      mcp_auth: keeper.mcp.auth:auth
      mcp_authorize: keeper.mcp.auth:authorize
      mcp_consts: keeper.mcp:consts
      mcp_handler_core: keeper.mcp.transport:handler_core
      mcp_meta: keeper.mcp.surface:meta
      mcp_policy: keeper.mcp.auth:policy
      mcp_surface: keeper.mcp.surface:surface
      mcp_tokens: keeper.mcp.auth:tokens
      mcp_traits: keeper.mcp.surface:traits
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    

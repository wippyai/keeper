version: "1.0"
namespace: keeper.mcp.presets

entries:
  # keeper.mcp.presets:developer
  - name: developer
    kind: registry.entry
    meta:
      type: mcp.preset
      title: Developer
      comment: Any trait tagged for state authoring from any namespace
      icon: tabler:code
    access_mode: traits
    default_active:
      - keeper.agents.traits.state:explorer
    scopes:
      - mcp.introspect
      - agents.read
      - agents.run
      - registry.read
      - registry.write
      - registry.sync
      - state.read
      - state.write
      - hub.read
      - hub.write
      - hub.migrate
      - knowledge.read
      - knowledge.write
      - logger.read
      - tests.run
      - tasks.read
      - tasks.write
      - tasks.run
      - components.read
      - components.write
      - components.build
      - components.capture
      - functions.call
    trait_filter:
      tags_any:
        - state
        - editor
        - knowledge
        - hub
    
  # keeper.mcp.presets:explorer_tools_only
  - name: explorer_tools_only
    kind: registry.entry
    meta:
      type: mcp.preset
      title: Tools Only (Explorer)
      comment: No trait UI — tool surface filtered by tag/namespace
      icon: tabler:list-details
    access_mode: tools_only
    default_active: {}
    scopes:
      - mcp.introspect
      - agents.read
      - registry.read
      - state.read
      - hub.read
    tool_filter:
      tags_any:
        - exploration
        - readonly
        - hub
    
  # keeper.mcp.presets:knowledge_manager
  - name: knowledge_manager
    kind: registry.entry
    meta:
      type: mcp.preset
      title: Knowledge Manager
      comment: Knowledge base traits plus registry exploration
      icon: tabler:brain
    access_mode: traits
    default_active: {}
    scopes:
      - mcp.introspect
      - registry.read
      - knowledge.read
      - knowledge.write
      - hub.read
    trait_filter:
      tags_any:
        - knowledge
        - exploration
    
  # keeper.mcp.presets:observer
  - name: observer
    kind: registry.entry
    meta:
      type: mcp.preset
      title: Observer
      comment: Read-only exploration — traits tagged readonly/exploration/comparison
      icon: tabler:eye
    access_mode: traits
    default_active: {}
    scopes:
      - mcp.introspect
      - agents.read
      - registry.read
      - state.read
      - hub.read
      - knowledge.read
      - logger.read
      - pm.read
      - env.read
    trait_filter:
      tags_any:
        - exploration
        - comparison
        - readonly
    
  # keeper.mcp.presets:root
  - name: root
    kind: registry.entry
    meta:
      type: mcp.preset
      title: Root
      comment: Full trait catalog, activate anything on demand
      icon: tabler:shield-star
    access_mode: any
    default_active: {}
    scopes:
      - mcp.root
      - mcp.introspect
      - agents.read
      - agents.run
      - app.ui
      - registry.read
      - registry.write
      - registry.sync
      - state.read
      - state.write
      - hub.read
      - hub.write
      - hub.migrate
      - knowledge.read
      - knowledge.write
      - logger.read
      - logger.write
      - pm.read
      - pm.write
      - env.read
      - env.write
      - tests.run
      - functions.call
      - components.read
      - components.write
      - components.build
      - components.capture
      - tasks.read
      - tasks.write
      - tasks.run
    
  # keeper.mcp.presets:wippy_operator
  - name: wippy_operator
    kind: registry.entry
    meta:
      type: mcp.preset
      title: Wippy Operator
      comment: Remote Wippy workspace access with curated write, debug, test, sync, and UI traits
      icon: tabler:terminal-2
    access_mode: traits
    default_active:
      - keeper.agents.traits.wippy:operator
    scopes:
      - mcp.introspect
      - agents.read
      - agents.run
      - registry.read
      - registry.write
      - registry.sync
      - state.read
      - state.write
      - hub.read
      - hub.write
      - hub.migrate
      - knowledge.read
      - knowledge.write
      - logger.read
      - pm.read
      - env.read
      - tests.run
      - tasks.read
      - tasks.write
      - tasks.run
      - components.read
      - components.write
      - components.build
      - components.capture
      - functions.call
    trait_filter:
      tags_any:
        - wippy
        - state
        - editor
        - manager
        - comparison
        - inspect
        - tests
        - system
        - task
        - dataflow
        - frontend
        - ui
        - gov
        - sync
        - knowledge
        - context
        - migrations
        - hub
        - endpoints
        - api
    

version: "1.0"
namespace: keeper.mcp.scopes

entries:
  # keeper.mcp.scopes:agents.read
  - name: agents.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Agents Read
      comment: Inspect public and internal Keeper agent catalog metadata
    id: agents.read

  # keeper.mcp.scopes:agents.run
  - name: agents.run
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Agents Run
      comment: Start or run Keeper agents through dataflows
    id: agents.run
    
  # keeper.mcp.scopes:app.ui
  - name: app.ui
    kind: registry.entry
    meta:
      type: mcp.scope
      title: App UI
      comment: Navigate or interact with user-facing app UI helpers
    id: app.ui
    
  # keeper.mcp.scopes:components.build
  - name: components.build
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Components Build
      comment: Trigger docker builds and view live logs
    id: components.build
    
  # keeper.mcp.scopes:components.capture
  - name: components.capture
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Components Capture
      comment: Capture screenshots and run UI scripts via Playwright
    id: components.capture
    
  # keeper.mcp.scopes:components.read
  - name: components.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Components Read
      comment: List FE components, view builds, fetch screenshots
    id: components.read
    
  # keeper.mcp.scopes:components.write
  - name: components.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Components Write
      comment: Stage frontend filesystem writes through Keeper governance
    id: components.write
    
  # keeper.mcp.scopes:env.read
  - name: env.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Env Read
      comment: List environment variables
    id: env.read
    
  # keeper.mcp.scopes:env.write
  - name: env.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Env Write
      comment: Set environment variables
    id: env.write
    
  # keeper.mcp.scopes:functions.call
  - name: functions.call
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Function Call
      comment: Call any registered Wippy function
    id: functions.call

  # keeper.mcp.scopes:hub.migrate
  - name: hub.migrate
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Hub Migrate
      comment: Run or unrun migrations owned by installed Hub dependencies
    id: hub.migrate

  # keeper.mcp.scopes:hub.read
  - name: hub.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Hub Read
      comment: Browse Hub modules, installed dependencies, install plans, and migration status
    id: hub.read

  # keeper.mcp.scopes:hub.write
  - name: hub.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Hub Write
      comment: Install, update, or uninstall Hub dependencies
    id: hub.write
    
  # keeper.mcp.scopes:knowledge.read
  - name: knowledge.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Knowledge Read
      comment: Read and search knowledge base
    id: knowledge.read
    
  # keeper.mcp.scopes:knowledge.write
  - name: knowledge.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Knowledge Write
      comment: Create, update, delete knowledge nodes
    id: knowledge.write
    
  # keeper.mcp.scopes:logger.read
  - name: logger.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Logger Read
      comment: Read logs and statistics
    id: logger.read
    
  # keeper.mcp.scopes:logger.write
  - name: logger.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Logger Write
      comment: Clear log buffer
    id: logger.write
    
  # keeper.mcp.scopes:mcp.introspect
  - name: mcp.introspect
    kind: registry.entry
    meta:
      type: mcp.scope
      title: MCP Introspect
      comment: Inspect MCP session state and visible tool catalogs
    id: mcp.introspect
    
  # keeper.mcp.scopes:mcp.root
  - name: mcp.root
    kind: registry.entry
    meta:
      type: mcp.scope
      title: MCP Root
      comment: Full internal/root MCP access; only for local or explicitly trusted admin channels
    id: mcp.root
    
  # keeper.mcp.scopes:pm.read
  - name: pm.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Process Monitor
      comment: Process stats and system info
    id: pm.read
    
  # keeper.mcp.scopes:pm.write
  - name: pm.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Process Control
      comment: Terminate processes
    id: pm.write
    
  # keeper.mcp.scopes:registry.read
  - name: registry.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Registry Read
      comment: Browse entries, namespaces, entry details
    id: registry.read
    
  # keeper.mcp.scopes:registry.sync
  - name: registry.sync
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Registry Sync
      comment: Upload and download filesystem sync
    id: registry.sync
    
  # keeper.mcp.scopes:registry.write
  - name: registry.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Registry Write
      comment: Create, update, delete entries via governance
    id: registry.write
    
  # keeper.mcp.scopes:state.read
  - name: state.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: State Read
      comment: Query dependency graph, search state
    id: state.read
    
  # keeper.mcp.scopes:state.write
  - name: state.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: State Write
      comment: Mutate session state such as active branch or changeset context
    id: state.write
    
  # keeper.mcp.scopes:tasks.read
  - name: tasks.read
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Tasks Read
      comment: Read task context, plans, and orchestration state
    id: tasks.read
    
  # keeper.mcp.scopes:tasks.run
  - name: tasks.run
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Tasks Run
      comment: Create or start Keeper task orchestration
    id: tasks.run
    
  # keeper.mcp.scopes:tasks.write
  - name: tasks.write
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Tasks Write
      comment: Write task specs, plans, progress, and context nodes
    id: tasks.write
    
  # keeper.mcp.scopes:tests.run
  - name: tests.run
    kind: registry.entry
    meta:
      type: mcp.scope
      title: Tests
      comment: Discover and run tests
    id: tests.run
    

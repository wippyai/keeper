  # keeper.develop.integrate.handlers:migration_handler
  - name: migration_handler
    kind: function.lua
    meta:
      type: integration.handler
      title: Run Migrations
      comment: Groups pushed migration entries by meta.target_db and runs wippy.migration:runner per wanted id (run_next to respect allowed_ids); pre-checks _migrations for idempotent re-push
      icon: tabler:database-import
      order: 100
      handles:
        meta.type: migration
      mode: batch
      operations:
        - up
        - down
    source: file://migration_handler.lua
    modules:
      - registry
      - sql
    imports:
      runner: wippy.migration:runner
    method: handler
    
  # keeper.develop.integrate.handlers:migration_handler_test
  - name: migration_handler_test
    kind: function.lua

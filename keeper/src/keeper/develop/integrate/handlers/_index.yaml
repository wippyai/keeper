  # keeper.develop.integrate.handlers:test_handler
  - name: test_handler
    kind: function.lua
    meta:
      type: integration.handler
      title: Run Pushed Tests
      comment: Invokes keeper.agents.tools:run_test on every pushed entry whose meta.type == test. Any failing assertion fails the handler so the integrate runner rolls back.
      icon: tabler:test-pipe
      order: 500
      handles:
        meta.type: test
      mode: batch
      operations:
        - up
        - down
    source: file://test_handler.lua
    modules:
      - funcs
    method: handler
    

version: "1.0"
namespace: keeper.develop.integrate.handlers

entries:
  # keeper.develop.integrate.handlers:build_handler
  - name: build_handler
    kind: function.lua
    meta:
      type: integration.handler
      title: Rebuild Frontend Components
      comment: Resolves the component owning every pushed view.page source path OR every raw frontend/applications/** filesystem change and rebuilds it via keeper.components.tools:build_component. Down = record-only until keeper_fe_builds history lookup lands.
      icon: tabler:package
      order: 400
      handles:
        fs_prefix:
          - frontend/applications/
        meta.type: view.page
      mode: batch
      operations:
        - up
        - down
    source: file://build_handler.lua
    modules:
      - registry
      - funcs
    method: handler
    
  # keeper.develop.integrate.handlers:build_handler_test
  - name: build_handler_test
    kind: function.lua
    meta:
      type: test
      comment: Unit tests for build_handler — empty input, down no-op, missing entry reference
      suite: develop
    source: file://build_handler_test.lua
    modules:
      - funcs
    imports:
      subject: keeper.develop.integrate.handlers:build_handler
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.develop.integrate.handlers:endpoint_handler
  - name: endpoint_handler
    kind: function.lua
    meta:
      type: integration.handler
      title: Probe Pushed Endpoints
      comment: Synthetic probe via keeper.agents.tools:test_endpoint per pushed http.endpoint using the endpoint data path plus router prefix. Non-5xx response passes; 5xx fails the handler so the integrate runner rolls back.
      icon: tabler:world-code
      order: 600
      handles:
        kind: http.endpoint
      mode: batch
      operations:
        - up
        - down
    source: file://endpoint_handler.lua
    modules:
      - registry
      - funcs
    method: handler
    
  # keeper.develop.integrate.handlers:endpoint_handler_test
  - name: endpoint_handler_test
    kind: function.lua
    meta:

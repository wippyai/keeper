version: "1.0"
namespace: keeper.state.persist

entries:
  # keeper.state.persist:materialize
  - name: materialize
    kind: library.lua
    meta:
      comment: State materialization library
      description: Converts registry entries to state commands with proper hashing
    source: file://materialize.lua
    modules:
      - yaml
      - hash
    imports:
      overlay_consts: keeper.state:consts
      state_ops: keeper.state.persist:ops
    method: materialize
    
  # keeper.state.persist:materialize_test
  - name: materialize_test
    kind: function.lua
    meta:
      type: test
      comment: State materialization tests
      suite: state
    source: file://materialize_test.lua
    imports:
      materialize: keeper.state.persist:materialize
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.state.persist:ops
  - name: ops
    kind: library.lua
    meta:
      comment: State operations command handlers
      description: CQRS command handlers for state entries, edges, and attributes
    source: file://ops.lua
    modules:
      - sql
      - json
      - time
      - hash
    imports:
      overlay_consts: keeper.state:consts
    method: state_ops
    
  # keeper.state.persist:ops_test
  - name: ops_test
    kind: function.lua
    meta:
      type: test
      comment: State operations tests
      suite: state
    source: file://ops_test.lua
    modules:
      - sql
      - uuid
    imports:
      overlay_consts: keeper.state:consts
      state_ops: keeper.state.persist:ops
      state_reader: keeper.state.persist:reader
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.state.persist:reader
  - name: reader
    kind: library.lua
    meta:
      comment: State reader with fluent API
      description: Fluent API for querying state entries, edges, and attributes
    source: file://reader.lua
    modules:
      - sql
      - json
    imports:
      overlay_consts: keeper.state:consts
    method: state_reader
    
  # keeper.state.persist:reasoning_flag_test
  - name: reasoning_flag_test
    kind: function.lua
    meta:
      type: test
      comment: Declarative reasoning_model_request flag on the nano-class model (gpt-5.4-nano)
      suite: state
    source: file://reasoning_flag_test.lua
    imports:
      models: wippy.llm.discovery:models
      openai_mapper: wippy.llm.openai:mapper
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.state.persist:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: State reader tests
      suite: state
    source: file://test.lua
    imports:
      state_reader: keeper.state.persist:reader
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
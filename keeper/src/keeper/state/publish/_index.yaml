version: "1.0"
namespace: keeper.state.publish

entries:
  # keeper.state.publish:governance
  - name: governance
    kind: library.lua
    meta:
      comment: Pure governance publisher — request_changes / request_version / current_version. Shared primitive for push.lua and the integrate runner; no inline migration/test/build side effects.
    source: file://governance.lua
    imports:
      gov_client: keeper.gov:client
    
  # keeper.state.publish:governance_test
  - name: governance_test
    kind: function.lua
    meta:
      type: test
      comment: governance primitive — current_version shape, input guards on publish / restore_version
      suite: publish
    source: file://governance_test.lua
    modules:
      - funcs
      - security
    imports:
      governance: keeper.state.publish:governance
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1

  - name: current_version_probe
    kind: function.lua
    meta:
      comment: Test helper for exercising governance.current_version with an explicit security context
    source: file://current_version_probe.lua
    imports:
      governance: keeper.state.publish:governance
    method: handle
    pool:
      size: 1
    

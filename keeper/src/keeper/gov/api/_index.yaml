version: "1.0"
namespace: keeper.gov.api

entries:
  # keeper.gov.api:download
  - name: download
    kind: function.lua
    meta:
      comment: Download registry to filesystem
      description: Sends download command to registry syncer process
    source: file://download.lua
    modules:
      - http
    imports:
      gov_client: keeper.gov:client
      journal: keeper.changeset.service:journal
    method: handler
    pool:
      size: 1
    
  # keeper.gov.api:download.endpoint
  - name: download.endpoint
    kind: http.endpoint
    meta:
      comment: Registry download endpoint
      description: Initiates download of registry to filesystem
      router: app:api
    method: POST
    func: download
    path: /keeper/sync/download

  # keeper.gov.api:config_get
  - name: config_get
    kind: function.lua
    meta:
      comment: Get governance registry configuration
      description: Returns managed namespaces and other sync configuration
    source: file://config_get.lua
    modules:
      - http
      - security
    imports:
      gov_consts: keeper.gov:consts
      mcp_auth: keeper.mcp.auth:auth
    method: handler
    pool:
      size: 2

  # keeper.gov.api:config_get.endpoint
  - name: config_get.endpoint
    kind: http.endpoint
    meta:
      comment: Governance config read endpoint
      router: app:api
    method: GET
    func: config_get
    path: /keeper/sync/config

  # keeper.gov.api:config_update
  - name: config_update
    kind: function.lua
    meta:
      comment: Update governance registry configuration
      description: Persists managed namespaces used by sync/upload/download
    source: file://config_update.lua
    modules:
      - http
      - security
    imports:
      gov_consts: keeper.gov:consts
      mcp_auth: keeper.mcp.auth:auth
    method: handler
    pool:
      size: 2

  # keeper.gov.api:config_update.endpoint
  - name: config_update.endpoint
    kind: http.endpoint
    meta:
      comment: Governance config update endpoint
      router: app:api
    method: PUT
    func: config_update
    path: /keeper/sync/config
    
  # keeper.gov.api:helpers
  - name: helpers
    kind: library.lua
    meta:
      comment: Shared gov.api helpers — version-revert journaling wrapper used by undo/redo
    source: file://helpers.lua
    modules:
      - registry
    imports:
      gov_client: keeper.gov:client
      journal: keeper.changeset.service:journal
    
  # keeper.gov.api:redo
  - name: redo
    kind: function.lua
    meta:
      comment: Redo registry changes
      description: Advances to the next registry version
    source: file://redo.lua
    modules:
      - http
      - registry
    imports:
      helpers: keeper.gov.api:helpers
    method: handler
    pool:
      size: 1
    
  # keeper.gov.api:redo.endpoint
  - name: redo.endpoint
    kind: http.endpoint
    meta:
      comment: Registry redo endpoint
      description: Advances to the next registry version
      router: app:api
    method: POST
    func: redo
    path: /keeper/sync/redo
    
  # keeper.gov.api:state
  - name: state
    kind: function.lua
    meta:
      comment: Get registry synchronization state
      description: Returns current registry version and pending changes
    source: file://state.lua
    modules:
      - http
      - registry
      - time
    imports:
      gov_client: keeper.gov:client
    method: handler
    pool:
      size: 1
    
  # keeper.gov.api:state.endpoint
  - name: state.endpoint
    kind: http.endpoint
    meta:
      comment: Registry sync state endpoint
      description: Returns current registry synchronization state
      router: app:api
    method: GET
    func: state
    path: /keeper/sync/state
    
  # keeper.gov.api:undo
  - name: undo
    kind: function.lua
    meta:
      comment: Undo registry changes
      description: Reverts to the previous registry version
    source: file://undo.lua
    modules:
      - http
      - registry
    imports:
      helpers: keeper.gov.api:helpers
    method: handler
    pool:
      size: 1
    
  # keeper.gov.api:undo.endpoint
  - name: undo.endpoint
    kind: http.endpoint
    meta:
      comment: Registry undo endpoint
      description: Reverts to the previous registry version
      router: app:api
    method: POST
    func: undo
    path: /keeper/sync/undo
    
  # keeper.gov.api:upload
  - name: upload
    kind: function.lua
    meta:
      comment: Upload filesystem changes to registry
      description: Sends upload command to registry syncer process
    source: file://upload.lua
    modules:
      - http
    imports:
      gov_client: keeper.gov:client
      journal: keeper.changeset.service:journal
    method: handler
    pool:
      size: 1
    
  # keeper.gov.api:upload.endpoint
  - name: upload.endpoint
    kind: http.endpoint
    meta:
      comment: Registry upload endpoint
      description: Initiates upload of filesystem changes to registry
      router: app:api
    method: POST
    func: upload
    path: /keeper/sync/upload
    

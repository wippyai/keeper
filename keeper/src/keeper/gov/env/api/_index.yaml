version: "1.0"
namespace: keeper.gov.env.api

entries:
  # keeper.gov.env.api:list_variables
  - name: list_variables
    kind: function.lua
    meta:
      comment: Lists all environment variables with their status
    source: file://list_variables.lua
    modules:
      - http
      - env
      - registry
      - security
    method: handler
    
  # keeper.gov.env.api:list_variables.endpoint
  - name: list_variables.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for listing environment variables with status
      router: app:api
    method: GET
    func: list_variables
    path: /keeper/env/list
    
  # keeper.gov.env.api:set_variable
  - name: set_variable
    kind: function.lua
    meta:
      comment: Sets an environment variable value
    source: file://set_variable.lua
    modules:
      - http
      - env
      - security
    method: handler
    
  # keeper.gov.env.api:set_variable.endpoint
  - name: set_variable.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for setting environment variable values
      router: app:api
    method: POST
    func: set_variable
    path: /keeper/env/set
    
  # keeper.gov.env.api:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Env API endpoint tests
      depends_on:
        - ns:app
        - ns:wippy.test
    source: file://test.lua
    modules:
      - json
      - http_client
      - security
    imports:
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
version: "1.0"
namespace: keeper.gov.service

entries:
  # keeper.gov.service:central
  - name: central
    kind: process.lua
    meta:
      comment: Registry governance central coordinator process
      description: Main process that coordinates all governance operations and manages child processes
    source: file://central.lua
    modules:
      - registry
      - time
      - channel
      - logger
    imports:
      consts: keeper.gov:consts
      notify: keeper.events:notify
      events_consts: keeper.events:consts
    method: run

  # keeper.gov.service:central.service
  - name: central.service
    kind: process.service
    meta:
      comment: Registry governance service
      description: Always-running service for registry governance operations
    host: keeper.gov:processes
    lifecycle:
      depends_on:
        - keeper.gov:processes
      auto_start: true
      security:
        actor:
          id: registry.governance
        groups:
          - keeper.gov.service.security:governance
    process: central

  # keeper.gov.service:changeset
  - name: changeset
    kind: process.lua
    meta:
      comment: Registry changeset processor
      description: Single process that validates, executes, syncs to filesystem, and notifies observers
    source: file://changeset.lua
    modules:
      - registry
      - logger
    imports:
      consts: keeper.gov:consts
      observers: keeper.gov.discovery:observers
      sync: keeper.gov.service:sync
    method: run

  # keeper.gov.service:changeset_test
  - name: changeset_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for changeset process helpers (merge_options, count_errors, check_basic_shape)
      suite: governance
    source: file://changeset_test.lua
    modules:
      - registry
      - logger
    imports:
      changeset_proc: keeper.gov.service:changeset
      gov_consts: keeper.gov:consts
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1

  # keeper.gov.service:download
  - name: download
    kind: process.lua
    meta:
      comment: Registry download processor
      description: Synchronizes registry entries to governance filesystem
    source: file://download.lua
    modules:
      - registry
      - yaml
      - logger
      - fs
    imports:
      consts: keeper.gov:consts
      sync: keeper.gov.service:sync
    method: run

  # keeper.gov.service:download_test
  - name: download_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for download helpers (compute_file_ops)
      suite: governance
    source: file://download_test.lua
    modules:
      - registry
      - yaml
      - logger
      - fs
    imports:
      download: keeper.gov.service:download
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1

  # keeper.gov.service:registry_ops
  - name: registry_ops
    kind: library.lua
    meta:
      comment: Registry CRUD business layer — snapshot reads, filter/pagination, namespace grouping, update-entry orchestration via governance publish
    source: file://registry_ops.lua
    modules:
      - registry
    imports:
      materialize: keeper.state.persist:materialize
      gov_client: keeper.gov:client
      gov_consts: keeper.gov:consts

  # keeper.gov.service:registry_ops_test
  - name: registry_ops_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for registry_ops helpers (deep_copy, is_empty_table, is_json_array, merge_explicit, apply_updates, entry_matches_query)
      suite: governance
    source: file://registry_ops_test.lua
    modules:
      - registry
    imports:
      registry_ops: keeper.gov.service:registry_ops
      gov_consts: keeper.gov:consts
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1

  # keeper.gov.service:sync
  - name: sync
    kind: library.lua
    meta:
      comment: Filesystem sync helpers for gov operations
      description: Writes specific namespaces/changesets from live registry to canonical YAML files
    source: file://sync.lua
    modules:
      - registry
      - yaml
      - logger
      - fs
    imports:
      consts: keeper.gov:consts

  # keeper.gov.service:sync_test
  - name: sync_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for sync helpers (pick_kind_config, append_extension, namespace_dir, extract_filename, changeset_namespaces, entry_file_path)
      suite: governance
    source: file://sync_test.lua
    imports:
      sync: keeper.gov.service:sync
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1

  # keeper.gov.service:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Governance system tests
      suite: governance
    source: file://test.lua
    modules:
      - registry
    imports:
      gov_client: keeper.gov:client
      gov_consts: keeper.gov:consts
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1

  # keeper.gov.service:upload
  - name: upload
    kind: process.lua
    meta:
      comment: Registry upload processor
      description: Builds changesets from governance filesystem for registry updates
    source: file://upload.lua
    modules:
      - registry
      - loader
      - logger
      - fs
    imports:
      consts: keeper.gov:consts
    method: run

  # keeper.gov.service:upload_test
  - name: upload_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for upload helpers (compute_managed_partition, compute_changeset_stats)
      suite: governance
    source: file://upload_test.lua
    modules:
      - registry
      - loader
      - logger
      - fs
    imports:
      test: wippy.test:test
      upload: keeper.gov.service:upload
    method: define_tests
    pool:
      size: 1

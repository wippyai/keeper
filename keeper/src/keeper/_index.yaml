version: "1.0"
namespace: keeper

entries:
  # keeper:definition
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Keeper
      description: Wippy control plane for development, governance, agents, tasks, MCP, and runtime operations


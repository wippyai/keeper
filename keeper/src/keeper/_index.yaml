    proxy:
      css:
        custom_css: true
        custom_variables: true
        fonts: true
        iframe: true
        prime_vue: true
        theme_config: true
        markdown: false
      enabled: true
      iconify_icons: true
      tailwind_config: true

  # keeper:wippy_monaco — auto-registered web component for Monaco editor
  # + diff editor. Lives bundled in keeper for now; will move to a
  # standalone @wippy-fe/* package later.
  #
  # `announced: true` is the spec default and is required to be returned by
  # `/api/public/components/list` — the host's autoload only injects
  # `<script type="module" src=".../index.js?declare-tag=wippy-monaco">` for
  # components in that list (see wippy/views list_components.lua and
  # app-template/frontend/docs/web-component-loading.md). The small
  # ~80 KB index.js loads eagerly to register the custom-element tag; the
  # heavy ~1.5 MB monaco-editor bundle stays lazy via
  # `src/app/monaco-loader.ts`'s dynamic `import('monaco-editor')`.
  - name: wippy_monaco
    kind: registry.entry
    meta:
      type: view.component
      name: wippy-monaco
      title: Monaco Editor
      tag_name: wippy-monaco
      entry_point: index.js
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/wippy-monaco
      description: |
        Lazy-loaded VS Code Monaco editor as a custom element. Two modes:
        `mode="editor"` renders a single editable buffer driven by `value` (read
        the latest text via the `change` event's `value` payload, and force-set
        a new buffer by re-rendering with a different `value`). `mode="diff"`
        renders a side-by-side read-only diff with `baseline` (original) and
        `current` (modified). Both modes accept a Monaco `language` id (lua,
        javascript, typescript, json, markdown, plaintext, etc.) — pass an
        unknown language and Monaco silently falls back to plain text. The
        `theme` prop defaults to `auto`, which derives a Monaco palette from
        the host's CSS variables (`--p-content-background`, `--p-text-color`,
        `--p-primary-color`, etc.) and re-themes live on `prefers-color-scheme`
        / `[data-theme]` flips; pin a fixed look with `theme="keeper-dark"` or
        `keeper-light`. Set `min-height` to a number of pixels (default 0
        means "fill the container"). Don't pass content as text children — use
        the `value` / `baseline` / `current` props. The Monaco bundle is
        loaded once on first instantiation (~1.5 MB gzipped) and cached for
        the page lifetime; subsequent instances mount immediately.
      props:
        type: object
        properties:
          mode:
            type: string
            enum: [editor, diff]
            default: editor
            description: Editor mode (single buffer) or diff mode (baseline vs current).
          language:
            type: string
            default: plaintext
            description: Monaco language id (lua, javascript, typescript, json, markdown, etc.).
          value:
            type: string
            default: ""
            description: Initial buffer value for editor mode. Ignored in diff mode.
          baseline:
            type: string
            default: ""
            description: Original side of the diff (read-only). Diff mode only.
          current:
            type: string
            default: ""
            description: Modified side of the diff (read-only). Diff mode only.
          readonly:
            type: boolean
            default: false
            description: Editor mode only. Diff mode is always read-only.
          theme:
            type: string
            enum: [auto, keeper-dark, keeper-light]
            default: auto
            description: Color theme. `auto` derives the palette from app CSS variables and re-themes on prefers-color-scheme / [data-theme] changes. `keeper-dark` and `keeper-light` are fixed presets.
          min-height:
            type: number
            default: 0
            description: Minimum height in px. 0 means fill the container.
      events:
        type: object
        properties:
          change:
            type: object
            properties:
              value:
                type: string
            description: Editor mode only. Fires on every content change with the full buffer in detail.value.


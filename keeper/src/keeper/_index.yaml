  # keeper:app_db
  - name: app_db
    kind: ns.requirement
    meta:
      description: Application database resource used by Keeper integrations and app-owned migrations
    default: app:db
    targets:
      - entry: keeper.config:app_db
        path: .default
      - entry: keeper.components.migrations:migration_01
        path: .meta.target_db
      - entry: keeper.components.migrations:migration_02
        path: .meta.target_db
      - entry: keeper.knowledge.migrations:migration_01
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_01
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_02
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_03
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_04
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_05
        path: .meta.target_db
      - entry: keeper.mcp.migrations:migration_06
        path: .meta.target_db

  # keeper:admin_scope
  - name: admin_scope
    kind: ns.requirement
    meta:
      description: Security scope that identifies Keeper administrators
    targets:
      - entry: keeper.config:admin_scope
        path: .default

  # keeper:env_storage
  - name: env_storage
    kind: ns.requirement
    meta:
      description: Environment storage entry used by Keeper settings and MCP flags
    default: app.env:store
    targets:
      - entry: keeper.gov.env:linter_level
        path: .storage
      - entry: keeper.gov.env:managed_namespaces
        path: .storage
      - entry: keeper.mcp:enabled
        path: .storage

  # keeper:public_gateway
  - name: public_gateway
    kind: ns.requirement
    meta:
      description: HTTP service used for the /keeper-mcp/ mount
    default: app:gateway
    targets:
      - entry: keeper.mcp:router
        path: .meta.server

  # keeper:mcp_route
  - name: mcp_route
    kind: ns.requirement
    meta:
      description: Route prefix used by Keeper MCP on the app gateway
    default: /keeper-mcp/
    targets:
      - entry: keeper.config:mcp_route
        path: .default
      - entry: keeper.mcp:router
        path: .prefix

  # keeper:ui_server
  - name: ui_server
    kind: ns.requirement
    meta:
      description: HTTP service used to serve the compiled Keeper UI assets
    default: app:gateway
    targets:
      - entry: keeper.components:ui_static
        path: .meta.server
      - entry: keeper.components:git_static
        path: .meta.server

  # keeper:process_host
  - name: process_host
    kind: ns.requirement
    meta:
      description: Process host used for Keeper-spawned runtime work such as frontend builds and MCP SSE brokers
    default: app:processes
    targets:
      - entry: keeper.config:process_host
        path: .default

  # keeper:dep.wippy.agent
  - name: dep.wippy.agent
    kind: ns.dependency
    meta:
      description: Agent runtime and registry support
    component: wippy/agent
    version: ">=v0.4.7"

  # keeper:dep.wippy.dataflow
  - name: dep.wippy.dataflow
    kind: ns.dependency
    meta:
      description: Dataflow runtime used by Keeper task execution and debugging
    component: wippy/dataflow
    version: ">=v0.4.10"

  # keeper:dep.wippy.llm
  - name: dep.wippy.llm
    kind: ns.dependency
    meta:
      description: LLM runtime used by Keeper agents and research tools
    component: wippy/llm
    version: ">=v0.4.26"

  # keeper:dep.wippy.migration
  - name: dep.wippy.migration
    kind: ns.dependency
    meta:
      description: Migration framework for Keeper databases
    component: wippy/migration
    version: ">=v0.3.15"

  # keeper:dep.wippy.security
  - name: dep.wippy.security
    kind: ns.dependency
    meta:
      description: Security scopes and actor helpers for Keeper APIs
    component: wippy/security
    version: ">=v0.4.0"

  # keeper:dep.wippy.session
  - name: dep.wippy.session
    kind: ns.dependency
    meta:
      description: Session persistence and message inspection for Keeper debug tools
    component: wippy/session
    version: ">=v0.1.11"

  # keeper:dep.wippy.test
  - name: dep.wippy.test
    kind: ns.dependency
    meta:
      description: Test runner used by Keeper verification tools
    component: wippy/test
    version: ">=v0.4.12"

  # keeper:dep.wippy.views
  - name: dep.wippy.views
    kind: ns.dependency
    meta:
      description: View registry support for Keeper pages and frontend resources
    component: wippy/views
    version: ">=v0.4.28"

  # keeper:config
  - name: config
    kind: library.lua
    meta:
      comment: Shared Keeper configuration resolver backed by keeper.config entries
    source: file://config.lua
    modules:
      - registry

  # keeper:main
  - name: main
    kind: registry.entry
    meta:
      name: keeper
      type: view.page
      title: Keeper
      icon: tabler:shield-code
      order: 5
      announced: true
      base_path: ""
      entry_point: app.html
      secure: false
      url: /app/keeper
    proxy:
      css:
        custom_css: true
        custom_variables: true
        fonts: true
        iframe: true
        prime_vue: true
        theme_config: true
      enabled: true
      iconify_icons: true
      tailwind_config: true
    

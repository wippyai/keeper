              "--p-text-hover-color": "#09090b"
              "--p-text-muted-color": "#71717a"
              "--p-text-hover-muted-color": "#52525b"
              "--p-primary-contrast-color": "#ffffff"
              "--kp-bg": "#ffffff"
              "--kp-bg-elevated": "#f4f4f5"
              "--kp-bg-overlay": "#ffffff"
              "--kp-border": "#e4e4e7"
              "--kp-text": "#18181b"
              "--kp-text-secondary": "#71717a"
              "--kp-text-heading": "#18181b"

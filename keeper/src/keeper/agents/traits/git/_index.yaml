version: "1.0"
namespace: keeper.agents.traits.git

entries:
  # keeper.agents.traits.git:reviewer
  - name: reviewer
    kind: registry.entry
    meta:
      type: agent.trait
      title: Git Reviewer
      comment: Review git/changeset clusters, approve safe clusters, and dry-run publish plans
      tags:
        - git
        - review
        - changeset
        - publish
      icon: tabler:git-pull-request
    prompt: |
      Use Keeper's git review surface to inspect changes, prepare changes for
      publish, and drive the explicit pull-request path when requested.

      Rebuild first with the narrowest safe scope:
      - `change_source="changeset"` for pushable Keeper changeset work.
      - `change_source="git_scan"` for raw working-tree review only.
      - `change_source="mixed"` only when comparing both; raw git clusters stay
        blocked from push.

      Review clusters before approval. Read full cluster detail for large or
      high-risk clusters, resolve or acknowledge recommendations intentionally,
      and use `push(dry_run=true)` before any real push. Approval is not a
      bypass: push still enforces source, changeset, namespace, and open-blocker
      policy.

      Pull requests are explicit. Use `pull_request(action="status")` to inspect
      repo/gh readiness, `pull_request(action="plan")` for a dry-run command
      plan, and execute only when the user or task has clearly requested it and
      `confirm=true` is appropriate. Never create a PR from a protected branch.
    tools:
      - keeper.git.tools:rebuild
      - keeper.git.tools:list_clusters
      - keeper.git.tools:get_cluster
      - keeper.git.tools:set_decision
      - keeper.git.tools:push
      - keeper.git.tools:pull_request

version: "1.0"
namespace: keeper.agents.tools

entries:
  # keeper.agents.tools:data
  - name: data
    kind: function.lua
    meta:
      type: tool
      title: Data Inspector
      comment: Read-only SQL inspector over registered keeper databases
      tags:
        - debug
        - data
        - sql
        - readonly
      input_schema: |
        {
          "type": "object",
          "properties": {
            "action": {"type": "string", "enum": ["list_dbs", "list_tables", "describe", "count", "sample", "query", "migrations"], "description": "Operation to run"},
            "db": {"type": "string", "description": "Database resource id (e.g. app:db)"},
            "table": {"type": "string", "description": "Table name"},
            "where": {"type": "string", "description": "SQL WHERE clause (count/sample)"},
            "order": {"type": "string", "description": "SQL ORDER BY clause (sample)"},
            "limit": {"type": "integer", "description": "Row cap (sample caps at 500)"},
            "sql": {"type": "string", "description": "Parameterized SQL (SELECT/WITH/EXPLAIN/PRAGMA only)"},
            "params": {"type": "array", "description": "Bound parameters for sql"}
          },
          "required": ["action"]
        }
      llm_alias: data
      llm_description: Inspect keeper's registered SQLite databases. Discover DBs, list/describe tables, count, sample rows, run parameterized read-only queries, list migrations. Writes are rejected.
      mcp:
        required_scopes:
          - state.read
    source: file://data.lua
    modules:
      - sql
      - json
      - registry
    imports:
      render: keeper.internal.flow:render
    method: handler
  # keeper.agents.tools:dataflow
  - name: dataflow
    kind: function.lua
    meta:
      type: tool
      title: Dataflow Debugger
      comment: Inspect, triage, and diff dataflows
      tags:
        - debug
        - dataflow
        - readonly
      input_schema: |
        {
          "type": "object",
          "properties": {
            "action": {"type": "string", "enum": ["overview", "tree", "inspect", "anomalies", "timeline", "diff", "search", "stats", "commits", "learn"], "description": "Operation to run"},
            "flow_id": {"type": "string", "description": "Dataflow id (required for tree/inspect/anomalies/timeline/commits)"},
            "node_id": {"type": "string", "description": "Node id (inspect)"},
            "view": {"type": "string", "enum": ["summary", "conversation", "tool_call", "io", "yields"], "description": "Inspect view mode"},
            "index": {"type": "integer", "description": "Tool call index for view=tool_call"},
            "path": {"type": "string", "description": "Subtree root node_id for tree"},
            "highlight": {"type": "string", "enum": ["failures", "none"], "description": "Tree highlight filter"},
            "a": {"type": "string", "description": "Flow A id for diff"},
            "b": {"type": "string", "description": "Flow B id for diff"},
            "focus": {"type": "string", "enum": ["slow", "failures"], "description": "Timeline focus"},
            "query": {"type": "string", "description": "Search substring"},
            "types": {"type": "string", "description": "Comma-separated data types for search"},
            "status": {"type": "string", "description": "Filter by flow status (overview)"},
            "has_failures": {"type": "boolean", "description": "Filter flows with failures (overview)"},
            "window_hours": {"type": "integer", "description": "Time window for stats/learn"},
            "scan": {"type": "integer", "description": "Max flows to scan for learn"},
            "limit": {"type": "integer", "description": "Row cap"}
          },
          "required": ["action"]
        }
      llm_alias: dataflow
      llm_description: Inspect, triage, and diff dataflow runs. Use overview/stats to list, anomalies/tree to triage, inspect for transcripts, diff to compare runs, learn to find systemic failure patterns.
      mcp:
        required_scopes:
          - state.read
    source: file://dataflow.lua
    modules:
      - json
    imports:
      detectors: keeper.internal.flow:detectors
      render: keeper.internal.flow:render
      repo: keeper.internal.flow:repo
    method: handler
    
  # keeper.agents.tools:manager
  - name: manager
    kind: function.lua
    meta:
      type: tool
      title: Agent Manager
      comment: Inspect runnable agent catalog, public visibility, tools, traits, delegates, and context chains
      tags:
        - agents
        - manager
        - readonly
      input_schema: |
        {
          "type": "object",
          "properties": {
            "action": {"type": "string", "enum": ["list", "get"], "default": "list", "description": "list agents or get one agent"},
            "id": {"type": "string", "description": "Agent entry id for action=get"},
            "namespace": {"type": "string", "description": "Namespace prefix filter for action=list"},
            "class": {"type": "string", "description": "Require a class value such as public, keeper, delegate"},
            "public_only": {"type": "boolean", "description": "Only return agents with class=public"},
            "include_links": {"type": "boolean", "description": "Include tools, traits, delegates, and context_chain"},
            "include_runtime": {"type": "boolean", "description": "Include model/runtime fields"},
            "include_prompt": {"type": "boolean", "description": "Include full prompt for action=get only"},
            "limit": {"type": "integer", "description": "Max list rows"}
          }
        }
      llm_alias: agent_manager
      llm_description: Inspect Keeper's agent catalog. Use public_only=true for user-facing launchable agents; use include_links=true to see tools, traits, delegates, and context chains.
      mcp:
        required_scopes:
          - agents.read
    source: file://manager.lua
    modules:
      - registry
    method: handler

  # keeper.agents.tools:delegate
  - name: delegate
    kind: function.lua
    meta:
      type: tool
      title: Agent Delegate
      comment: Run a selected Keeper agent through a dataflow and return its result
      tags:
        - agents
        - delegate
        - dataflow
      input_schema: |
        {
          "type": "object",
          "properties": {
            "agent_id": {"type": "string", "description": "Agent entry id, e.g. keeper.agents:researcher"},
            "message": {"type": "string", "description": "Complete request to send to the target agent"},
            "context": {"type": "object", "description": "Extra context merged into the agent arena context"},
            "detached": {"type": "boolean", "description": "Start the agent dataflow asynchronously and return dataflow_id"},
            "max_iterations": {"type": "integer", "description": "Agent iteration cap, 1..64 (default 16)"},
            "min_iterations": {"type": "integer", "description": "Minimum iterations, 1..max_iterations (default 1)"},
            "tool_calling": {"type": "string", "enum": ["auto", "any"], "description": "Agent tool calling mode (default auto)"},
            "system_prompt": {"type": "string", "description": "Optional arena prompt override"},
            "model": {"type": "string", "description": "Optional model override"},
            "title": {"type": "string", "description": "Optional dataflow title"}
          },
          "required": ["agent_id", "message"]
        }
      llm_alias: delegate_agent
      llm_description: Run a selected Keeper agent in its own dataflow. Use manager first to discover agent ids. Pass a complete message because this creates an isolated agent run; inherited ctx carries active branch/task/session fields.
      mcp:
        required_scopes:
          - agents.read
          - agents.run
    source: file://delegate.lua
    modules:
      - ctx
    imports:
      agent_registry: wippy.agent.discovery:registry
      audit: keeper.task:audit
      flow: userspace.dataflow.flow:flow
    method: handler
    
  # keeper.agents.tools:run_test
  - name: run_test
    kind: function.lua
    meta:
      type: tool
      title: Run Tests
      comment: Execute test entries in-process. Scope to entry_ids or suite.
      tags:
        - verify
        - test
      input_schema: |
        {
          "type": "object",
          "properties": {
            "entry_ids": {"type": "array", "items": {"type": "string"}, "description": "Specific test entry IDs to run (namespace:name). Preferred - limits scope to what you just created."},
            "entry_id":  {"type": "string", "description": "Single test entry ID to run."},
            "suite":     {"type": "string", "description": "Run all entries whose meta.suite matches. Use only when every test in the suite is in your scope."}
          }
        }
      llm_alias: run_test
      llm_description: Run specific test.* entries in-process (no shell). Provide entry_ids (preferred) or suite. Returns {passed, failed, skipped, total, summary, failures[]}. Refuses to run without a scope.
      mcp:
        required_scopes:
          - tests.run
    source: file://run_test.lua
    modules:
      - registry
      - funcs
      - time
      - channel
      - process
    imports:
      audit: keeper.task:audit
    method: handler
    
  # keeper.agents.tools:run_test_filter_test
  - name: run_test_filter_test
    kind: function.lua
    meta:
      type: test
      comment: Pure filter_entries tests for run_test tool
      suite: agents.tools
    source: file://run_test_filter_test.lua
    imports:
      run_test: keeper.agents.tools:run_test
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.agents.tools:sessions
  - name: sessions
    kind: function.lua
    meta:
      type: tool
      title: Session Debugger
      comment: Inspect chat sessions, messages, artifacts, usage (current user only)
      tags:
        - debug
        - sessions
        - readonly
      input_schema: |
        {
          "type": "object",
          "properties": {
            "action": {"type": "string", "enum": ["overview", "inspect", "messages", "message", "artifacts", "usage", "dataflows", "search", "stats"], "description": "Operation to run"},
            "session_id": {"type": "string", "description": "Session id (required for inspect/messages/artifacts/usage)"},
            "message_id": {"type": "string", "description": "Message id (for message action)"},
            "limit": {"type": "integer", "description": "Page size"},
            "cursor": {"type": "string", "description": "Pagination cursor"},
            "direction": {"type": "string", "enum": ["before", "after"], "description": "Message page direction"},
            "query": {"type": "string", "description": "Search substring"},
            "types": {"type": "string", "description": "Comma-separated message types for search"},
            "since": {"type": "string", "description": "ISO timestamp lower bound"},
            "window_hours": {"type": "integer", "description": "Time window for stats/dataflows"}
          },
          "required": ["action"]
        }
      llm_alias: sessions
      llm_description: Inspect chat sessions owned by the current authenticated user. Lists sessions, renders transcripts, surfaces artifacts/usage, bridges to dataflows launched by user.
      mcp:
        required_scopes:
          - state.read
    source: file://sessions.lua
    modules:
      - json
      - security
    imports:
      render: keeper.internal.flow:render
      repo: keeper.internal.session:repo
    method: handler
    
  # keeper.agents.tools:sessions_test
  - name: sessions_test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for session tool helpers
      suite: agents.tools
    source: file://sessions_test.lua
    imports:
      sessions_tool: keeper.agents.tools:sessions
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.agents.tools:system
  - name: system
    kind: function.lua
    meta:
      type: tool
      title: System Inspector
      comment: Inspect host processes, supervisor services, memory/cpu, and log buffer
      tags:
        - debug
        - system
        - readonly
      input_schema: |
        {
          "type": "object",
          "properties": {
            "action": {"type": "string", "enum": ["processes", "services", "info", "logs", "errors", "log_stats", "log_composition"], "description": "Operation to run"},
            "state": {"type": "string", "description": "Filter processes by state"},
            "host": {"type": "string", "description": "Filter processes by host substring"},
            "source": {"type": "string", "description": "Filter processes by source substring"},
            "filter": {"type": "string", "description": "Logger filter expression"},
            "level": {"type": "string", "description": "Friendly log level filter for action=logs: debug, info, warn, error, or a numeric level"},
            "limit": {"type": "integer", "description": "Row cap"},
            "reverse": {"type": "boolean", "description": "Logs newest-first (default true)"}
          },
          "required": ["action"]
        }
      llm_alias: system
      llm_description: Host-level inspection. Processes, supervisor services, memory/cpu/runtime info, and the logger buffer. Use action=errors or action=logs level=error for direct error visibility. Read-only.
      mcp:
        required_scopes:
          - pm.read
          - logger.read
    source: file://system.lua
    modules:
      - system
      - json
    imports:
      logger_client: keeper.logger:client
      render: keeper.internal.flow:render
    method: handler
    
  # keeper.agents.tools:test
  - name: test
    kind: function.lua
    meta:
      type: test
      comment: Pure tests for debug tool helpers and public agent capability wiring
      suite: agents.tools
    source: file://test.lua
    modules:
      - registry
    imports:
      data_tool: keeper.agents.tools:data
      dataflow_tool: keeper.agents.tools:dataflow
      delegate_tool: keeper.agents.tools:delegate
      manager_tool: keeper.agents.tools:manager
      system_tool: keeper.agents.tools:system
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.agents.tools:test_endpoint
  - name: test_endpoint
    kind: function.lua
    meta:
      type: tool
      title: Test HTTP Endpoint
      comment: Invoke a local keeper HTTP endpoint with the caller's security scope
      tags:
        - verify
        - http
      input_schema: |
        {
          "type": "object",
          "properties": {
            "method": {"type": "string", "description": "HTTP method (GET, POST, PUT, PATCH, DELETE)"},
            "path": {"type": "string", "description": "Endpoint path (e.g. /api/state/entries)"},
            "headers": {"type": "object", "description": "Extra request headers", "additionalProperties": {"type": "string"}},
            "body": {"description": "Request body — table (JSON-encoded) or string"},
            "timeout": {"type": "integer", "description": "Request timeout seconds (default 30)"},
            "expected_status": {"type": "integer", "description": "Expected HTTP status; mismatch surfaces in the result"}
          },
          "required": ["method", "path"]
        }
      llm_alias: test_endpoint
      llm_description: Invoke a local keeper HTTP endpoint. Authenticates as the calling actor via a short-lived token, follows redirects, and returns status + body. Use to exercise an endpoint after editing a branch.
      mcp:
        required_scopes:
          - tests.run
    source: file://test_endpoint.lua
    modules:
      - security
      - http_client
      - json
      - env
    imports:
      audit: keeper.task:audit
      consts: keeper.components:consts
    method: handler

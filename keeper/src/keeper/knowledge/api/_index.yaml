  # keeper.knowledge.api:create_kb.endpoint
  - name: create_kb.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: create_kb
    path: /keeper/knowledge/kbs

  # keeper.knowledge.api:delete

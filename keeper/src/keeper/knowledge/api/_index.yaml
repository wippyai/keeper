version: "1.0"
namespace: keeper.knowledge.api

entries:
  # keeper.knowledge.api:create
  - name: create
    kind: function.lua
    meta:
      comment: Create knowledge base node
      router: app:api
    source: file://create.lua
    modules:
      - http
      - security
    imports:
      kb_service: keeper.knowledge.service:service
    method: handler
    pool:
      size: 2

  # keeper.knowledge.api:create.endpoint
  - name: create.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: create
    path: /keeper/knowledge/nodes

  # keeper.knowledge.api:create_kb
  - name: create_kb
    kind: function.lua
    meta:
      comment: Create a knowledge base
      router: app:api
    source: file://create_kb.lua

version: "1.0"
namespace: keeper.internal.session

entries:
  # keeper.internal.session:repo
  - name: repo
    kind: library.lua
    meta:
      comment: Query layer over sessions/messages/artifacts/usage for debug tooling
    source: file://repo.lua

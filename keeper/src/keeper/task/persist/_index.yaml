version: "1.0"
namespace: keeper.task.persist

entries:
  # keeper.task.persist:abandon
  - name: abandon
    kind: library.lua
    meta:
      comment: Side-effects of flipping a task to status='abandoned' — cancel its dataflows, drop active changeset, release lock. Required because abandon-the-row alone does not stop running dataflows that auto-fork new changesets.
    source: file://abandon.lua
    modules:
      - sql
    imports:
      changeset_client: keeper.changeset:client
      changeset_repo: keeper.changeset.persist:repo
      dataflow_client: userspace.dataflow:client
      task_consts: keeper.task:consts
    
  # keeper.task.persist:abandon_test
  - name: abandon_test
    kind: function.lua
    meta:
      type: test
      comment: abandon_task — drops active changeset, releases lock, idempotent. Pins the v15->v16 regression where abandoning a task left the dataflow alive and a new changeset auto-flushed FS content to disk.
      suite: task.persist
    source: file://abandon_test.lua
    modules:
      - sql
      - uuid
    imports:
      abandon: keeper.task.persist:abandon
      changeset_consts: keeper.changeset:consts
      changeset_repo: keeper.changeset.persist:repo
      task_consts: keeper.task:consts
      task_writer: keeper.task.persist:writer
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.task.persist:nodes_reader
  - name: nodes_reader
    kind: library.lua
    meta:
      comment: Typed selectors over keeper_task_nodes (trail, spec, findings, integrate runs)
    source: file://nodes_reader.lua
    modules:
      - sql
      - json
    imports:
      task_consts: keeper.task:consts
    
  # keeper.task.persist:nodes_test
  - name: nodes_test
    kind: function.lua
    meta:
      type: test
      comment: Unit tests for nodes_writer + nodes_reader — hierarchy, typed selectors, visibility, transitions, findings dedupe
      suite: task
    source: file://nodes_test.lua
    modules:
      - sql
      - uuid
    imports:
      nodes_reader: keeper.task.persist:nodes_reader
      nodes_writer: keeper.task.persist:nodes_writer
      test: wippy.test:test
    method: define_tests
    pool:
      size: 1
    
  # keeper.task.persist:nodes_writer
  - name: nodes_writer
    kind: library.lua
    meta:
      comment: Fluent writer for keeper_task_nodes (trail + payloads in one typed hierarchical table)
    source: file://nodes_writer.lua
    modules:
      - sql
      - json
      - uuid
      - time
    imports:
      task_consts: keeper.task:consts
    
  # keeper.task.persist:reader
  - name: reader
    kind: library.lua
    meta:
      comment: Fluent immutable query builder for tasks + log nodes + FTS search
    source: file://reader.lua
    modules:
      - sql
      - json
    imports:
      task_consts: keeper.task:consts
    
  # keeper.task.persist:writer
  - name: writer
    kind: library.lua
    meta:
      comment: Fluent transactional writer with CQRS event publishing
    source: file://writer.lua
    modules:
      - sql
      - json
      - uuid
      - time
      - hash
    imports:
      changeset_client: keeper.changeset:client
      changeset_consts: keeper.changeset:consts
      task_consts: keeper.task:consts
    
<head>
    <script type="application/json" data-role="@wippy/package">{"name":"@wippy/app-keeper","version":"1.0.0","license":"BSL-1.1","specification":"wippy-component-1.0","title":"Keeper","description":"Wippy control plane for registry governance, agents, tasks, MCP, Hub, and runtime operations","files":["dist/","package.json"],"browser":"dist/app.js","wippy":{"type":"page","title":"Keeper","icon":"tabler:shield-code","path":"dist/app.html","proxy":{"enabled":true,"injections":{"css":{"fonts":true,"themeConfig":true,"iframe":true,"primevue":true,"markdown":false,"customCss":true,"customVariables":true},"tailwindConfig":false,"resizeObserver":false,"preventLinkClicks":false,"iconifyIcons":false}},"scripts":{"build":"build","debug":"build:debug"},"configOverrides":{"customization":{"cssVariables":{"--p-primary-color":"var(--p-primary-500)","--p-primary-hover-color":"var(--p-primary-600)","--p-primary-active-color":"var(--p-primary-700)","--kp-bg":"var(--p-content-background)","--kp-bg-elevated":"color-mix(in srgb, var(--p-content-background) 92%, var(--p-text-color) 8%)","--kp-bg-overlay":"var(--p-content-background)","--kp-border":"var(--p-content-border-color)","--kp-text":"var(--p-text-color)","--kp-text-secondary":"var(--p-text-muted-color)","--kp-text-heading":"var(--p-text-color)","--kp-hover-bg":"color-mix(in srgb, var(--p-text-color) 6%, transparent)","--kp-code-bg":"color-mix(in srgb, var(--p-content-background) 92%, var(--p-text-color) 8%)","--kp-btn-secondary-bg":"var(--p-surface-200)","--kp-btn-secondary-border":"var(--p-surface-200)","--kp-btn-secondary-text":"var(--p-surface-700)","@light":{"--p-surface-0":"#ffffff","--p-surface-50":"#fafafa","--p-surface-100":"#f4f4f5","--p-surface-200":"#e4e4e7","--p-surface-300":"#d4d4d8","--p-surface-400":"#a1a1aa","--p-surface-500":"#71717a","--p-surface-600":"#52525b","--p-surface-700":"#3f3f46","--p-surface-800":"#27272a","--p-surface-900":"#18181b","--p-surface-950":"#09090b","--p-content-background":"#ffffff","--p-content-border-color":"#e4e4e7","--p-content-hover-background":"#f4f4f5","--p-text-color":"#18181b","--p-text-hover-color":"#09090b","--p-text-muted-color":"#71717a","--p-text-hover-muted-color":"#52525b","--p-primary-contrast-color":"#ffffff","--kp-bg":"#ffffff","--kp-bg-elevated":"#f4f4f5","--kp-bg-overlay":"#ffffff","--kp-border":"#e4e4e7","--kp-text":"#18181b","--kp-text-secondary":"#71717a","--kp-text-heading":"#18181b","--kp-hover-bg":"rgba(0, 0, 0, 0.04)","--kp-code-bg":"#f4f4f5"},"@dark":{"--p-surface-0":"#1c1a19","--p-surface-50":"#1c1a19","--p-surface-100":"#2b2927","--p-surface-200":"#403e3c","--p-surface-300":"#545250","--p-surface-600":"#52525b","--p-surface-700":"#3f3f46","--p-surface-800":"#27272a","--p-surface-900":"#18181b","--p-surface-950":"#09090b","--p-content-background":"#1c1a19","--p-content-border-color":"#403e3c","--p-content-hover-background":"#2b2927","--p-text-color":"#fafafa","--p-text-hover-color":"#ffffff","--p-text-muted-color":"#a1a1aa","--p-text-hover-muted-color":"#d4d4d8","--p-primary-contrast-color":"#ffffff","--p-primary-color":"var(--p-primary-500)","--p-primary-hover-color":"var(--p-primary-400)","--p-primary-active-color":"var(--p-primary-300)","--kp-bg-elevated":"var(--p-surface-800)","--kp-bg-overlay":"var(--p-surface-800)","--kp-text-heading":"var(--p-text-color)","--kp-hover-bg":"rgba(255, 255, 255, 0.05)","--kp-code-bg":"var(--p-surface-800)","--kp-btn-secondary-bg":"var(--p-surface-200)","--kp-btn-secondary-border":"var(--p-surface-200)","--kp-btn-secondary-text":"var(--p-text-color)","--p-mask-background":"rgba(0, 0, 0, 0.6)","--p-dialog-shadow":"0 20px 60px rgba(0, 0, 0, 0.5)","--p-button-secondary-hover-background":"var(--p-surface-400)","--p-button-secondary-hover-border-color":"var(--p-surface-400)","--p-button-secondary-hover-color":"var(--p-surface-900)","--p-button-secondary-active-background":"var(--p-surface-100)","--p-button-secondary-active-border-color":"var(--p-surface-100)","--p-button-text-secondary-hover-background":"rgba(255, 255, 255, 0.05)","--p-button-text-secondary-active-background":"rgba(255, 255, 255, 0.08)","--p-button-text-plain-hover-background":"rgba(255, 255, 255, 0.05)","--p-button-text-plain-active-background":"rgba(255, 255, 255, 0.08)","--p-button-text-contrast-color":"var(--p-surface-900)","--p-button-text-contrast-hover-background":"rgba(255, 255, 255, 0.05)","--p-button-text-contrast-active-background":"rgba(255, 255, 255, 0.08)","--p-button-outlined-secondary-border-color":"var(--p-surface-400)","--p-button-outlined-secondary-hover-background":"rgba(255, 255, 255, 0.05)","--p-button-outlined-secondary-active-background":"rgba(255, 255, 255, 0.08)"}},"customCSS":"/*\r\n * keeper PrimeVue Button + Tag/Badge/Chip overrides — transcribed from\r\n * temp-primevue-overrides.css during BD-B5 (2026-05-21). This block lives\r\n * identically in 4 places per the 4-way configOverrides duplication contract:\r\n *   - keeper/src/keeper/_index.yaml\r\n *   - keeper/src/keeper/git/_index.yaml\r\n *   - keeper/frontend/applications/keeper/package.json\r\n *   - keeper/plugins/git/frontend/applications/git/package.json\r\n * Maintenance rule (per CLAUDE.md \"FE theming placement\"): when one changes,\r\n * the other three must be updated to match.\r\n */\r\n\r\n@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');\r\n\r\n/* ----- Base geometry — match keeper's dense compact look ----- */\r\n.p-button {\r\n  border-radius: 4px;\r\n  padding: 4px 12px;\r\n  font-size: 11px;\r\n  font-weight: 500;\r\n  /* PrimeVue's default gap is 0.5rem (8px); keeper's hand-rolled buttons used\r\n     4-5px between icon and label. Setting 4px here is the new default — call\r\n     sites that need different gap should use !gap-1.5 / !gap-2 explicitly.\r\n     Source-order: this file loads AFTER tailwind.css, so a plain `gap-N`\r\n     Tailwind class WILL lose the specificity tie against this `.p-button`\r\n     rule — use the `!`-modifier (e.g. `!gap-1.5`) to override. */\r\n  gap: 4px;\r\n  transition: none; /* keeper has no hover transition; PrimeVue's 0.2s shimmer feels off vs current */\r\n}\r\n\r\n.p-button-sm {\r\n  padding: 2px 8px;\r\n  font-size: 10px;\r\n}\r\n\r\n.p-button-lg {\r\n  padding: 6px 14px;\r\n  font-size: 12px;\r\n}\r\n\r\n/* ----- Filled severities (the \"no text/outlined/link variant\" selector chain\r\n        excludes outline/text/link Buttons so they keep their transparent bg) ----- */\r\n\r\n/* Default (no severity class) — primary. PrimeVue's default Button already\r\n   renders bright primary-500 bg + white text in BOTH modes (verified B2), so\r\n   bg/color/border don't need overriding. Only font-weight differs (PrimeVue\r\n   defaults to 400, keeper .primary-btn is 600). Low-specificity selector\r\n   (0,1,1) so .k-btn-* extension classes (0,2,0) can still win. */\r\n.p-button:not([class*=\"p-button-\"]) {\r\n  font-weight: 600;\r\n}\r\n\r\n/* secondary — keeper's .header-btn look (light flat grey + bordered)\r\n   keeper .header-btn padding is 4 10 (slightly narrower than base 4 12) */\r\n.p-button-secondary:not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  background: var(--p-content-hover-background); /* warm-grey surface-100 in keeper (#f4f4f5 / #2b2927) */\r\n  color: var(--p-text-color);\r\n  border-color: var(--p-content-border-color);\r\n  padding: 4px 10px;\r\n}\r\n\r\n/* success — WCAG carve-out: -700 landed at 4.42 (just under AA 4.5),\r\n   bumped to -800 in iter 5 to actually pass.\r\n   keeper original was bg-success-500 + white text (≈2.2:1, AA fail) */\r\n.p-button-success:not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  background: var(--p-success-800);\r\n  color: #fff;\r\n  border-color: var(--p-success-800);\r\n  font-weight: 600; /* keeper bg-success-500 = 600 */\r\n}\r\n\r\n/* info */\r\n.p-button-info:not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  background: var(--p-info-500);\r\n  color: #fff;\r\n  border-color: var(--p-info-500);\r\n}\r\n\r\n/* warn */\r\n.p-button-warn:not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  background: var(--p-warn-500);\r\n  color: #fff;\r\n  border-color: var(--p-warn-500);\r\n}\r\n\r\n/* help */\r\n.p-button-help:not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  background: var(--p-help-500);\r\n  color: #fff;\r\n  border-color: var(--p-help-500);\r\n}\r\n\r\n/* danger — WCAG carve-out: use -600 for better white-text contrast.\r\n   keeper original was bg-danger-500 + white text (≈3.0:1, AA fail at 11px) */\r\n.p-button-danger:not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  background: var(--p-danger-600);\r\n  color: #fff;\r\n  border-color: var(--p-danger-600);\r\n  /* font-weight stays 500 (keeper task-detail.vue:682 was 500) */\r\n}\r\n\r\n/* contrast — keep PrimeVue default if used */\r\n\r\n/* ----- Text / Link variants — keeper's `btn-text-link` / `btn-toggle-text`\r\n        have no chrome: transparent bg, no padding, no radius, weight 400 ----- */\r\n.p-button-text,\r\n.p-button-link {\r\n  padding: 0;\r\n  border-radius: 0;\r\n  font-weight: 400;\r\n}\r\n\r\n/* Dark-mode primary-text brightening was here originally, but moved to the\r\n   end of the file so its CSS source order beats `.k-btn-nav.k-btn-active`\r\n   (which sets `color: primary-color` and is defined later than this point). */\r\n\r\n/* ----- Disabled state — match keeper's faded-but-readable look ----- */\r\n.p-button:disabled,\r\n.p-button[disabled] {\r\n  opacity: 0.5;\r\n  cursor: not-allowed;\r\n}\r\n\r\n/* ============================================================\r\n   Keeper-specific extensions — for variants stock PrimeVue\r\n   doesn't cover. Use with <Button class=\"k-btn-…\">.\r\n   ============================================================ */\r\n\r\n/* k-btn-dashed — keeper's `.add-btn` (AgentEditor \"+ Add\" pattern).\r\n   Standalone: do not combine with .p-button-outlined (handles its own\r\n   bg/color/border so the call site is just <Button class=\"k-btn-dashed\">). */\r\n.p-button.k-btn-dashed {\r\n  background: var(--p-content-background);\r\n  color: var(--p-text-color);\r\n  border: 1px dashed var(--p-surface-300);\r\n  border-radius: 4px;\r\n  padding: 4px 10px;\r\n  font-size: 11px;\r\n  font-weight: 400;\r\n}\r\n.p-button.k-btn-dashed:hover:not(:disabled) {\r\n  border-color: var(--p-primary-color);\r\n}\r\n\r\n/* k-btn-nav — keeper's `.keeper-nav-btn` (styles.css:93-106). Transparent\r\n   base with FULL text color (not muted — REJECT 1 in B4 code review);\r\n   hover lifts bg to surface-100; .k-btn-active (or .active) keeps surface-100\r\n   bg and swaps text to primary-color. */\r\n.p-button.k-btn-nav {\r\n  background: transparent;\r\n  color: var(--p-text-color);\r\n  border: 1px solid transparent;\r\n  border-radius: 4px;\r\n  padding: 4px 10px;\r\n  font-size: 12px;\r\n  font-weight: 500;\r\n  /* match original `transition-colors` on .keeper-nav-btn (Tailwind default 150ms) */\r\n  transition: background-color 150ms, color 150ms, border-color 150ms;\r\n}\r\n.p-button.k-btn-nav:hover {\r\n  background: var(--p-surface-100);\r\n}\r\n.p-button.k-btn-nav.k-btn-active,\r\n.p-button.k-btn-nav.active {\r\n  background: var(--p-surface-100);\r\n  color: var(--p-primary-color);\r\n}\r\n\r\n/* k-btn-icon — keeper's `.icon-btn` (mcp.vue:603-616) and similar\r\n   bare-icon buttons. Transparent base, muted text, surface-200 hover bg\r\n   with full text-color. Per-call-site metric tweaks via !-prefix Tailwind\r\n   utilities (e.g. `!p-0.5` for DetailPanel close, `!w-6 !h-6 !rounded-full`\r\n   for AppUserChip logout). */\r\n.p-button.k-btn-icon {\r\n  background: transparent;\r\n  color: var(--p-text-muted-color);\r\n  border: none;\r\n  border-radius: 3px;\r\n  padding: 4px;\r\n  font-weight: 400;\r\n}\r\n.p-button.k-btn-icon:hover:not(:disabled) {\r\n  background: var(--p-surface-200);\r\n  color: var(--p-text-color);\r\n}\r\n\r\n/* k-btn-icon-danger — danger-on-hover variant (rm-btn, clear-btn,\r\n   `.icon-btn.danger`). Layer on top of `.k-btn-icon`. */\r\n.p-button.k-btn-icon.k-btn-icon-danger:hover:not(:disabled) {\r\n  background: color-mix(in srgb, var(--p-danger-500) 15%, transparent);\r\n  color: var(--p-danger-500);\r\n}\r\n\r\n/* k-btn-graph-ctrl — ForceGraph zoom controls.\r\n   28×28 translucent surface, no border, monospace glyph. */\r\n.p-button.k-btn-graph-ctrl {\r\n  width: 28px;\r\n  height: 28px;\r\n  padding: 0;\r\n  background: color-mix(in srgb, var(--p-content-hover-background) 80%, transparent);\r\n  color: var(--p-text-color);\r\n  border: none;\r\n  border-radius: 4px;\r\n  font-size: 14px;\r\n  font-weight: 400;\r\n  font-family: monospace; /* verified from ForceGraph.vue:375 */\r\n}\r\n.p-button.k-btn-graph-ctrl:hover:not(:disabled) {\r\n  background: color-mix(in srgb, var(--p-content-border-color) 90%, transparent);\r\n}\r\n\r\n/* k-btn-tinted (+ severity modifier) — keeper's `bg-{sev}-500/10 text-{sev}-500`\r\n   pattern. Base sets geometry; modifier sets the severity color.\r\n   Use as: <Button class=\"k-btn-tinted k-btn-tinted-accent\">Explain</Button>. */\r\n.p-button.k-btn-tinted {\r\n  padding: 2px 8px;\r\n  font-size: 10px;\r\n  font-weight: 400;\r\n  border-color: transparent;\r\n  border-radius: 4px;\r\n}\r\n/* WCAG carve-out: tinted variants use -700 text in light (severity-500 was\r\n   ~2.0-3.3:1 AA fail on pale-bg-on-white) and -400 text in dark\r\n   (severity-500 dark on dark page bg was borderline / fail for danger). */\r\n.p-button.k-btn-tinted-primary { background: color-mix(in srgb, var(--p-primary-500) 10%, transparent); color: var(--p-primary-700); }\r\n.p-button.k-btn-tinted-info    { background: color-mix(in srgb, var(--p-info-500)    10%, transparent); color: var(--p-info-700); }\r\n.p-button.k-btn-tinted-success { background: color-mix(in srgb, var(--p-success-500) 10%, transparent); color: var(--p-success-800); } /* -700 hit 4.06; -800 to pass */\r\n.p-button.k-btn-tinted-warn    { background: color-mix(in srgb, var(--p-warn-500)    10%, transparent); color: var(--p-warn-700); }\r\n.p-button.k-btn-tinted-help    { background: color-mix(in srgb, var(--p-help-500)    10%, transparent); color: var(--p-help-700); }\r\n.p-button.k-btn-tinted-danger  { background: color-mix(in srgb, var(--p-danger-500)  10%, transparent); color: var(--p-danger-700); }\r\n.p-button.k-btn-tinted-accent  { background: color-mix(in srgb, var(--p-accent-500)  10%, transparent); color: var(--p-accent-800); } /* -700 hit 4.35; -800 to pass */\r\n\r\n@media (prefers-color-scheme: dark) {\r\n  .p-button.k-btn-tinted-primary { color: var(--p-primary-400); }\r\n  .p-button.k-btn-tinted-info    { color: var(--p-info-400); }\r\n  .p-button.k-btn-tinted-success { color: var(--p-success-400); }\r\n  .p-button.k-btn-tinted-warn    { color: var(--p-warn-400); }\r\n  .p-button.k-btn-tinted-help    { color: var(--p-help-400); }\r\n  .p-button.k-btn-tinted-danger  { color: var(--p-danger-400); }\r\n  .p-button.k-btn-tinted-accent  { color: var(--p-accent-400); }\r\n}\r\n\r\n/* k-btn-save — keeper's `.ed-save-btn` stateful save button.\r\n   B3 collapse claim \"<Button :disabled=\"!dirty\">\" was WRONG — keeper's\r\n   clean state is surface-200 + muted text (not just opacity-faded primary).\r\n   Use <Button class=\"k-btn-save\" :disabled=\"!dirty\"> instead. */\r\n.p-button.k-btn-save {\r\n  background: var(--p-primary-color);\r\n  color: var(--p-primary-contrast-color);\r\n  border-color: var(--p-primary-color);\r\n  padding: 4px 12px;\r\n  font-size: 11px;\r\n  font-weight: 600;\r\n}\r\n.p-button.k-btn-save:hover:not(:disabled) {\r\n  opacity: 0.9;\r\n}\r\n.p-button.k-btn-save:disabled,\r\n.p-button.k-btn-save[disabled] {\r\n  background: var(--p-surface-200);\r\n  color: var(--p-text-muted-color);\r\n  border-color: var(--p-surface-200);\r\n  font-weight: 500;\r\n  opacity: 1; /* override the global .p-button:disabled opacity */\r\n  cursor: not-allowed;\r\n}\r\n\r\n/* ============================================================\r\n   Hover states for filled severities + secondary + text+icon-only.\r\n   Source captures (keeper hand-rolled originals):\r\n     .primary-btn      :hover { opacity: .9 }\r\n     .header-btn       :hover { background: surface-200; border-color: primary }\r\n     .icon-btn         :hover { background: surface-200; color: text-color }\r\n     .icon-btn.danger  :hover { background: danger@15%; color: danger-500 }\r\n   ============================================================ */\r\n\r\n/* Filled buttons (any severity, including default-primary): subtle dim on hover */\r\n.p-button:hover:not(:disabled):not(.p-button-text):not(.p-button-outlined):not(.p-button-link) {\r\n  opacity: 0.9;\r\n}\r\n\r\n/* Secondary (.header-btn) hover: stronger bg + primary-color border ring */\r\n.p-button-secondary:not(.p-button-text):not(.p-button-outlined):not(.p-button-link):hover:not(:disabled) {\r\n  opacity: 1; /* override the filled hover above; secondary uses bg shift not opacity */\r\n  background: var(--p-surface-200);\r\n  border-color: var(--p-primary-color);\r\n}\r\n\r\n/* Text icon-only (.icon-btn) hover: surface-200 bg + full text color */\r\n.p-button-text.p-button-icon-only:hover:not(:disabled):not(.p-button-danger) {\r\n  background: var(--p-surface-200);\r\n  color: var(--p-text-color);\r\n}\r\n\r\n/* Text icon-only DANGER (.icon-btn.danger / .clear-btn) hover: danger-tint bg + danger text */\r\n.p-button-text.p-button-icon-only.p-button-danger:hover:not(:disabled),\r\n.p-button-text.p-button-danger:hover:not(:disabled) {\r\n  background: color-mix(in srgb, var(--p-danger-500) 15%, transparent);\r\n  color: var(--p-danger-500);\r\n}\r\n\r\n/* ============================================================\r\n   D2 BD-B3 — Tag / Badge / Chip override layer for the Badge/Chip family.\r\n   ============================================================\r\n   DESIGN PRINCIPLE: lean into PrimeVue's own primitives (severity / size /\r\n   removable props) so most call sites need NO keeper-specific class.\r\n   Keeper layer is ONLY:\r\n     - Base resets that bend Tag/Badge/Chip defaults to keeper's compact\r\n       look (10px font, 4px radius, dense padding, tint-bg severities).\r\n     - 4 slap-on classes for the patterns PrimeVue genuinely can't express:\r\n       .k-tag-mono   — monospace + bordered (kind-badge)\r\n       .k-tag-letter — fixed 18x18 single-char tile (op-letter)\r\n       .k-tag-metric — neutral bordered + text-only severity (stat-pill)\r\n       .k-chip-managed — success-tinted bordered chip (settings-registry)\r\n\r\n   API SUMMARY for call sites:\r\n     status-tinted:    <Tag severity=\"success\">ok</Tag>                  (no class)\r\n     neutral pill:     <Tag severity=\"secondary\">…</Tag>                 (no class)\r\n     kind-badge:       <Tag severity=\"secondary\" class=\"k-tag-mono\">agent.gen1</Tag>\r\n     op-letter:        <Tag severity=\"success\" class=\"k-tag-letter\">A</Tag>\r\n     count pill:       <Badge severity=\"secondary\" :value=\"47\" />        (no class)\r\n     tab-cnt 8px:      <Badge severity=\"secondary\" :value=\"3\" size=\"small\" />\r\n     stat-pill:        <Tag severity=\"info\" class=\"k-tag-metric\">\r\n                         <span class=\"k-tag-num\">7</span><span class=\"k-tag-lbl\">active</span>\r\n                       </Tag>\r\n     hero-pill 11px:   <Tag severity=\"warn\" class=\"!text-[11px] !px-[9px] !py-[3px]\">\r\n                                                                          (3 utilities, ~4 sites)\r\n     percentage-chip:  <Tag severity=\"secondary\" class=\"!text-[9px]\">42%</Tag>\r\n                                                                          (1 utility, ~4 sites)\r\n     removable-chip:   <Chip label=\"dev\" removable />                    (no class)\r\n     managed-chip:     <Chip label=\"x\" removable class=\"k-chip-managed\" />\r\n     awaiting-pulse:   KEEP HAND-ROLLED (animation, 2 sites)\r\n\r\n   For data-driven colors that exceed PrimeVue's severity enum (e.g.\r\n   msgColor() returns var(--p-accent-500)), call sites use inline\r\n   `:style=\"{ color: dataColor, background: 'color-mix(...)' }\"`.\r\n\r\n   Hand-rolled per BD-B1 plan (no Tag class): variants 4 (data-neutral),\r\n   6 (filter-chip), 7 (dot), 8 (icon-bubble), 9 (kbd), 12 (awaiting-pulse).\r\n   ============================================================ */\r\n\r\n/* ----- Tag base reset ----- */\r\n/* PrimeVue 4 default Tag is 0.25rem/0.5rem padding, 0.75rem font, 700\r\n   weight, 16px radius (rounded chip). Keeper wants compact 10px / 4px\r\n   radius / dense flat pills. */\r\n.p-tag {\r\n  padding: 2px 6px;\r\n  font-size: 10px;\r\n  font-weight: 400;\r\n  border-radius: 4px;\r\n  gap: 4px;\r\n}\r\n\r\n/* Severity classes → tint bg + severity-color text (status-tinted look).\r\n   Higher specificity than PrimeVue's `.p-tag-success` alone, so our 10%\r\n   tint wins over PrimeVue's solid severity fill.\r\n   WCAG AA carve-out: -700 text (light mode) for AA contrast on the 10%\r\n   tint bg; success bumps to -800 (-700 hit ~4.06:1, just under AA 4.5).\r\n   Dark-mode brightening to -400 lives in the end-of-file @media block.\r\n   This diverges from byte-identical-to-hand-rolled (keeper code uses\r\n   -500); same divergence rule the Button family WCAG carve-out applied. */\r\n.p-tag.p-tag-primary    { background: color-mix(in srgb, var(--p-primary-500) 10%, transparent); color: var(--p-primary-700); }\r\n.p-tag.p-tag-success    { background: color-mix(in srgb, var(--p-success-500) 10%, transparent); color: var(--p-success-800); }\r\n.p-tag.p-tag-info       { background: color-mix(in srgb, var(--p-info-500) 10%, transparent); color: var(--p-info-700); }\r\n.p-tag.p-tag-warn       { background: color-mix(in srgb, var(--p-warn-500) 10%, transparent); color: var(--p-warn-700); }\r\n.p-tag.p-tag-danger     { background: color-mix(in srgb, var(--p-danger-500) 10%, transparent); color: var(--p-danger-700); }\r\n.p-tag.p-tag-help       { background: color-mix(in srgb, var(--p-help-500) 10%, transparent); color: var(--p-help-700); }\r\n/* secondary → neutral surface pill (covers model-pill, count-pill use of Tag,\r\n   percentage-chip with !-utility size override). Muted text on surface-100\r\n   is ~4.5:1 in light, ~5.4:1 in dark — AA-passing already, no carve-out. */\r\n.p-tag.p-tag-secondary  { background: var(--p-surface-100); color: var(--p-text-muted-color); }\r\n/* contrast → inverted text-on-bg (not in keeper's current usage per BD-B1\r\n   plan, but completes PrimeVue 4's full Tag severity enum). High-contrast\r\n   pair by construction; tokens auto-flip light/dark. */\r\n.p-tag.p-tag-contrast   { background: var(--p-text-color); color: var(--p-content-background); }\r\n\r\n/* ----- Badge base reset (counter family) ----- */\r\n/* PrimeVue 4 default Badge is circular `min-width: 1.5rem; height: 1.5rem;\r\n   border-radius: 50%` with bold primary fill. Keeper's count pills are\r\n   rectangular small muted neutral chips. After merge A: ns-count + hdr-count\r\n   unify into one default Badge look. */\r\n.p-badge {\r\n  min-width: auto;\r\n  height: auto;\r\n  padding: 2px 8px;\r\n  font-size: 10px;\r\n  font-weight: 500;\r\n  border-radius: 10px;\r\n  background: var(--p-surface-100);\r\n  color: var(--p-text-muted-color);\r\n  gap: 0;\r\n}\r\n/* tab-cnt — PrimeVue's `size=\"small\"` prop applies .p-badge-sm */\r\n.p-badge.p-badge-sm {\r\n  font-size: 8px;\r\n  font-weight: 400;\r\n  padding: 0 4px;\r\n  border-radius: 6px;\r\n  background: var(--p-surface-200);\r\n  color: var(--p-text-color);\r\n}\r\n\r\n/* Badge severity colors — mirror the Tag tint logic (10% bg + severity\r\n   text) so severity-colored counters read as soft accents, not loud\r\n   solid PrimeVue defaults. Keeper currently only uses severity=\"secondary\"\r\n   for counters (the base reset above covers it), but these complete the\r\n   PrimeVue 4 severity enum so any future usage stays on-design without\r\n   per-call overrides. Same WCAG carve-out as Tag: -700 text in light\r\n   (success bumps to -800), -400 in dark (via @media at EOF). */\r\n.p-badge.p-badge-primary  { background: color-mix(in srgb, var(--p-primary-500) 10%, transparent); color: var(--p-primary-700); }\r\n.p-badge.p-badge-success  { background: color-mix(in srgb, var(--p-success-500) 10%, transparent); color: var(--p-success-800); }\r\n.p-badge.p-badge-info     { background: color-mix(in srgb, var(--p-info-500) 10%, transparent); color: var(--p-info-700); }\r\n.p-badge.p-badge-warn     { background: color-mix(in srgb, var(--p-warn-500) 10%, transparent); color: var(--p-warn-700); }\r\n.p-badge.p-badge-danger   { background: color-mix(in srgb, var(--p-danger-500) 10%, transparent); color: var(--p-danger-700); }\r\n.p-badge.p-badge-help     { background: color-mix(in srgb, var(--p-help-500) 10%, transparent); color: var(--p-help-700); }\r\n.p-badge.p-badge-contrast { background: var(--p-text-color); color: var(--p-content-background); }\r\n\r\n/* ----- Chip base reset (removable chip family) ----- */\r\n/* PrimeVue 4 default Chip is large rounded-full. Keeper wants the .tag\r\n   shape from TagsField — small surface-200 neutral with embedded x. */\r\n.p-chip {\r\n  display: inline-flex;\r\n  align-items: center;\r\n  gap: 2px;\r\n  padding: 1px 6px;\r\n  border-radius: 3px;\r\n  font-size: 10px;\r\n  font-weight: 400;\r\n  background: var(--p-surface-200);\r\n  color: var(--p-text-color);\r\n  border: 0;\r\n}\r\n.p-chip .p-chip-remove-icon {\r\n  width: 10px;\r\n  height: 10px;\r\n  color: var(--p-text-muted-color);\r\n  cursor: pointer;\r\n}\r\n.p-chip .p-chip-remove-icon:hover {\r\n  color: var(--p-danger-500);\r\n}\r\n\r\n/* ============================================================\r\n   Keeper slap-on classes (4) — only for patterns PrimeVue can't express\r\n   ============================================================ */\r\n\r\n/* k-tag-mono — kind-badge (mono + bordered + tighter padding).\r\n   PrimeVue Tag has no font-family token, and Tag's severity-tinted base\r\n   has no border. Override both here. */\r\n.p-tag.k-tag-mono {\r\n  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;\r\n  border-radius: 3px;\r\n  padding: 1px 8px;\r\n  background: var(--p-surface-100);\r\n  color: var(--p-text-color);\r\n  border: 1px solid var(--p-content-border-color);\r\n}\r\n\r\n/* k-tag-letter — op-letter (18x18 single-char square tile).\r\n   PrimeVue has no fixed-size variant. The severity class adds tint bg\r\n   + severity color (inherited from base reset above). */\r\n.p-tag.k-tag-letter {\r\n  width: 18px;\r\n  height: 18px;\r\n  padding: 0;\r\n  font-size: 9px;\r\n  font-weight: 600;\r\n  border-radius: 3px;\r\n  font-family: ui-monospace, SFMono-Regular, monospace;\r\n  display: inline-flex;\r\n  align-items: center;\r\n  justify-content: center;\r\n  gap: 0;\r\n}\r\n\r\n/* k-tag-metric — stat-pill (neutral bordered, text-only severity recolor).\r\n   This fights PrimeVue's severity-recolors-bg model: we want neutral\r\n   surface-100 bg + bordered, with severity recoloring TEXT ONLY. The\r\n   per-severity rules below pin bg/border to neutral and override only\r\n   the color. */\r\n.p-tag.k-tag-metric {\r\n  padding: 3px 9px;\r\n  border-radius: 4px;\r\n  background: var(--p-surface-100);\r\n  border: 1px solid var(--p-content-border-color);\r\n  font-size: 11px;\r\n  font-weight: 400;\r\n  color: var(--p-text-color);\r\n  gap: 5px;\r\n}\r\n/* The per-severity rules pin bg/border to neutral and override the text\r\n   color only. Covers the full PrimeVue 4 severity enum so any keeper\r\n   metric can be tone-coded. accent / arbitrary data-driven colors use\r\n   `:style=\"{ color: var(--p-accent-500) }\"` on the call site instead.\r\n   Same WCAG carve-out: -700 text in light (success bumps to -800),\r\n   -400 in dark (@media at EOF). surface-100 bg has ~same contrast as\r\n   the 10% tint of severity-on-white, so same bumps apply. */\r\n.p-tag.k-tag-metric.p-tag-primary   { color: var(--p-primary-700); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-secondary { color: var(--p-text-muted-color); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-success   { color: var(--p-success-800); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-info      { color: var(--p-info-700); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-warn      { color: var(--p-warn-700); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-danger    { color: var(--p-danger-700); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-help      { color: var(--p-help-700); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n.p-tag.k-tag-metric.p-tag-contrast  { color: var(--p-text-color); background: var(--p-surface-100); border-color: var(--p-content-border-color); }\r\n/* Inner two-tone helpers — used inside .k-tag-metric default slot.\r\n   Not counted as \"slap-on classes\" — call sites use them on inner spans. */\r\n.k-tag-num { font-weight: 700; font-variant-numeric: tabular-nums; }\r\n.k-tag-lbl { font-size: 10px; color: var(--p-text-muted-color); }\r\n\r\n/* k-tag-tone-accent — keeper-extension severity (not in PrimeVue's enum).\r\n   Used by `.stat-pill--accent` and msgColor() returns for function/delegation/\r\n   developer message types. Works standalone (tinted accent pill) or with\r\n   `.k-tag-metric` (neutral metric with accent text). WCAG-aware: -800 in\r\n   light (mirrors .k-btn-tinted-accent — -700 hit 4.35:1 under AA 4.5),\r\n   -400 in dark (via @media at EOF). */\r\n.p-tag.k-tag-tone-accent {\r\n  background: color-mix(in srgb, var(--p-accent-500) 10%, transparent);\r\n  color: var(--p-accent-800);\r\n}\r\n.p-tag.k-tag-metric.k-tag-tone-accent {\r\n  background: var(--p-surface-100);\r\n  border-color: var(--p-content-border-color);\r\n  color: var(--p-accent-800);\r\n}\r\n\r\n/* k-chip-managed — settings-registry success-tinted clickable variant.\r\n   Keeper-specific tint of Chip not expressible via Chip's prop API. */\r\n.p-chip.k-chip-managed {\r\n  padding: 2px 6px 2px 8px;\r\n  border-radius: 4px;\r\n  border: 1px solid color-mix(in srgb, var(--p-success-500) 30%, transparent);\r\n  background: color-mix(in srgb, var(--p-success-500) 12%, transparent);\r\n  color: var(--p-text-color);\r\n  font-family: ui-monospace, SFMono-Regular, monospace;\r\n  font-size: 11px;\r\n  gap: 4px;\r\n  cursor: pointer;\r\n}\r\n\r\n/* ============================================================\r\n   END-OF-FILE: dark-mode WCAG brightening — placed last so source\r\n   order beats any earlier rules that set primary-color on the same\r\n   selectors (notably .k-btn-nav.k-btn-active above).\r\n   ============================================================ */\r\n@media (prefers-color-scheme: dark) {\r\n  /* Button dark-mode brightening (text/outlined/link primary text + nav-active) */\r\n  .p-button-text:not(.p-button-danger),\r\n  .p-button-outlined,\r\n  .p-button-link,\r\n  .p-button.k-btn-nav.k-btn-active,\r\n  .p-button.k-btn-nav.active {\r\n    color: var(--p-primary-400);\r\n  }\r\n\r\n  /* Tag / Badge / k-tag-metric severity text — dark-mode WCAG carve-out:\r\n     -400 text reads bright against the dark-page-composited tint bg\r\n     (or against surface-100 dark for k-tag-metric). Mirrors the\r\n     Button family `.k-btn-tinted-*` dark-mode rule. */\r\n  .p-tag.p-tag-primary,\r\n  .p-badge.p-badge-primary,\r\n  .p-tag.k-tag-metric.p-tag-primary  { color: var(--p-primary-400); }\r\n  .p-tag.p-tag-success,\r\n  .p-badge.p-badge-success,\r\n  .p-tag.k-tag-metric.p-tag-success  { color: var(--p-success-400); }\r\n  .p-tag.p-tag-info,\r\n  .p-badge.p-badge-info,\r\n  .p-tag.k-tag-metric.p-tag-info     { color: var(--p-info-400); }\r\n  .p-tag.p-tag-warn,\r\n  .p-badge.p-badge-warn,\r\n  .p-tag.k-tag-metric.p-tag-warn     { color: var(--p-warn-400); }\r\n  .p-tag.p-tag-danger,\r\n  .p-badge.p-badge-danger,\r\n  .p-tag.k-tag-metric.p-tag-danger   { color: var(--p-danger-400); }\r\n  .p-tag.p-tag-help,\r\n  .p-badge.p-badge-help,\r\n  .p-tag.k-tag-metric.p-tag-help     { color: var(--p-help-400); }\r\n  .p-tag.k-tag-tone-accent,\r\n  .p-tag.k-tag-metric.k-tag-tone-accent { color: var(--p-accent-400); }\r\n}\r\n"}}},"scripts":{"build":"vite build","build:debug":"KEEPER_SOURCEMAP=true vite build --mode development","dev":"vite build --watch","type-check":"vue-tsc --build --force","test":"vitest run","test:watch":"vitest"},"dependencies":{"@wippy-fe/theme":"^0.0.32","chart.js":"^4.5.1","d3-force":"^3.0.0"},"devDependencies":{"@testing-library/vue":"^8.1.0","@vitejs/plugin-vue":"^5.0.0","@vue/test-utils":"^2.4.6","@wippy-fe/types-global-proxy":"^0.0.32","@wippy-fe/vite-plugin":"^0.0.32","autoprefixer":"^10.4.0","happy-dom":"^20.8.4","jsdom":"^29.0.0","postcss":"^8.4.0","primevue":"^4.3.3","tailwindcss":"3","typescript":"^5.0.0","vite":"^6.0.0","vitest":"^4.1.0","vue":"^3.5.0","vue-router":"^4.6.4","vue-tsc":"^2.0.0"},"peerDependencies":{"@iconify/vue":"^5.0.0","@wippy-fe/proxy":"^0.0.32","@wippy-fe/router":"^0.0.32","axios":"^1.0.0","luxon":"^3.5.0","pinia":"^2.1.0","primevue":"^4.3.3","vue":"^3.5.0","vue-router":"^4.0.0"}}</script>
